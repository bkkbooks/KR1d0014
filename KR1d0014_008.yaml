body:
  text: 周官集𫝊卷八元毛應龍撰大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰䇲祝六祝祝讀為呪按韻說文祝祭主贊辭祝或作呪祝願也鄭鍔曰永長也貞正也降年有永有不永人有得正而斃死者有不得正而斃死者故求其永貞欲順受其正命也說者謂人君所以自求多福自貽哲命固自有道而必命大祝之官祈之求之何哉故愚以為六祝之求非人君一已之私也其意則要天下均受多福均保正祿爾後世之君私已而不及天下故設祕祝之官自為自求漢文帝知祠官祝釐專為朕躬而不為民故詔罷之以文帝觀之先王豈為已計哉鄭司農曰順祝順豐年也郊特牲曰順成之方其蠟乃通歐陽氏曰順祝不必專為順豐年凡雨暘順序而為報本之禮皆順祝也年祝如祈榖于上帝于社禝而有豐年噫嘻諸詩固有祝辭矣寧風旱逆時雨之事其在中乎吉祝吉祭之祝辭也所謂以吉禮事邦國之鬼神示者其是乎瑞祝祥瑞之祝辭古人得祥瑞則歸功於神漢世猶然是則告祥瑞之事必有祝辭䇲祝其卜筮之時所以命蓍龜之辭乎掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說六祈以祈其同於人也作六辭以通上下親疏逺近一曰祠二曰命三曰誥四曰會五曰禱六曰誄辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號六辭皆大祝施於神者所謂上下親疏逺近乃以神言之歐陽謙之曰天地即上下也山川有逺近也祖宗之靈非所以為親近乎九皇六十四氏之祀非所以為疏逺乎鄭鍔曰祠者因祭祀而為之祠也四時之祭春曰祠謂以言辭為主也應龍曰按說文春祭品物少多文辭也命者述其意以命神如命龜之命蓋有指使之言如曰假爾泰筮有常乃所以命之也杜氏曰誥當為告書亦或為告書武城曰砥商之罪告于皇天后土所過名山大川金縢曰乃告太王王季文王鄭鍔曰㑹者㑹盟告神之辭也山川鬼神臨之苟渝此盟明神殛之之類也禱者有所祈禱告神之辭也辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭九祭皆祭食之法辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀鄭司農曰肅拜但俯下手今時撎是也陸氏釋文曰即今之揖鄭鍔曰或祭祀之時或享獻之時或勸侑之時所拜各異也凡大禋祀肆享祭示則執明水火而號祝劉氏曰大禋祀者祭天圜丘也肆享者宗廟大禘祭示祭地方澤也三者禮最大故特言之肆享為禘可知矣隋釁逆牲逆尸令鐘鼓右亦如之鄭鍔曰尸始入室拜妥尸尸則以韭葅擩于醢以祭于豆間謂之隋守祧所謂藏其隋謂此隋也來瞽令臯舞相尸禮既祭令徹鄭鍔曰及祭已畢則令當徹祭器之人徹而去之九嬪內外宗之屬皆掌徹事大祝令之也大喪始崩以肆鬯渳尸相飯贊斂徹奠言甸人讀禱祔練祥掌國事國有大故天烖彌祀社稷禱祠大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝大會同造于廟宜于社過大山川則用事焉反行舍奠建邦國先告后土用牲幣禁督逆祀命者頒祭號于邦國都鄙分封土地先告后土示不敢專也有牲有幣禮動不虛故也鄭氏曰祭號六號鄭鍔曰諸侯之國雖各有命然六號亦有不得而用者頒其所得而用之號以與之則大夫不敢僭諸侯諸侯不得僭天子禮矣六號之中有天地之號諸侯不得祭天地則不用天子之號也小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺罪疾歐陽謙之曰順與逆對順豐年意者已得豐年而行之如秋報之禮是也逆時雨蓋閔雨而行之如禱雨之祭是也風旱為虐則禱而使之寧靜烖兵為害則禱而使之止息林氏曰彌所以止之也罪疾為苦則禱而使之逺去大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠隋是尸之祭也主人受尸酢亦有隋祭小祝贊尸以授之案特牲少牢尸始入室拜妥尸尸隋祭以韭葅擩于醢以祭於豆間徹與奠則小祝贊大祝也徹既祭命徹大祝之令也奠奠爵也特牲祝酌奠于鉶南凡事佐大祝大喪贊渳設熬置銘及葬設道齎之奠分禱五祠大祝非一事諸有事皆小祝為之佐大祝以肆鬯渳小祝贊之也大師掌釁祈號祝有冦戎之事則保郊祀于社凡外內小祭祀小喪紀小會同小軍旅掌事焉歐陽謙之曰案小宗伯云兆五帝於四郊四望四類亦如之蓋郊者國家所以祀五帝四望四類之神之所也保郊云者若保于郊祈保護之力于諸神也祀于社祀于社稷之神而求保護之力也若云保守于郊豈小祝之職分哉喪祝掌大喪勸防之事及辟令啓及朝御匶乃奠及祖飾棺乃載遂御菆聚也殯時聚木蓋櫬而塗之即所謂以槨菆塗其槨也及將葬時當辟除乃令開啓之天子七日而殯七月而葬及葬御匶出宫乃代及壙說載除飾小喪亦如之掌喪祭祝號王弔則與巫前歐陽謙之曰乃代者在宫之時喪祝為御出宫之後必有車僕代喪祝御柩車以行掌勝國邑之社稷之祝號以祭祀禱祠焉凡卿大夫之喪掌事而斂飾棺焉徐氏音辨曰郊特牲所謂喪國之社也甸祝掌四時之田表貉之祝號舍奠于祖廟禰亦如之師甸致禽于虞中乃屬禽及郊饁獸舍奠于祖禰乃斂禽禱牲禱馬皆掌其祝號歐陽謙之曰稠馬稠亦繁盛之義不必改讀亦可詛祝掌盟詛類造攻說禬禜之祝號鄭鍔曰盟則明其未來詛則詛其已往說者謂先王之於臣民臨之以正御之以信宜其詐僞不作何用盟詛為哉愚以為天下不能皆君子一一以君子待之則小人攘臂於其間矣先王不敢盡信也以為小人之情有不畏刑罰而畏鬼神者故為盟詛之法以待之是亦待衰世之意爾荀卿乃曰盟詛不及三王是不考周禮也故書言苖民之時泯泯棼棼以覆詛盟則又自三王已前有是事胡可謂不及三王耶應龍曰橫渠張子云周禮是的當之書其間如盟詛之類必有末世增入者要知詛盟見於有苖之時載於書尚矣在詩亦曰出此三物以詛爾斯則盟詛乃詩書之所有於周官何疑焉作盟詛之載辭以叙國之信用以質邦國之劑信所用載于盟詛之書其辭之所叙述既謂王國之信用而質成侯國之劑又謂之劑信則皆信由中出豈徒辭說云爾哉司巫掌羣巫之政令若國大旱則帥巫而舞雩鄭鍔曰巫既多故立司巫以統治之又曰建巳之月雩祀上帝者禮之正大旱而雩出於非常故帥羣巫而舞之國有大烖則帥巫而造巫恆鄭鍔曰大烖之時將以禳之故帥巫而造巫恆祭祀則共匰主及道布及蒩館凡祭祀守瘞凡喪事掌巫降之禮鄭鍔曰不止地示宗廟之中亦有瘞繒之類祭而瘞埋祭之終也司巫守之俟禮畢乃去見敬神之至也男巫掌望祀望衍授號旁招以茅冬堂贈無方無算春招弭以除疾病王弔則與祝前女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖則歌哭而請鄭鍔曰嵗時祓除以拔去其不祥釁浴則用香薰草藥之類沐浴如今五月浴蘭之類每嵗以時祓除釁浴其宫中之事乎應龍曰求雨以女巫以陰兆陰也大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治凡辨法者考焉不信者刑之鄭鍔曰典法則大宰之所建而大史亦建之豈其職與太宰比也大宰用是以治邦國都鄙官府小宰用是以逆其治司㑹亦用是以逆其治大史又建之以逆治何邪愚以為小宰二大宰之治司㑹考用財之數其書則建於大史也書者不刋之典苟無其書雖大宰之尊亦無所稽考亦謂之建豈不宜哉惟其書之所在故邦國都鄙官府有疑于所行之法者必求質證于此彼求辨於法吾以書而質證之有不信者是違法也詎可不待之以刑哉歐陽謙之曰大宰治官之長小宰治官之二司㑹主計大史掌書皆以六典八法八則逆治焉周家之法本以參互而考之也若夫法者上之所制而下之所用也用法不一其人甲欲用此條乙欲用彼條必須辨於官而後决大史必考其當否焉不信者必加之刑則後者必以公心用法而舞文弄法者無有矣信字當訓為實若曰用法而不當其實謂考于法書而不信也凡邦國都鄙及萬民之有約劑者藏焉以二六官六官之所登若約劑亂則辟法不信者刑之鄭鍔曰或問邦國都鄙與民上下相臨猶待約劑以為信何也曰盟誓要辭藏在府庫啓其書而考按讀其然否不信者不依約劑則與之刑罪正嵗年以序事頒之于官府及都鄙頒告朔于邦國閏月詔王居門終月徐氏音辨曰從步至戌謂之嵗禾熟可以千計謂之年鄭鍔曰或謂侯國欲其奉正朔則頒厯豫之使不敢違宜曰頒正朔乃言頒告朔何也應龍謂諸侯受朔每月必告廟而後行故有告朔之祭惡其不告也故頒正朔而謂之告朔爾大祭祀與執事卜日戒及宿之日與羣執事讀禮書而協事祭之日執書以次位常辨事者考焉不信者誅之大㑹同朝覲以書協禮事及將幣之日執書以詔王大師抱天時與大師同車大遷國抱法以前大喪執法以涖勸防遣之日讀誄凡喪事考焉小喪賜諡几射事飾中舍算執其禮事大宰曰前期十日帥執事而卜日遂戒大宗伯曰宿視滌濯歐陽謙之曰當祭之時於職事有抵冒所當辨明而不容已者大史掌禮故即禮書而考焉其人之行事有抵牾於書即所謂不信也則誅小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱大祭祀讀禮法以戒史以書叙昭穆之俎簋大喪大賓客大㑹同大軍旅佐大史凡國事之用禮法者掌其小事卿大夫之喪賜諡讀誄諱鄭司農曰大祭祀也馮相氏或問馮相氏即堯典羲和之職何如羲和堯大臣也周官馮相氏只以中士為之職之尊卑固不同然觀帝堯之世四時平秩分命申命止羲和四子爾周家正嵗年頒正朔則有大史焉以下大夫二人為之又有馮相氏又有保章氏殆不一職王者設官猶詳備於帝者矣掌十有二歲十有二月十有二辰十日二十有八星之位辨其叙事以會天位冬夏致日春秋致月以辨四時之叙鄭鍔曰在天有一定之位在人有行事之叙欲辨人事上合乎天位非明于天象者不知也太嵗在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒格在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若是為十二嵗之位正月為娵二月為如三月為病四月為余五月為臯六月為旦七月為相八月為壯九月為元十月為陽十一月為辜十二月為滁是謂十二月之位子丑寅卯辰巳午未申酉戌亥是謂十二辰之位甲乙丙丁戊己庚辛壬癸是謂十日之位自角亢氐房以至于翼軫是謂二十八星之位在天之定位各推其所在欲人之行事不違也乃辨其先後之序以㑹之春則平秩東作欲合乎日中星鳥之時夏則平秩南訛欲合乎日永星火之時秋則平秩西成欲合乎宵中星虛之時冬則平在朔易欲合乎日短星昴之時以至民之析因夷隩國之寅賓寅餞凡事之叙皆求合乎天是之謂㑹堯典之平秩所謂平秩者正此所謂辨其序事也四時之序必當致日致月致日必於冬夏至之日致月必於春秋分之日皆立土圭以待其景之自至也或問日月五星所以違天而右行者如何曰陳祥道曰天繞地而轉一晝一夜適周一匝又超一度天左旋日月違天而右轉日一日行天一度月一日行天十二度强天之旋如磨之左轉日月如蟻行磨上而右轉磨轉速而蟻行遲故日月為天所牽轉至於日沒日出非日之行乃天運於地外而日隨之出沒也正蕃渾天說曰天之形狀似鳥卵天包地外猶卵之裹黃朱氏楚辭注曰天積氣耳形如彈丸保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事鄭鍔曰凡此五物豈欲測未來以為奇中之術哉蓋辨於方萌詔王以救灾應變之道亦救灾者必貴乎有政應驗者不可以無事以政而救灾者人君之職欲其應變之事有先後之序必詢訪乃知內史掌王之八枋之法以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰豫八曰奪鄭鍔曰或謂內史掌書之職亦考其詔王之事幾類乎太宰而等級遼絶乃亦不同何耶應龍以為大宰者權之所在內史者書之所在也大宰建其典以詔王用其權內史掌其法以詔王案其書也用其權故可以馭羣臣按其書故可以詔王治詔王之語雖同乎大宰以權與書論之不侔矣爵祿廢置殺生豫奪王者馭天下之大柄操之掌握而不可倒持以授人者柄則在內史內史之尊亦可知矣此所以用中大夫為之也執國法及國令之二以考政事以逆㑹計鄭鍔曰國有一定之法又有一時之令掌其法書其令各有守不可亂也內史皆職其二而已漢書曰前王所是者為法後王所是疏為令又曰以考政事以逆㑹計與大宰司㑹更相參稽也掌叙事之法受納訪以詔王聽治凡命諸侯及孤卿大夫則策命之凡四方之事書內史讀之王制祿則贊為之以方出之賞賜亦如之內史掌書王命遂二之或問制祿之說以周官考之人數極多安得許多閒祿給之先儒嘗疑之矣朱子門人嘗問孟子所答周室班爵祿與周禮王制不同朱子謂畢竟周禮底是個全書經聖人手作必不㑹差孟子時典籍已散亡想見沒理㑹先儒之說往往只疑周官數多打算來豈有許多田祿分得愚謂此只是鄉遂中官數多爾殊不知此皆是寓祿非有如許多之官此如總二鄉之地其田視公之祿總五家之地其田視下士之祿又有各官目之下重寫者所以自唐以來疑設官之多方周時官不必備寧得有此若如後人所議却六卿已有三公臨之既立三公管卿則豈司徒所能統攝若謂退閒之官則文武之時寧有退閒之公卿大夫此但除却鄉遂之官特是寓祿便可無疑故嘗謂周禮晚出於煨燼之餘去古既逺世儒多有疑於周公之制蓋未之考爾如分田制祿孟子已說得分明南軒張氏謂孟子答北宫錡之言蓋出於師友之所𫝊故家遺俗之所聞者雖曰甚略而大綱可得而推之如下士之祿用五家之田所收蓋五家田五百畞藉五家之力以耕而收其租當五十畞之所入可以祭矣此所謂圭田五十畞也足以代其耕者如此下士與庶人在官者同祿庶人在官府史胥徒是也蘇子由古史疑周官府史胥徒太多朱子謂這個當時却多是兼鄭鍔曰既贊為之以方出之則王合義矣可書之以為後世法又藏其二則他日有所考既言內史讀之又言內史掌書王命言之重詞之復則其事可知也春秋之世城濮之役晉侯有功襄王命內史叔興父策命之為侯伯則周之家法猶可考之如此晉之克齊使鞏朔獻捷定王使禮之以侯伯克敵大夫告慶之禮又私賄鞏伯使相告之俾勿籍賜賞之非其義而內史不書又可知矣外史掌書外令鄭鍔曰有內令有外令王后之令行於宫中曰內令則女史書之王之令行于四方曰外令則外史書之掌四方之志掌三皇五帝之書鄭鍔曰四方之志則齊語魯語晉志鄭志之類孔安國序書曰伏羲神農黃帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也掌達書名于四方鄭鍔曰四方言語不同上世音讀與後世亦異欲使天下誦讀之際無東西南北之訛無古語今言之異則書之名不可不達也名者字也所以正名百物達之於四方使所謂皆同也小行人九歲諭書名蓋外史逹之九歲之久慮其不一又使行人往諭之亦書名既正道德乃一風俗乃同若以書使于四方則書其令王國遣使臣以文書頒行于四方則外史掌書其令以授之御史掌邦國都鄙及萬民之治令以贊冢宰凡治者受法令焉掌贊書凡治者受法令焉掌贊書歐陽謙之曰凡治者受法令焉掌贊書共一經也蓋治邦國萬民之事者受法令於冢宰時御史以治書史之官贊冢宰而授法令因書以豫之所以授法令者在冢宰所以贊冢宰而書豫之者在御史凡數從政者鄭鍔曰上自公卿下至元士無非從政之人既總其凡又總其數數則以小數計凡則以總計之知其凡數則官之冗省皆可得而見矣巾車掌公車之政令辨其用與其旗物而等叙之以治其出入鄭鍔曰凡國家所造皆公也車不同則用不同所用之旗亦不同所行先後之序亦不同掌其政以治其出入則凡公車之數與夫新故成毁無不周知之矣王之五路一曰玉路錫樊纓十有再就建大常十有二斿以祀金路鉤樊纓九就建大旗以賓同姓以封鄭鍔曰金之為物剛而克制以象義也象路朱樊纓七就建大赤以朝異姓以封鄭鍔曰象者剛潔而有文理不可以非理屈者也革路龍勒條纓五就建大白以即戎以封四衛木路前樊鵠纓建大麾以田以封蕃國徐氏音辨曰大麾黑色綏也王制曰天子殺則下大綏明堂位曰夏后氏之綏殷之大白周之大赤夏尚黑殷尚白周尚赤王后之五路重翟錫面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋翟車貝面組總有握輦車組挽有翣羽蓋鄭司農曰錫馬面錫總者以繒為之著馬勒直兩耳與兩鑣徐氏音辨曰總之色有朱有繪有鷖王之喪車五乘木車蒲蔽犬䄙尾櫜疏飾小服皆疏素車棼蔽犬䄙素飾小服皆素薻車薻蔽鹿淺䄙革飾駹車雚蔽然䄙髤飾漆車藩蔽犴䄙雀飾徐氏音辨曰詩云象弭魚服歐陽謙之曰疏飾蓋不加練治者徐氏音辨曰唐十道四藩志云果然之獸行有先後食有長幼服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車凡良車散車不在等者其用無常自役車以上皆在等者當以等而叙之自是之外有精作為功則曰良車粗作為沽則曰散車或良或散惟所用而已固無一定之常也凡車之出入嵗終則㑹之凡賜闕之毁折入齎于職幣大喪飾遣車遂廞之行之及葬執蓋從車持旌及墓呼啓關陳車小喪共匶路與其飾嵗時更續共其弊車大祭祀鳴鈴以應雞人歐陽謙之曰案雞人職大祭祀夜呼旦以嘂百官雞人呼旦之時巾車鳴鈴以應之示其車已夙駕也巾車已駕則人主固不敢緩於登車之節而人執事者寧敢有不及於質明之時者乎典路掌王及后之五路辨其名物與其用說若有大祭祀則出路贊駕說大喪大賓客亦如之凡㑹同軍旅弔于四方以路從歐陽謙之曰五戎之車當屬於夏官而屬於春官何也五者皆備其副以待用而軍政則不與焉故車僕所以掌是車而為巾車之屬而已車僕掌戎路之萃廣車之萃闕車之萃蘋車之萃輕車之萃凡師共革車各以其萃㑹同亦如之大喪廞革車大射共三乏聶氏圖曰容似今之屏風其制從廣七尺以牛革鞔漆之今案大射禮謂之乏射人職謂之容鄭兩注謂獲者所蔽以禦矢也蓋以容蔽其身故得禦矢司常掌九旗之物名各有屬以待國事日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌歐陽謙之曰九旗之物各有屬若日月之常則屬於王交龍之旗則屬於諸侯是矣餘王氏之說近之鄭鍔曰析羽者木路之所載王以思有所旌别也凡此皆諸儒取制字之義以言之立名不一故取義不同文字之制尤至理之所寓故因義以明理使人曉然得於目睫之間也及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌仲冬教大閲司馬主其禮司常主旗物故贊司馬頒之歐陽謙之曰大閲之際自諸侯孤卿已下皆在焉有蒞兵者有不蒞兵而但任事者孤卿建旜大夫建物不蒞兵者也師都建旗州里建斿縣鄙建旐蒞兵者也師都所謂鄉遂之大夫是也蓋蒞兵之主者也州里通言鄉遂之屬也如鄉之州長遂之縣正已下皆是也縣當是縣師之官所以掌間田之民其職若將有軍旅㑹同田役之戒則受法于司馬以作其衆庶鄙當是都鄙之吏如都司馬掌其都之衆庶車馬甲兵之戒令是也皆畫其象焉官府各象其事州里各象其名家各象其號歐陽謙之曰百官各象其事百官蓋在軍中任事者也其事所掌各不同司常頒旗舍人掌舍司兵建兵虞人之屬其事不一苟不象其事而畫之於旗人之所求者將何自而知官司之所在哉古者州里皆必有名左氏鄉取一人焉以歸謂之夏州則州有名也紂囚文王於羑里則里有名也則州里之官各象其名宜也古者卿大夫之家亦各有號魯有東門襄仲宋有桐門右師是其所謂號也則家邑之官各象其號宜也其所建之旗各象其所掌之事所居州里之名所在家邑之號而畫之旗焉是其所以識别也其不曉然易知乎凡祭祀各建其旗會同賓客亦如之置旌門大喪共銘旌建廞車之旌及葬亦如之凡軍事建旌旗及致民置旗弊之甸亦如之凡射共獲旌嵗時共更旌歐陽謙之曰㑹同賓客各建其旗與祭祀同而置旌門則㑹同賓客之所獨都宗人掌都祭祀之禮凡都祭祀致福于國正都禮與其服若有冦戎之事則保羣神之壝國有大故則令禱祠既祭反命于國鄭鍔曰禮有毫釐之辨彼都之人有不得用多矣又况奉祭之服乎命宗人以正之所謂正者與其他所正之禮服為有祖廟之嫌爾歐陽謙之曰都鄙之間有祭祀之事故羣臣有壇壝亦如國中也蓋太宰以八則治都鄙一曰祭祀以馭其神保羣神之壝祀羣神於壇壝以求其保佑之力也家宗人掌家祭祀之禮凡祭祀致福國有大故則令禱祠反命祭亦如之掌家禮與其衣服宫室車旗之禁令凡以神仕者掌三辰之法以猶鬼神示之居辨其名物以冬日至致天神人鬼以夏日至致地示物魅以禬國之凶荒民之札喪鄭鍔曰都宗人不言宫室車旗之禁令獨此言之者大宰有八則以馭都鄙有家之大夫宫室車旗從其命數非八則之所馭不可以不正也不正則季氏八佾舞於庭三家以雍徹矣
