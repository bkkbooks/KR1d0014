body:
  text: 周官集傳巻一元毛應龍撰天官冢宰第一宰者主治之名天下萬事無一不出於天天有是事人有是官凡有職位皆所以代天治事冢宰總六官之事無所不統故稱天官李氏曰古人位曰天位工曰天工職曰天職自有深意惟王建國辨方正位體國經野設官分職以為民極惟専辭也首稱惟王示天下後世尊歸天子之義劉氏曰天子作民父母以為天下王謂命之王也國王者所都劉氏曰能使四方諸侯朝宗覲遇奔走以聴命者王者所以國也國中九里九經九緯之制即野中九夫為井之制一九夫為井之制即提封九百萬夫之地之制四海之内放之而準國有體而野有經須立官以治民使民得其中正設官謂設天地四時之六官分職謂分治教禮政刑事之六職極者至極之義標凖之名如北辰之為天極屋棟之為屋極常在屋之中央而四外望之以取正焉者此所謂民極即詩所謂立我烝民莫匪爾極洪範所謂汝極君牙所謂惟爾之中皆是也昔武王克商受命首訪九疇遷九鼎以定都洛之大計成王周公嗣守文武大訓作新大邑於東國洛卿眡土圭匠用水縣晝參日景夜考極星辨方正位法天道也體國經野順地道也設官分職以為民極立人道也此周公制作萬世不能越自惟王以下至民極凡五句六官之首同此序文何同乎此也尊王也乃立天官冢宰使帥其屬而掌邦治以佐王均邦國立者設其官使者授以職帥如子帥以正之帥邦王國也經中凡單言邦單言國者王國也連言邦國者諸侯國也王者之道有先後本末之序無逺近之私近者治而逺者不治非均也書曰無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直所謂均也上云掌邦治尊得以統卑下言均邦國外可以包内王國所先侯國所後掌主為本均平為末六卿分任天地四時之官十二小卿應十有二月三百六十官之屬上當三百六十五度周天之數下應三百六旬有六日成歲之功而皆統於天官冢宰鄭注云象天者蓋謂此也治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人大宰者對小宰為文也如司徒以下各著大小二字於官名之上冢既訓大若稱大冢宰則文義複重又無縁以小宰為小冢宰宰者主治之名故止曰大宰小宰此經中變文之例餘各以尊卑為倍差劉氏曰府掌治典之籍史掌治書之札王氏曰有藏則置府有書則置史有令之事則置徒有徒則置胥孟子所謂庶人之在官者宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人宫伯中士二人下士四人府一人史二人胥二人徒二十人陳氏曰小宰中大夫治王宫之政令先王之治自内以及外以及朝廷及邦國自宰夫以下即叙宫正宫伯二官掌諸官府之在王宫者掌宮中之徒役掌貴㳺子弟宿衛王宫者宫伯為宫正之貳正猶帥正之正伯猶伯仲之伯膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人庖人膳夫之佐主辨名物故有賈八人辨名物者莫善於賈史之下次之以賈内饔中士四人下士八人府二人史四人胥十人徒百人外饔中士四人下士八人府二人史四人胥十人徒百人饔有内外而皆統於膳夫亨人下士四人府一人史二人胥五人徒五十人甸師下士二人府二人史二人胥三十人徒三百人獸人中士四人下士八人府二人史四人胥四人徒四十人䱷人中士二人下士四人府二人史四人胥三十人徒三百人鼈人下士四人府二人史二人徒十有六人春獻鼈蜃為互物之首故以名官腊人下士四人府二人史二人徒二十人腊從昔從肉言肉久而乾也醫師上士二人下士四人府二人史二人徒二十人醫能知五運六氣以飲食之屬養性養形却疾故在飲食官之間食醫中士二人食醫掌調和飲食之齊當與膳夫為屬謂為醫也故次醫師疾醫中士八人瘍醫下士八人若今之外科醫獸醫下士四人酒正中士四人下士八人府二人史八人胥八人徒八十人酒誥曰有正有事釋者曰正酒正也事羣吏之服其事者酒人奄十人女酒三十人奚三百人酒人之下疑有闕文奚賤者之稱唯其有宫中之役故有奄有女酒有奚下倣此王氏曰奄者蓋民之有是疾先王因擇而用之與籧篨蒙鏐戚施直鏄聾聵司火瞽矇修磬同應龍曰籧篨本疾名晉語曰籧篨不可使俯戚施不可使仰鏐弩眉也金之美者鏄鍾鱗也鍾上横木木上金華漿人奄五人女漿十有五人奚百有五十人漿人六飲言入於酒府者以酒正當奉之故也凌人下士二人府二人史二人胥八人徒八十人籩人奄一人女籩十人奚二十人女籩女奴曉共籩實之事者木豆為豆竹豆為籩瓦豆為豋籩宜乾物豆宜濡物聶氏禮圖云案士虞禮注云籩以竹為之有縢縁形制如豆亦受四升盛棗栗梅桃菱芡脯羞膴鮑糗餌之屬有巾聶氏巾圖説籩巾用綌被纁裏圜一幅醢人奄一人女醢二十人奚四十人醯人奄二人女醯二十人奚四十人鹽人奄二人女鹽二十人奚四十人幂人奄一人女幂十人奚二十人宫人中士四人下士八人府二人史四人胥八人徒八十人劉氏曰宫人掌其修潔者亦用士人焉應龍曰古者燧人王而始庖割軒轅帝而始棟宇故飲食居處之事雖並陳而先後有序掌舎下士四人府二人史四人徒四十人幕人下士一人府二人史二人徒四十人掌次下士四人府四人史二人徒八十人大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人賈善辨物及蓄藏之事玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人賈知玉者内府中士二人府一人史二人徒十人外府中士二人府一人史二人徒十人司㑹中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人東萊吕氏曰自大府至外府掌府藏財賦自司㑹至職歲掌㑹計財賦故大府為府藏長以下大夫為之司㑹為㑹計官長以中大夫為之權勢足相檢括不得為姦利也歐陽謙之曰自大府至外府貨財之所在而主藏者也若宋監左藏庫官是矣自司㑹至職幣貨財數目多少之所在而主計者也若宋户部是矣後世通謂之九府豈考之不詳而相襲以為説乎司書上士二人中士四人府二人史四人徒八人職内上士二人中士四人府四人史四人徒二十人職歲上士四人中士八人府四人史八人徒二十人職歲主出歲者以歲斷職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人古文幣與弊通謂事止功就而財有餘司裘中士二人下士四人府二人史四人徒四十人當是冬官裘氏之長掌皮下士四人府二人史四人徒四十人内宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人王内官之長陳君舉曰嘗讀闗雎知三代而上后妃極天下之選矣則宫掖之政一以聴之所為奚不可者今迺内小臣而下凡閹官九嬪而下凡婦官下至於女奴曉祝者曉書者曉裁縫者必屬之大臣則夫員數之増損職掌之廢置禄秩之多寡賜予之疏數皆禀命於朝廷而后不與且使内宰得以稽其功緒而賞罰其勤惰苟違有司之禁雖天子不得自以為恩是故私謁不行而内政舉古之所謂正家者葢如此而非屑屑然也今出房闥而方較是非於侵紊之後爭予奪於縱弛之餘抑末矣漢太尉楊秉糾中常侍而尚書詰以三公統外安得越奏近官葢内治不聴於公卿大夫矣無恠乎後世之多亂也歟内小臣奄上士四人史二人徒八人稱上士者食其禄也曰内小臣者别夏官之小臣閽人王宫毎門四人囿游亦如之刑人於守門則有之謂閽人則未詳以地官司徒守國門者下大夫二人又有上士中士下士之屬豈宫門嚴近而無官有司之職乃屬於刑人此於官名之下不見大夫士之官者當有闕文或是毎門四人者為之長刑人者為之役也囿如王者靈囿之囿㳺㳺幸之所寺人王之正内五人内䜿倍寺人之數九嬪嬪賔從之義世婦鄭鍔曰名世婦者亦以廣嗣之路女御鄭鍔曰女御八十一人經亦不言數其義亦如世婦女祝四人奚八人女史八人奚十有六人毛氏詩註曰古有女史彤管之法鄭鍔曰古者天子有史官左記言右記動故為天子者不敢有過舉王與后同體言動不謹則家道不齊無以舉天下之内治故有女史掌彤管之職典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人典絲下士二人府二人史二人賈四人徒十有二人典枲下士二人府二人史二人徒二十人内司服奄一人女御二人奚八人縫人奄二人女御八人女工八十人奚三十人染人下士二人府二人史二人徒二十人追師下士二人府一人史二人工二人徒四人屨人下士二人府一人史一人工八人徒四人夏采下士四人史一人徒四人大宰之職掌建邦之六典以佐王治邦國張氏曰周禮惟大宰之職難看蓋無許大心胷包羅記得此復忘彼其混混天下之事當如捕龍蛇搏虎豹用心力看方可建立也謂立國以來之典故也在朝廷曰經謂常所秉執以理天下也在邦國官府曰法謂常所守以為法式也其目則治教禮政刑事總言其書曰六典按六典八法八則九賦九式九貢九職大宰所掌大史所書司書所藏小宰司㑹有其貳他官各共所守不出乎六典之中佐者相左右也治者總教禮政刑事之法隨事施宜或損或益故為六官之首大宰之事于氏曰宰者濟其清濁和其剛柔而納之中和者此之謂也吕氏曰周官三百六十綱目盡在六典宰相之職乃天下事之總統㑹要處也陳氏曰六官各有典夏書曰政典葢從來久矣𫝊有秩官九刑大司馬法之類皆周六典也藝文志司馬法百五十五篇初劉歆以入兵家班固出之以為軍禮固之説是也今所存五篇朱氏曰考工記即事典也應龍曰禮典恐即是儀禮今儀禮相傳為周公作韓子曰儀禮行之於今者葢寡然文王周公之法制粗在於是刑典如吕刑中所言是其槩也一曰治典以經邦國以治官府以紀萬民萬民侯國之萬民此三者治法之大節目有經則有緯陳大猷曰經如今機織家先立絲以為之經有綱則有紀司馬温公曰若網之有綱若絲之有紀應龍曰經邦國者九服碁布於外經之使不易其常紀萬民者細民絲紛於下治之而不遺其小言紀則於經為詳也官府者王國之官府治之所從起也先言邦國次言官府明諸侯國亦各有官也天子曰兆民諸侯曰萬民舉外以包内也二曰教典以安邦國以教官府以擾萬民安者使安其分得其所教則授之以為治之意使之習熟於告戒然後施之事者無悖也擾如擾龍之擾馴伏其性而調順之三曰禮典以和邦國以統百官以諧萬民諧如八音克諧蓋八音清濁大小其音不同四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以糾萬民刑者聖人不得已而用之所以禁止其惡敺而之善也糾割也察也刑百官如刑于四海之刑所謂士致百姓于刑之中也三山陳氏曰刑者特隄防之具爾鄭鍔曰萬民有過懼其積小以致大必糾其纎微無使藏姦匿惡以致於亂六曰事典以富邦國以任百官以生萬民事者度地居民興事造業民日用之生生不窮如十三卦聖人制器之類通變宜民衛文公務材訓農通商惠工馴致殷富又曰周官一書全只以典為本理財雖以九式為要而九式亦不出乎六典之外以八灋治官府典灋則式其義皆相附近典包法則式之事法則式各得典之一義以者施用之名八灋者官屬官職官聨官常官成官法官刑官計也治者舉辨㑹聴經正糾弊也官府見上注又按諸解以此八法之目即小宰所掌六屬八成之類名同而實非也小宰所掌乃此八灋之貳一曰官屬以舉邦治屬者系屬如物相系屬則可舉舉者有所秉執而興起之也書曰各帥其屬凡建官則設屬以佐之以小傅大以卑隸尊脈絡貫通無不舉者二曰官職以辨邦治鄭鍔曰官雖設屬必有分職之法則邦治可辨葢庖人雖不治庖尸祝不越尊俎而代之官各有職則責各有歸治不患其無辨也應龍曰職專事治如目辨色三曰官聨以㑹官治大宰統百官均四海故有官聨以㑹官治聨者總衆異以為同㑹者合萬殊而為一自有衆賢肅和同寅協恭氣象四曰官常以聴官治歐陽謙之曰官常一官之常職任一官之事者守其一官之職待夫事之屬於本職者然後以其職而治之此所謂以聴官治王氏曰八灋惟官聨官常曰官治者以官之聨事官之常數特言一官爾故不言邦而言官也五曰官成以經邦治經者一定不易之名事至視已成之式以成其事物至視已成之式以成其物謂之成憲有司依據而行者也六曰官灋以正邦治七曰官刑以糾邦治八曰官計以弊邦治官刑即書所謂制官刑儆於有位糾者割制之使不為非察舉之使不敢慢以八則治都鄙法如衡之有權則如尺之有度三山鄭氏曰法有變有通欲得其平則立為定式使之取則應龍曰稍地曰家邑大夫之采縣地曰小都六卿之采畺地曰大都三公之采家邑以處大夫及王子弟之封邑視大夫者縣邑以處卿及王子弟之封邑視卿者大都以封公及王子弟之封邑視公者家邑附内縣都附外此八則者治都鄙之法也故秋官有都則之職掌都家之八則春秋𫝊曰有先君之主曰都謂其始封之君也鄭鍔曰都鄙之於王國譬之一家户庭之於堂室也為父兄馭子弟之術不過立為凖式使之取則王者之於都鄙殆亦然爾以其有先君之主故曰都以其在王畿之鄙故曰鄙其地不出王畿之外非如邦國諸侯得以自治其國故王朝立施設之則使之事事取則於此焉一曰祭祀以馭其神祭祀者其先君社稷五祀所食也大宗伯頒祀於邦國都家鄉邑都宗人掌都祭祀之禮此有其則不可以僣瀆不可以怠廢馭者馴而納之於善謂調習之使各由其所當行之路而不出於法度之中也歐陽謙之曰馭葢制馭之意所謂馭其神非所以施之於神所以制馭夫都鄙之君所以事神之道二曰灋則以馭其官歐陽謙之曰有都鄙之主則有官屬其屬有其長得自除者有必待朝廷除者兼品秩禄廩之厚薄員數之多寡皆須為之定法乃馭其所以處官職之道也三曰廢置以馭其吏或因事而建置事畢省廢皆不使至於冗濫故謂之馭吏羣吏也庶人之在官者歐陽氏曰都鄙之長雖曰畿内諸侯然猶王所自治如都宗人都司馬家司馬朝大夫都則都士家則家士皆王國自命之是其可不同夫内之官府察其人而廢置之其權可不在王國乎四曰禄位以馭其士禄田禄位朝位歐陽謙之曰學士即卿大夫之子卿大夫即都鄙之長取其子弟之有賢能精學業者而擢用之此成周教胄子之本意也或問八則禄位以馭其士鄭司農注士學士也其説似拘如何曰士以禄位言固難一槩論按夏官司士之職掌羣臣之版賈氏謂羣臣者畿内朝廷及鄉遂都鄙諸臣故陳氏云凡以道藝仕於國者不以貴賤總謂之士始附於版者士也故曰司士又按宫伯掌王宫之士庶子凡在版者此所謂士乃公卿大夫元士之適子庶子王氏曰庶子國子之未仕者愚謂以士對庶則士為己命者也此經馭其士者都鄙之士也上文既曰馭其官馭其吏此又曰馭其士信乎為都鄙言之則士者公卿大夫之子而已五曰賦貢以馭其用九賦斂財之則九貢制用之則都鄙以十一之法賦於民以四之一參之一之制貢於王而後得用其餘而其用度亦又有則歐陽謙之曰賦即邦縣邦都家削之賦是也貢即閭師貢其物之類是也都鄙之地食其公田之入即所謂賦然豈無山林川澤可以税取者乎是所謂貢周人之法征其米粟征其布縷征其力役惟闗市有泉布及無職者出夫布宅不毛者有里布外此未嘗取民以錢也孟子亦謂有布縷之征力役之征而已而鄭氏解九賦專引漢法以為口率出泉不知所考而云夫泉布者官所自鑄非民之所有也周人制賦惟以民之所有不責其所無若角人齒角之物羽人羽翮之政掌葛絺綌之材者皆使之以當邦賦是可見也至闗市有泉以交易則或征之其宅不毛與凡田不耕與無職事者稍征其布以困苦之而使無舎本趨末而已非征賦之本意也詎可以後世之横取而誣先王之仁政哉六曰禮俗以馭其民節文必因乎人情好尚不違乎禮制七曰刑賞以馭其威鄭鍔曰當刑而刑當賞而賞必循吾賞罰之則應龍曰刑賞忠厚之至洪範曰惟辟作威盖此都家之獄必上於國所以制為所得用之刑賞而有其則爾八曰田役以馭其衆田畋狩之總名役師徒之總名散而居曰民合而興曰衆古者諸侯田不過三祭祀賔客充君之庖役不過三凡一夫歲用其力三日上農夫食九人可用者家三人所以立為之限制使循吾田役之則也鄭鍔曰田役合民而用之故曰衆馭其衆則彼不敢非時而用衆以八柄詔王馭羣臣大宰八柄大臣之事與内史八枋有司之事不同大臣之事有揆度有司之事奉法而已鄭氏曰柄所秉執者王氏曰言操此以為用也應龍曰馭者馭而納之於善羣臣受命於上有職位者大宰之職如六典八灋八則之屬凡不言詔王者皆佐王所施行之事如八柄八統之屬凡言詔王者皆冢宰常行之事但以其目詔告于王也周官有官府有羣臣有羣吏皆謂之臣官府則備一官為卿百官有司統焉羣臣則命士以上者之稱羣吏掌於小宰乃庶人之在官者府史胥徒之屬一曰爵以馭其貴一命以上不與凡民齒貴也鄭鍔曰以爵為貴其柄在我乃所以馭之也二曰禄以馭其富有爵則有田賦吏民所以賦也鄭鍔曰以禄為富其柄在我乃所以馭之也三曰予以馭其幸鄭氏曰予者賜予也鄭鍔曰幸者人臣一時之遇也四曰置以馭其行置者特有所建立之名行謂徳之可見於行事者也五曰生以馭其福王制弗故生也亦此義六曰奪以馭其貪七曰廢以馭其罪八曰誅以馭其過奪者絀爵削地收其田里之名此禄以馭其富之反也以八統詔王馭萬民統猶綱也舉於上而下自從焉一曰親親二曰敬故親謂父母兄弟宗族故謂舊老成人親親仁也敬故義也親敬二字便是詔告於王以統馭萬民之體要處論語曰君子篤於親則民興於仁故舊不遺則民不偷三曰進賢四曰使能進者推舉而登進之使者稱其能而任之賢者能者凡民平日所景慕而從之者也五曰保庸六曰尊貴以其嘗有功於民能保民者故保安之尊貴者天下有達尊三爵一是也此二者民之望也七曰達吏八曰禮賔達先之也吏有司也語曰先有司吏者承流宣化道民情者也書曰臣為上為徳為下為民賔異於常人者以禮禮賔之如先代之後及故舊先哲把宋與箕子商容之屬考大宰職首至以富得民又當分兩節看六典八法八則八柄八統是掌邦治之事為一節九職九賦九式九貢九兩是制國用之事為一節上一節六典為要其𦂳處在八統下一節九式為要其𦂳處在九兩八統九兩皆歸宿於民民者邦本以九職任萬民萬民諸侯國之萬民舉外以見内陳君舉曰天之生民未有無能而養者能其事而後可以養無事而食衆之殃也故聖人制天下之民各從其能以服於事大宰既任之職閭師又責其功故曰無職事者出夫布也王制瘖聾跛躃斷者侏儒百工各以其器食之後之㳺民作無益以害有益者可勝計哉正義曰器能也因其各有所能供官後使以廩餼食之如晉文公問八疾胥臣對云侏儒扶廬聾聵司火之類各以器食之扶廬持㦸柄也司火主然火也一曰三農生九榖九榖黍稷稻粱麻大豆麥苽也周以農事開國故八政以食為首九職以農榖為先三農亦曰上中下三等之農二曰園圃毓草木毓養也載師以場圃任園地因園圃之民而用之以養毓之職則草木得遂其性矣草葵瓜之屬木桑棗之屬三曰虞衡作山澤之材山虞掌山林之政令川衡掌巡川澤之禁令山林川澤之職有聨事也作者作興凡國家用度需材山澤之産為多虞衡掌其政令識其可用之材作而興之如仲夏斬陽木仲冬斬陰木以至蒯紵菅葛染草之屬無棄物也四曰藪牧養蕃鳥獸凡魚鴈狼鹿之屬生藪麓之間牛羊六畜之物在牧養之數藪則大藪小藪虞人任其事牧則牧人及養鳥獸之官任其職鄭鍔曰藪牧之民而任以養蕃之職則鳥獸不可勝用矣五曰百工飭化八材六曰商賈阜通貨賄工者審曲面勢飭財辨器之職飭者致力以治之化者因形移易以成之八材金本羽革骨角玉石如飭金則化為鍾斧之屬爾雅曰珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剥羽曰析今本珠作骨七曰嬪婦化治絲枲鄭鍔曰嬪有夫者之稱書曰嬪于虞虞舜夫也婦有姑者之稱春秋書伯姬來逆婦伯姬姑也應龍曰枲麻屬治絲而化之以為帛治枲而化之以為布八曰臣妾聚斂疏材聚者收之於此斂者取之於彼疏麄也疏材未飭治之材鄭鍔曰疏百草根實可食者材薪芻之可委積者此說雖本注疏之言此不取九曰閒民無常職轉移職事閒民閒隙之民任已職之外有餘閒可以執他人之事所謂通功易事以羨補不足者或問九職任萬民劉説亦善劉氏曰九職者任天下之民以九事也頒其職之事則大司徒主之任其民而徴其賦貢則閭師掌之大宰之所掌者域萬民用九職以為業則普天之下率土之濵無異業之民所以均四海統萬民故無左道以惑衆者無㳺手以失職者無夷風以亂華者莫不係於鄉閭由於禮義而用中於五品者焉是故無遺一民毋棄一物無缺一用於天下以九職域其民故也秦漢以降其民不入于九職者多矣求建其極不亦勞乎以九賦斂財賄一曰邦中之賦賦者自上取下之名其别有九財賄與貨賄同二曰四郊之賦按四郊去國四面各百里三曰邦甸之賦按四丘為甸出車一乗四曰家削之賦王昭禹曰家削家邑稍地五曰邦縣之賦邦縣五鄙為縣六曰邦都之賦邦都四縣為都方五百里七曰闗市之賦闗市市必有闗見司闗之賦八曰山澤之賦名山大澤不以封山師川師掌其政令九曰幣餘之賦歐陽謙之曰凡財之入於官者皆謂之賦而官貨財物之出入其籍各異其出而為用也既載於出財之籍矣則用餘而復入於官也豈可不又載之入財之籍乎既載之入財之籍安得不謂之賦哉徐筠曰此載師任地所征之賦也鄭氏曰賦者口率出泉後之筭民錢或謂之賦又曰幣餘謂占賣國中之斥幣二説皆非經義豈有九賦而出錢者以九式均節財用均平也節為之防範使無過不及之差九式有一定之常目為不易之經制以之均財為有道以之節用為有禮無有餘之浩不足之暴無豐年之奢凶年之儉當時皆别其書鄭鍔曰節其一而不節其二節於此而不節於彼非均節也凡事各有式以為之節是之謂均所謂式者為之書以記其多寡也一曰祭祀之式鄭鍔曰祭祀有天神人鬼地示之殊應龍曰祭先血腥祀尚氣臭其大小有制豐殺有數二曰賔客之式賔客先代之後朝聘之禮有親逺新舊三曰䘮荒之式以凶禮哀邦國之憂有輕重緩急鄭鍔曰䘮有􅉠賵視其爵等之高下荒有賑救視其灾勢之輕重四曰羞服之式羞飲食也服衣服也有尊卑貴賤曲禮曰庶羞不踰牲燕衣不踰祭服五曰工事之式器物必中度量有精麤廣狹如考工所記是也六曰幣帛之式式謂有名物數制七曰芻秣之式草曰芻榖曰秣有勞逸逺邇八曰匪頒之式王所分賜羣臣之禮如分寶玉頒祀頒禽歸脤之類有親有賢九曰好用之式好與為好也玉府曰好賜此如燕勞羣臣兄弟明友賜玉賜器之類有功有故鄭鍔曰燕好所用者雖至尊用財不可以有司之法拘之亦不可過制焉以九貢致邦國之用貢者下奉上之名庶民有田則有賦諸侯有國則有貢貢亦出於賦故致者至也使之自致而已不可以徴而求也周官制為九貢之法令五等侯國各守常職以貢其所有以為王國之用度其不在九貢之法者上弗受也下弗進也歐陽氏曰致邦國之用乃朝廷所須以為用而出於邦國者則不致其無用之物可知矣一曰祀貢二曰嬪貢鄭鍔曰祀貢祭祀所貢凡可以交神明之物三曰器貢四曰幣貢鏐鏤石磬丹漆之屬凡可以為用器兵器禮樂器之物五曰材貢鄭氏曰材貢櫄榦栝柏篠簜也應龍曰按集韻杶亦作櫄夏書杶榦栝柏六曰貨貢鄭鍔曰貨如金玉龜貝之類七曰服貢絺紵𤣥纁纎纊織皮之類凡可為服之物八曰斿貢斿者鄭司農以為毛羽謂旌旗之末為斿也康成以為燕好珠璣琅玕之屬謂囿游之為斿也或曰司常斿車載旌以田之鄙以斿為田獵巡幸之名如所謂取於相土之東都以待王之東蒐者之類也應龍謂此當闕疑九曰物貢如山澤各以其物貢是也以九兩繫邦國之民周官九兩之法使兩兩相繫有彼不可無此雖天下之廣萬民之衆體勢聨屬若系無間然也一曰牧以地得民牧者牧民之官王制建五等諸侯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有牧各有分地故曰以地得民鄭鍔曰五等諸侯皆有地獨言牧何也葢牧者諸侯之長諸侯雖有其地苟非八命之牧修方伯連帥之職使之大小相維亦無以保其地何以得民哉二曰長以貴得民以官府則有長大事從之尊朝廷莫如尚爵尚爵者古今天下之達道也故曰以貴得民三曰師以賢得民師者民之模範也有徳行賢于民民從而師之通貴賤以至四民九職必皆有師服勤至死為其賢也四曰儒以道得民儒通天地人之稱有行誼能傳道解惑引民由是而之者師與儒二者在朝廷則有師氏保氏之官在閭里則有左右閭師之職鄭鍔曰古之致仕而歸於鄉里者謂之師儒五曰宗以族得民宗宗子也六曰主以利得民利者其都邑之民利賴之也泉府曰都鄙之民從其主國人郊人從其有司又大夫之家亦稱主歐陽氏曰民大夫之臣𨽻也大夫之家臣呼其大夫曰主左𫝊曰事吳敢不如事主七曰吏以治得民吏治其賦者國人郊人從其有司是也八曰友以任得民鄭氏曰友謂同井相友助者鄭鍔曰急難之際能相保任則民不忍棄之九曰藪以富得民澤無水曰藪有大中小三等虞人掌之鄭鍔曰澤中水去草生包藏孕育者多民欲其富而不去應龍曰先王之制於藪有虞掌其政令為之厲禁則其間所生之物充牣繁庶而民足以致富利重而難遷惟土物愛厥心臧也王次㸃曰財散則民聚故牧長主吏師儒宗友之後以藪富終焉善治者當務識其大體應龍曰九兩大意與八統相似上一莭論治體不以八統馭之則徒法不足以固民心下一莭論財用不以九兩繫之則務財不足以得民聚正月之吉始和布治於邦國都鄙始和讀連下句正月者以是月為十二月之長和如四方民大和㑹百工播民和周書常用此和字周禮以歲終令百官府各正其治受其㑹聴其致事至王正元㑹大宰以是日為始和布治法於天下夫治法之在邦國都鄙固有一定而不可易者然古人平在朔易革故從新其事實繁方一歲之首豈無所當改易害則除之利則興之民之所既倦則不以困民民之所未安則不以強民將與時偕行新新而無窮也按周以建子為正此是正月元㑹所行在唐虞三代雖未見元㑹之文而考之載籍自有正月上日之文以來莫不從用此日可推而見乃縣治象之灋于象魏使萬民觀治象挾日而斂之乃者承上文起下義此正歲建寅之月也縣垂也治象前所布治之象也又從而畫象其事以明其法也象闕雉門外東西兩闕也象者謂祖宗以來垂象於此也魏者當道高巍巍然也挾日從甲至甲十日一周浹也考周官之法並以建子之月謂之正月以正時王受命之紀而以建寅之月為正歲以正天運四時之序凡計月之一二必以正歲為一月也大宰掌邦治既於正月建子之月以其典籍布之邦國都鄙藏在官府有司守之以時奉行矣又於孟春寅月四時之首萬民畢出之時以前所布之治法畫象其事垂之雙闕之下使臣民皆得觀見其法之形象縣之高則無不見斂之速則無玩詩曰周道如砥其直如矢君子所履小人所視謂其均平洞達無不備也正歲見下小宰文或問鄭氏以正月為周正之月正歲為夏正之月是一年有兩正月而集𫝊各從其説何也曰周雖改正朔而未嘗改時月周以建子為正凡大朝㑹大建立行之於建子之正所謂時王之正也然春夏秋冬乃天運四時之正凡十二個月從古至今未嘗易考之書前乎周者以建丑為正其書始即位惟元祀十有二月乙丑以見月未嘗易考之史後乎周者以建亥為正其書始建國曰元年冬十月以見時未嘗易故周禮經文有正月又有正歲互見於大宰小宰葢小宰所以佐大宰者也大宰布治法於建子之月所以明一代時王元㑹之正故謂之正月小宰帥屬觀治象於建寅之月所以明一歲天運時序之正故謂之正歲今以周之時月考之七月周公陳於成王之詩也曰七月流火九月授衣則成王時月未嘗改也六月宣王詩也而釋者曰盛夏出兵則宣王時月未嘗改也四月幽王詩也而曰四月維夏六月徂暑則幽王時月亦未嘗改也朱子曰所謂改正朔者以是月為歲首耳月固不易也葢改正朔為歲首者時王之正而月固不易者歲有四時所謂十二月之序則不可紊也故嘗謂自堯典定時成歲之後不特三代無改時易月之事如四時十二月之序乃百世不能改者惟改正朔繫於時王之典各用所改之正以為正初不嫌於謂正月或者執朱子不改月之説遂疑鄭氏解周禮正月之吉為周正月則是改十一月為正月而建寅又為正月是一歲有兩正月不思朱子固嘗曰三代之正不同夏用人正商用地正周用天正以此推之商用地正則十二月商之正月也周用人正則十一月周之正月也既曰正矣何嫌於以十一月十二月為正月乎至于一歲兩正月之疑以周禮考之經文所以特謂之正歲此固可見按史唐武后天授元年十一月朔日南至改用周正以十一月為正月十二月為臘月夏正月為一月武后是時改唐為周取法周正則在周十一月不嫌於稱正月而十二月為臘月夏正月為一月凡此者安知武后非據周而改作乎况周禮正月大宰布治法於邦國都鄙至正歲而後小宰率屬觀治象而徇以木鐸以先後次序考之正月正歲之分固已可見兼經文尤有明白可信者如鄉大夫職云正月之吉受教法於司徒下文云歲終則令六鄉之吏㑹政致事正歲令羣吏攷法於司徒以退各憲之於其所治又州長職云正月之吉各屬其州之民而讀法下文云歲終則㑹其州之政令正歲則讀教法如初故嘗謂世儒泥執一偏之見率以大宰正月始和為夏正月其意豈非謂正歲之文見於小宰而大宰乃縣治象之法本文原不曽有正歲二字因以鄭注為非却不知地官鄉大夫州長二經皆於上文云正月之吉於下文歲終之下又云正歲如此觀之經文三節極為明白要知正月即周正之月以十一月為歲首也歲終即豳詩曰惟改歲之月以十二月為歲終也既歲終矣又云正歲則是以夏正建寅為得一歲四時之正凡周人歲首之事又於此時重申之故觀鄉大夫職云正歲憲之於其所治之國則大宰乃縣治象之法其在正歲為可知也觀州長職云正歲讀教法如初則所謂如初者即是如正月始和之初為可知也不然經文上下同此一職既曰正月又曰正歲既言受法於司徒又言考法於司徒既云屬其民讀法又云讀法如初此豈同一時之事哉後世儒者於周禮正月例以夏正為拘者但參以經文則是是非非不辨而明矣或問周禮正月之吉與春秋王正月同乎曰正月者周正之月二書所稱其義固同也嘗考春秋書元年春三字是一截書王正月三字又是一截左氏傳曰元年春王周正月此説最為明白不可例以傳不可信非之程子曰周正月非春也只此一言已足以袪千載之惑故觀程子之説有所謂周正月則知周禮經文稱正月之吉是周之正月無疑嘗觀胡文定公謂春秋以夏時冠周月其意葢謂冬不可以為春而誤認程子假天時以立義之説遂謂春秋行夏時以繫年故以春之一字冠於周正月之上則是春者夏時之春也不思周以十一月為正而未嘗以十一月為春若以夏時之春為周正之月則似以冬為春此決不然葢周自東遷以後魯用魯厯國自為政時亦寖紊以聖經書法攷之則以十一月為春者魯之元年也何以言之魯隠公即位之歲則周平王四十有九年也在春秋書法當云王四十有九年正月而書曰元年春王正月以元年春繫之隠公以正月繫之王其義昭然可見聖人之意若曰元年者魯自改元之元年非王之元年春者魯自以為春非王之春故曰元年春獨正月則王之正月爾故曰王正月要知聖人因魯史修春秋書隠公元年春者乃因魯史之舊文而寓王之一字於元年春之下者乃出夫子之特筆此説信為攧撲不破近世儒者以建寅之月為氣候始温和遂以周禮註疏釋正月建子為非徒執泛泛一偏之説而未嘗合前後經文參攷而紬繹之故嘗為之説曰商以建丑為正周以建子為正而皆用夏時數月則以十一月十二月為正未嘗改月者固也然未知春秋書王正月則以尊時王之正朔周禮云正月之吉則以出歲首之政令二者皆建子之月此不易之論也或又問前説始即位書元祀十有二月始建國書元年冬十月以證歴代改正不改月是矣獨周公作六典夫子作春秋乃以周十一月改書正月何也曰元祀十二月元年冬十月史官書法之當然也史以年繫月固不可易月以紊四時十二月之序若周公制禮于毎歲舉行元㑹之儀授時飭典以建子為十二月之長故大宰於是月布治所以昭時王之正則不得不稱正月至夏正建寅之月乃四時之首為一歲之正則不得不改稱正歲小宰於是月師屬觀象徇以木鐸此正有合於夏書孟春木鐸徇於路之事夏書徇鐸下文所舉政典先儒謂政典乃六典之一周之六典葢因於夏則周禮正歲徇鐸宣令實遵夏之舊典攷之是月在夏曰正月在周曰正歲其為孟春則一也至若春秋所書王正月寓王之一字於元年春之下聖經所以著魯公無王之罪其義昭然或問周公於周禮改建子之月為正月而以正歲表建寅之月然凌人又云正歲十有二月何耶曰於此見周用夏正數月而先儒月未嘗改之言信矣正歲者謂夏之建寅為正十有二月建丑乃冰堅腹厚之時按豳七月詩云二之日鑿氷沖沖朱子詩傳謂周禮正歲十二月令斬氷是也攷之凌人正歲經文故書正為政鄭司農云凌人掌冰政主藏冰之政也於義亦通然以經文上下推之若以凌人掌氷政為句絶而下句以歲十有二月為文則不見周雖改正建子而用夏正數月乃歴代不易之制故杜子春謂政當為正以正歲向下為義是以註疏皆不能易其説也乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃亦更端之辭也典六典也牧牧民之官監監守也王制天子使大夫監於方伯之國國三人梓材王啓監厥亂為民吕氏曰黄帝立左右監監視萬國建者始初開創之名立者繼有植立之義合三人之益曰參叶五人之助曰伍傅者上下相附著也殷衆也謂衆士也陳則旅衆一體置則可自署置王制大國二卿五大夫或問正月始和毎歲布治縣象以示更新而所謂牧監以至殷輔亦皆毎歲建立設傅陳置之何若是之紛更與曰先王之時其修明法度督責臣下最為周宻故凡正月布治縣象於典則法之不宜者既有以變而新之矣經下文又曰乃施之于邦國都鄙官府此非他有所施也正所以督責夫推行於天下之人蓋謂布于此者欲其施于彼若夫玩法而不治之人大宰已得於歲終受百官致事之時至是豈可恬視而不為之變置故不得不繼之以建立設置之事也大宰於歲終詔廢置彼自牧長至於殷輔凡不在所廢者則皆在所建立設傅陳置矣牧非世牧也九牧之牧取諸侯之有功徳者為之非若有國之諸侯得以世其國者監則監諸侯之國者其禄視諸侯之卿其爵視次國之君其禄取之於方伯之地凡此皆有升黜改易待正月而舉行之大宰歲終與公卿共飭國典以待來歲之宜者此皆其事也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔長都鄙之長兼二人之力曰兩乃施灋于官府而建其正立其貳設其攷陳其殷置其輔凡為各官之長皆正也凡為各官之倅貳者皆貳也攷稽也如今官府必有稽攷炤㸃磨勘之職或曰宰夫鄉師肆師之屬凡任稽攷之職者皆謂之攷餘同上又按此以上三條曰施典施則施法是布治之大綱曰邦國都鄙官府是施行之次序曰建牧建長建正之屬是分職之大概鄭鍔曰上言布治謂治道隨時之宜毎歲有更革所以通其變此又云施典施法施則者邦國都鄙官府所守一定之制久而不易者也凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賔客之治凡者其目不一發凡於此歲首布治施之於彼者歲終受㑹以待之於此典必合於典則必合於則法必合於法也官成在八法禮在六典民則邦國都鄙皆有民而有閒田公邑之民王者使吏治之者不在典則之中而在官成之法賔客者先代之後王以賔禮接之雖其治法同在邦國之典而待之之禮則異於諸侯羣臣故二者别出之又按周宫職文葢載未盡者皆於後稱凡以總之諸稱凡之例始此祀五帝則掌百官之誓戒與其具脩五帝五方之帝春官兆五帝於四郊是也大昊炎帝黄帝少昊顓頊食焉誓戒其所當戒者具者牲牷器皿之屬脩者飭治掃除之類掌者掌其法而其事則有司者治之秋官條狼氏之職凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不闗鞭五百誓師曰鞭三百誓大史曰殺誓小史曰墨前期十日帥執事而卜日遂戒此上文誓戒目及執事眡滌濯及納亨贊王牲事贊助也亨熟之也及納牲受亨之時贊迎牽殺獻之事毛血爛腥熟之等及祀之日贊玉幣爵之事自眡滌濯已下至此所謂具脩也祀大神示亦如之享先王亦如之贊玉几玉爵玉几所以依神天子左右玉几宗廟獻用玉爵特言玉几玉爵者天地五帝不用不用者何無飾也無䙝也大朝覲㑹同贊玉幣玉獻玉几玊爵大䘮贊贈玉含玉㑹無常期謂若諸侯有不順服者其順服之國皆以師來助王討之而曰㑹也同者謂如王即位始建諸侯及王十二年不巡守則諸侯皆來朝而曰同也鄭氏曰贊助也玉幣諸侯享幣也玉者圭璋璧琮琥璜幣者馬皮帛錦繡黼玉獻諸侯獻國珍異亦執玉以致之如来獻其琛之類足也玉几立而設几優尊者也凡大朝覲王位設黼扆前南鄉筦筵繅席次席設左右玉几玉爵禮諸侯之酢爵王朝諸侯禮之於阼階上謂上公再祼而酢侯伯一祼而酢助王所受之爵也應龍按朝覲㑹同之禮其事則大宗伯相之其細者司儀大小行人等掌之大宰惟助王受此四者而曰大朝覲㑹同此非常之禮也朱氏曰覲是正君臣之禮較嚴天子當依而立不下堂而見諸侯朝是講賔主之儀天子當宁而立在路寢門之外相與揖遜而入作大事則戒于百官贊王命國有大事若軍旅之事之類戒飭百官有司則助王為教令若書曰周公以王命誥鄭鍔曰作者創始而為之贊則助之以言叙述王意以啓迪之也王眡治朝則贊聽治眡四方之聽朝亦如之聽聽斷也四方之朝王出巡狩諸侯於方岳之下及六師在外亦有視朝聽斷之事凡邦之小治則冢宰聽之待四方賔客之小治凡者其事不一總括不盡故言凡以該之例始於此六典言佐王八柄八統言詔王此治之大者非大宰之所得聽也惟邦之小治冢宰得以專决四方賔客之來其治之小者亦得以自待之鄭鍔曰治之大者不禀于王則嫌於專朝廷之權治之小者不聴於冢宰則無以重大臣之權姚崇為相常於帝前敘進郎吏帝以為我任崇以政大事吾當與決至用郎吏崇顧不能重煩我耶此亦以重其權也歲終則令百官府各正其治受其㑹聽其致事而詔王廢置三歲則大計羣吏之治而誅賞之歲終十有二月百官府非特治官之屬凡百官有司皆在焉治者有司之職㑹者宰夫司㑹之事聽者大宰之法廢置者王所柄執之權按廢置二義一為官職一為政事蓋布治所以端始正治所以成終此月令天子與公卿共飭國典之時也一歲之終將㑹計之先先戒令之使凡百官府各自正處其治狀各從有司者㑹之㑹之而致其功狀則聽而平斷之以告於王而行廢置之法明始終之條理體統之崇卑周官之制自縣象至正治受㑹皆先事而教有忠厚之意無不戒視成之暴周官凡所施行皆如此又按三歲則積歲終之㑹者三聽者三廢置者三而大計之三有功而不怠三有過而不改則誅者誅賞者賞此不言詔王者歲終詔王則三歲之大計可知按虞書三載考績三考黜陟幽明至成周時其事寖繁而其法亦詳矣或問周官歲終受㑹三載誅賞較以唐虞三載考績三考黜陟得無責效之太速與曰考課之法急之則詐偽生寛之則功實見待之以久則在職者安心展布以見其能此唐虞三考之法固善也而亦由當時朝無倖位百僚師師故可須之以久所謂考績不過時加警䇿以作其怠爾至若三考黜陟則流放止於四罪而臯陶稷契皆終其官不徙其在所陟者亦惟爵服之加而已此唐虞廣大氣象與王者固不同世降而王才不逮古夏商官倍至周而才益難若不皆得其人必待九載而黜陟則貽害多矣此成周歲終受㑹三歲計治所以為百代不刋之典然周公之制不徒受㑹而必詔廢置不徒計治而必行誅賞豈若後世具文故事受成於歲終考滿於三載姦人得矯飾以肆其欺善人不得積久以精其職徒見夫指𤓰以待熟循級以俟遷要以如格而已
