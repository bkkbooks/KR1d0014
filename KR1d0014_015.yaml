body:
  text: 周官集傳卷十五元毛應龍撰磬氏爲磬倨句一矩有半陳氏曰倨言其直句言其曲一曲一直是以有折然大折則傷於曲故以一矩有半凖之盖規圓矩方以法矩凖之而増其倨句之半則不至於大折矣其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其耑陳氏曰股取况於股肱之股盖其體之肥故也鼓取名於鼔樂之鼔以言所擊在是故也矢人為矢鍭矢參分茀矢參分一在前二在後歐陽氏曰近鏃鐡多鐡重故三分箭笴而其前一分之重與後二分相停也兵矢田矢五分二在前三在後顔氏曰枉矢絜矢謂利火射用諸守城車戰故曰兵矢結火以射欲行之疾故其鐵差短而小焉閷矢七分三在前四在後顔氏曰弋而取之小猶欲其輕利則其鐵又短而小焉故七分之三在前四在後鄭鍔曰不言恒矢以其輕重得中不待訂之然後平故也陳氏曰司弓矢所辨者八矢而此所記者五又兵矢在司弓矢則莫之見盖司弓矢以辨其名物為主攷工記則記其為之之法而已記其為之之法故有合而名之者且以其前後之輕重為序焉參分其長而殺其一五分其長而羽其一顔氏曰三分其長而殺其一則前雖有鏃而不重以其笴厚爲之羽深歐陽謙之曰羽深意羽之在槀外者必羽之在槀外者與槀之大細相停也水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽陳氏曰欲知隂陽之辨者將為設其比當取其輕重之均也鄭鍔曰安括于兩旁必夾其隂陽則無強弱之相勝然後夾其比以設其羽則設于比之四角而無偏參分其羽以設其刃則雖有疾風亦弗之能憚矣鄭鍔曰羽長六寸三分之而設其鋌鏃當長二寸也於文當為三分取一以設其刃不言取一者闕文自三分其長而殺其一至於設其刃皆言其為矢之中法如此則雖有疾風亦不能驚憚其矢使之不正也刃長寸圍寸鋌十之重三垸鄭鍔曰刃長寸當為長二寸盖三分其羽以設刃則知刃二寸矣圍一寸其鋌則十之盖十倍於圍當長一尺也鋌者箭入藁中顔氏曰重三垸則重稱於藁前弱則俛後弱則翔中弱則紆中強則揚羽豐則遲羽殺則趮顔氏曰前弱則首低故俛後弱則末撓故翔中弱則首尾揺故紆而曲中強則首尾弱故飛而揚也是故夾而揺之以眡其豐殺之節也橈之以眡其鴻殺之稱也鄭鍔曰為其有病有利不可不察故於是記其試之之法陳氏曰羽之設欲其有節故於豐殺言節凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚顔氏曰摶則形之圓也鄭鍔曰欲其圓出於自然非琢削也故曰生而摶其摶同矣則以重為貴其重同矣則以節目之疏者為貴節目皆疏矣則以其堅實如栗者為貴陶人為甗實二鬴厚半寸脣寸盆實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鄭鍔曰孟子云萬室之邑一人陶則器不足用故周有陶人之官又曰上古聖人凝土以為噐堯世雖去古逺然以天子之尊猶且飯土瑠啜土鉶傳及有虞而益尚之故瓦棺泰尊猶載於禮孟子謂舜由耕稼陶漁以至為帝馬遷言其陶於河濵器不苦窳則考工記言有虞氏尚陶不為無據後世日趍於文金玉竹木其制不一而祭天之器不廢陶瓠者不忘古且貴質也雖然祭天不敢忘其質至於用噐之尚用土者亦不能廢之也故孟子以為萬室之邑一人陶則器不足用此陶人之官所以見於周歟鄭氏圖曰甑状下為鼎三足上為方甑中設銅箄可以開合歐陽公集古録載宋太宗長安有民耕地得此甗初無識者其状下為鼎三足上為方甑中設銅箄可以開合制作甚精有銘在其側學士句中胥于篆籀能識其文曰甗也遂藏于秘閣鄭鍔曰左傳云齊遺晉以玉甗後世或用玉為之以為國寳歟鬴當如管子所謂百升而成釜之釜也有足者謂之鬴無足者謂之釜所容皆同以其名相近也鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸鄭鍔曰鬲鼎之類所以烹飪經於烹人言鼎鑊於小宗伯言省鑊於小司冦言實鑊而不言鬲爾雅言欵足謂之鬲欵空也盖其足空中也其實五觳下文言豆實三而成觳觳當實一斗二升則五觳六斗也鬲所以烝炊之噐其上容甑焉又曰其實二觳則容二斗四升也旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺凡陶旊之事髻墾薜暴不入市按古簋有銅為之者歐陽氏集古録曰簋容四升其形外方内圓而小堶之似龜有首有尾有足有甲有腹今禮家作簋亦外方内圓而其形如桶但於其盖刻為龜形爾與原父所得真古簋不同也噐中膊豆中縣膊崇四尺方四寸雜記註曰許氏説文解字云有輻曰輪無輻曰輇歐陽氏曰膊取輇讀義未聞恐只是陶鈞之類梓人為筍虡天下之大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡鄭鍔曰筍或作簨虡或作鐻其實一也筍之上有崇牙虡之上設業業之上樹羽而其端有翣故詩曰設業設虡崇牙樹羽而虡只用直木為之詩曰虡業維樅外骨内骨却行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕琢鄭鍔曰胷鳴如榮原蜥蜴之屬厚脣弇口出目短耳大胸燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴鋭喙决吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴小首而長搏身而鴻若是者謂之鱗屬以為筍鄭氏曰鴻傭也顔氏曰傭均直也凡攫閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眡必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如将廢措其匪色必似不鳴矣鄭鍔曰凡虎豹􅣝貔之屬能攫取物也能閷取物也能攀援而登高也能簭囓而吞物也皆状獸之猛鷙也梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣鄭氏曰觚當為觶字之誤也應龍曰按韻説文觶或作觝則與觚字相近寫者誤以觝為觚耳又曰一獻者獻以一升之爵也三酬者酬以三升之觶也并爵觶之升數計之為四升豆古食肉器也四升曰豆豆雖非飲噐計四升之數則同鄭註謂豆當作斗按一斗十升以禮數推之非是食一豆肉飲一豆酒中人之食也凡試梓飲器鄉衡而實不盡梓師罪之陳祥道曰所謂食一豆肉飲一豆酒中人之食主一日之時言之也應龍曰觴酒豆肉豆所以盛肉故曰豆肉至於酒非可以豆計故謂之觴酒此經取四升之數為義故酒亦曰一豆按禮記一人洗觶受四升増韻云實曰觴虛曰觶竊意觴與觶皆容四升則與豆四升之數無以異其曰中人之食者盖飲食皆以四升為度此中人之量也行禮之際以中人之量所能容者為法過乎此或不勝其任不及乎此或不足其欲故獻酬之際亦或以此為之節也梓人為侯廣與崇方參分其廣而鵠居一焉應龍曰廣與崇方廣濶也參分其廣義如廣輪之廣横量曰廣從量曰輪鄭鍔曰大射之侯棲鵠賓射之侯設正燕射之侯畫獸皆所以為的此指大射之侯以言記的之法故特言鵠爾上兩个與其身三下兩个半之上綱與下綱出舌尋縜寸焉歐陽謙之曰綱所以張侯於植縜所以繫侯於綱鄭鍔曰取手之寸以為法也如今之簾幙上用紐然張皮侯而棲鵠則春以功鄭鍔曰其容體比於禮其節比於樂而中多者得與祭其容體不比於禮其節不比於樂而中少者不得與祭數又曰大射之禮使羣臣諸侯盡志於射以圖有慶之功以免有讓之過張五采之侯則逺國屬鄭鍔曰説者以為逺國之屬繫於人君之德而已豈一張侯而遂使之屬歟脩文德以來逺人者夫子之言矢文德以洽四國者宣王之事則張五采之侯以示文徳能使逺國屬孰謂其不然哉張獸侯則王以息燕鄭鍔曰六獸皆正面畫其六首於正鵠之處張此侯則以燕射也王者先天下之憂而憂後天下之樂而樂使夫獸蹄鳥迹交於中國禽獸逼人麋鹿在郊害人者未除人君方且宵旰不暇何以燕樂於頃刻耶惟其驅虎豹犀象而逺之食其肉而寢處其皮人無異類之害則君有無為之樂是故張獸侯者明獸之害人者吾亦射之矣此其可以息燕焉祭侯之禮以酒脯醢鄭鍔曰食有祭所以不忘乎有功於養人之神也蠶有先蠶卜有先卜農有先農皆不忘其初也况於射将以服諸侯乎其辭曰惟若寜侯毋或若女不寜侯不屬于王所故抗而射女強飲强食詒女曾孫諸侯百福鄭鍔曰其祝辭則實所以警乎不服之諸侯故曰惟若寜侯盖言所祭者惟女安寧之侯也若夫不安寜之諸侯則是悖戾違上不寜乎臣節而敢為叛亂者也此王者之所不恕故曰毋或若女不寜侯不屬於王所故抗而射女也又曰既祭夫順命之寜侯又射乎不順命之不寜侯又從而勸戒夫凡為諸侯之人曰女當安乎臣節勉强自愛以保天年詒女子孫常為諸侯而受百福也歐陽謙之曰強飲強食亦猶書簡祝頌之語廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋按前記云秦無廬注秦多細木善作矜柲即矛㦸柄是也故以廬人名官鄭鍔曰矛之法一爾曰酋曰夷者長短之異故異其名也凡兵無過三其身過三其身弗能用也而無已又以害人故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且渉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不渉山林之阻是故兵欲長凡兵句兵欲無弹刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同强舉圍欲細細則校刺兵同強舉圍欲重重欲傅人傅人則宻是故侵之鄭鍔曰用兵之法有攻有守攻之勢異乎守守之勢異乎攻則兵器之不同固其理也攻人之國則進以趨利人不衆則力不足以攻行不逺則不能出人之不意人衆行逺則飲食之不繼亦其勢然也而又進攻爭利必渉險阻此所以貴用短兵然後為便守人之國而不攻則居以伺便不戰不爭安坐而食故飽而不飢倘或有行所適亦不逺亦不至於渉險阻此所以貴用長兵然則兵器之制自戈至於夷矛由六尺六寸至於二丈四尺盖不為是長短之異而已國不能無用兵之時兵不能無攻守之勢将以適用不得不然也凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晋圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍鄭氏曰被把中也鄭鍔曰人所操而用之之處又曰凡矜皆不圜盖為八觚也惟把處則圜之又曰殳出無刃以其上頭稍細之處為首爾酋矛之長二丈也三分之使二在前一在後而圍之則在後所操之處圍其圜之處得三分之一也矛矜所操之處則其圍五分之四矛之刃所以刺人而直前者圍得三分之二不言夷者二矛之制同特其長短異爾故舉一以見之也大抵殳矛之制所以趨鐏者必殺而其首又殺焉毛應龍曰舉殳與酋矛則戈也㦸也夷矛也三者之圍亦從可知矣凡試廬事置而揺之以眡其蜎也灸諸牆以眡其橈之均也横而揺之以眡其勁也鄭鍔曰廬人之為廬固有法也試其廬事亦不可不知其法焉横置於膝上以一手執一頭而揺之以眡其勁否若其材之堅強則兩頭無強弱矣六建既備車不反覆謂之國工鄭鍔曰凡此言者皆建於車上既建而車不及覆由其制得法長短小大各適其平然後可以國工名也應龍曰前經言車有六等之數盖以軫與人四兵而言之不數夷矛也論其高下故曰等也此云六建明無軫自取人與五兵皆立於車上論其建立故曰建也匠人建國水地以縣置𣙗以縣眡以景鄭鍔曰置𣙗将以眡景然必𣙗之正則景可騐欲其𣙗之正則䋲而正之以䋲正𣙗𣙗已正乃眡日影焉所謂眡以景則眡日至之景而驗以圭也陳氏曰水地以垂所以取其地之平置𣙗以垂所以取其表之正四圍之地平矣然後中央之表可立焉中央之表正矣然後日出入之景可眡焉故眡以景為規識日出之景與日入之景鄭鍔曰眡以景而又為規以識之者記之也歐陽謙之曰為規識日出之景規者正圜之物也所以象日之景也朝而觀日出之景為日景之象以識之夕而觀日入之景又為日景之象以識之朝之景與夕之景相鄉如合璧則東西正矣晝參諸日中之景夜考之極星以正朝夕朱氏詩傳曰樹八尺之臬而度其日出之景以定東西又參日中之景以正南北鄭鍔曰三相參為參已識日出入之景又以日中之景參之故曰參參以三相考也日中之景其夏至日景歟其長則尺有五寸焉應龍曰此上言建國之始已下言營國之始匠人營國方九里旁三門陳氏曰靈臺之詩云經始靈臺經之營之又詩序言衛文公始建城市而營宮室則建國之與營國異建言其始造營言其築作也此言經營之法國中之廣則九里其方皆三門四方而十二門也天子之禮必法天之大數門宜十二也朝廷宗廟之所居處夷夏諸侯之所㑹同固非九里所能容也而况上公之禮國家宮室以九為節故城方九里宮方九百歩奚可以天子之尊下同上公之節乎孟子曰三里之城七里之郭此侯伯之國也由是言之天子外城宜十二里而匠人營國為城九里者盖中城也鄭鍔曰旁言其國之旁旁之門有三焉總四旁而有十二門矣以象十有二辰之位分布乎四方也國中九經九緯經涂九軌顔氏曰經涂九軌舉經言見緯涂皆九軌也鄭鍔曰周人上輿故制涂之法足取以容車九軌左祖右社面朝後市市朝一夫鄭鍔曰市朝其地皆百畆一夫受田百畆然市有三朝亦有三非一夫之地所能容盖指所治之處言之市有司次介次之處朝有内外燕之殊其地皆以一夫為率爾陳氏曰市朝皆方各百畆而無侈制以妨民之居又可知矣夏后氏世室堂脩二七廣四脩一天子所御之室在夏曰世室在殷曰重屋在周曰明堂其制一爾五室三四歩四三尺鄭鍔曰其四室則方皆三歩其廣則益以三尺其中央之室則方四歩其廣則益以四尺中央者大室也大室為尊故方與廣皆異乎四室也陳自強曰室三四歩皆室之脩也中四而旁三也先言旁而後言中故曰三四歩四三尺者室廣之益也中益四而旁益三也先言中而後言旁故曰四三尺九階四旁兩夾窻白盛鄭鍔曰階以為升降之等觀明堂位言三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上則前有三階之證門堂三之二室三之一鄭氏曰門堂門側之堂鄭鍔曰謂世室門之堂爾雅曰門側之堂謂之塾鄭鍔曰顧命云左塾之前右塾之前正謂是也又曰言門堂三之二此則各居其一爾此門堂之室所謂兩室與門各居其分此取正堂三之二數分而為三也居門堂東西十一歩四尺則每室東西得三歩四尺居門堂西北十一歩四尺則每堂西北得三歩有竒殷人重屋堂脩七尋堂崇三尺四阿重屋鄭氏曰重屋者王宮正堂若大寢也應龍曰大寢路寢也又曰明堂位云複廟重䄡其屋重簷因名重屋焉四阿重屋意若今之數殿四畔有散水也周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵宮中度以尋野度以歩涂度以軌鄭鍔曰筵即司几筵所謂莞筵蒲筵筵之制長九尺夏度以尋周度以筵盖以九尺之筵為尺寸之度堂崇一筵者堂基高九尺也五室凡室二筵者中為五室一室之廣各一丈八尺也或問明堂之制古今諸儒之説不一夏謂之世室殷謂之重屋周謂之明堂其制亦有同歟曰明堂之制或以為一殿或以為五室或以為九室十二堂或以為十二室或以為四堂十二室近代歐陽謙之又謂周人五室凡室二筵此五室須别在明堂之外未必即明堂之中為之此説尤非鄭氏曰世室者宗廟也魯廟有世室重屋者王宮正堂若大寢也明堂者明政教之堂歐陽謙之曰鄭氏既言世室為宗廟矣又言五室象五行分布中央四維何也考之於圖則自中央介為五室土居中央金木水火四角相接今考上文堂脩二七計十四歩以尺計則八十四尺也而五室之脩則六丈廣四脩一則十七歩有半以尺計則百有五尺也而五室之廣則七丈意者堂脩二七廣四脩一者自為世室之堂爾五室三四歩四三尺者又别自為世室之室爾要知古今明堂不越三十六戸七十二牖之說自白虎通論以後紛紛不一唐立明堂亦是臆說創見宋襲知聶氏竇氏作五室之圖盱江李氏又别為之圗說其後又作經世圖譜以非其說者而圖譜尤可駁也盖夏之世室殷之重屋周之明堂凡天子所御之室制度皆然非曰世室曰重屋曰明堂各有一屋為之名也其為屋也名若有異而所以為治朝者同此制也國門外朝諸侯所御者亦此制也王適四方廵狩所御者亦此制也朱文公謂狀如井田此語盡之大抵王之所御者有定位室有定方而無定名所謂五室未嘗不五室也所謂十二室未嘗不十二室也唯閏月無定位則居于門爾鄭康成謂明堂者明政教之宮三者或舉宗廟或舉王寢或舉明堂互言之以明其同制則夏殷周王者所御之室信無以異也廟門容大扄七个闈門容小扄參个鄭鍔曰此言門之廣狹扄所以舉鼎者有牛鼎有膷臐膮之鼎鼎有小大則扄有長短牛鼎鼎之大者故其扄謂之大扄膷臐膮之鼎鼎之小者故其扄謂之小扄應龍曰廟門廟之正門也正門不可不大廟中之門謂之闈門北旁出之門也按雜記云夫人至入自闈門是也廟門闈門各取容鼎扄大小以為度者廟中以祭為主而祭以鼎為主也路門不容乗車之五个應門二徹參个鄭鍔曰王之五門一曰臯二曰雉三曰庫四曰應五曰路路大也王寢在是故以大言之然應門則人主出而應物之門故路門雖大而不若應門之尤大是故路門不容乗車之五个應門二徹參个大小所以有差焉路門之大足以容兩車之半而已盖其廣一丈六尺五寸也乗車二徹之間廣八尺凡二徹參个則二丈四尺應門之大其廣二丈四尺也内有九室九嬪居之外有九室九卿朝焉鄭鍔曰昏義曰后立六宮三夫人九嬪二十七世婦八十一御妻以聴天下之内治天子立六官三公九卿二十七大夫八十一元士以聽天下之外治故内有九嬪外有九卿也然内助非無夫人而特言九嬪者盖九嬪掌婦學之法以教九御夫人則不繫以職焉外助則非無三公而特言九卿者盖九卿二公宏化分職率屬三公則坐而論道也於路寢之内設為九室使九嬪居之以教九御而舉内治路寢之外設為九室使九卿居之以理百職而舉外治外之九室如後世之外尚書省内之九室如後世之内尚書省也王有六宮九嬪以下分居之而又有九室以居者盖時當治事則居此以考内治也或謂居者非特於此治内事亦於此居殊不知王有三朝九卿以下朝焉未嘗有九室而朝也此則九室九卿朝焉亦當治事之時則處此以治朝事爾非謂於此而朝見天子也九卿不於九室朝而謂九嬪居之可乎陳氏曰於内九室言居則九嬪所常居者於外九室言朝則朝日處之而已九分其國以為九分九卿治之鄭鍔曰取國之政事九分之使九卿各治其一夫惟九卿各治其一則事各有統小大畢舉無廢務矣三孤六卿孤而謂之卿者以孤卿同於六命也又曰司士之擯則孤卿特揖朝士之朝則孤卿位左謂此也王宫門阿之制五雉宫隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌鄭鍔曰宫隅七丈則宫牆五丈城隅九丈則牆身七丈矣舉高者言焉陳氏曰雉之為物有分域焉故牆堵之數取以為名五板為堵五堵為雉則雉之崇脩取於雉之飛止之數盖雉飛若矢一徃而堕五堵為雉崇脩放此門阿之制以為都城之制宫隅之制以為諸侯之城制鄭鍔曰此言諸侯之制當殺於王國也然近天子者其勢屈逺天子者其勢伸故諸侯於隆殺之中又有高下焉又曰都在畿内近天子其勢屈也故以天子門阿之制以為之城制諸侯在畿外逺天子其勢伸也故以天子宫隅之制以為之城制環涂以為諸侯經涂野涂以為都經涂陳氏曰言城則先都而後諸侯内外之序也言涂則先諸侯而後都先後之序也
