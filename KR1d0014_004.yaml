body:
  text: 周官集傳巻四元毛應龍撰大府掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府九貢五等諸侯所貢九賦畿服九等之賦九功萬民九職之所成者九職事也九功功也掌其副書以為受給之契要頒分也辨三入之貨賄分二府而受之貨自然之物金玉之屬歸之受藏之府賄人為之物布帛之屬歸之受用之府受入為藏出給為用貨兼有賄如兵器之屬其入亦在受藏之數賄兼有貨如金玉財物其出亦在受用之數於文皆為互見凡官府都鄙之吏及執事者受財用焉凡頒財以式灋授之闗市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待䘮紀幣餘之賦以待賜予官府都鄙之吏及百執事之人掌國中四郊家邑邦甸邦縣邦都及闗市山澤幣餘之賦者各以其所征之財至而受之古書授與受通禮中文義多如此凡分授其財於有司則量所入之賦揆以九式之法給諸九事之用而以九式之法授之待者各待其百官有司以其事之徴令至則予之其中如祭祀之式用度為廣故用邦都之賦亦廣邦都之地為方百里者三十有六賔客之式名物為繁故用國中四郊小都之賦而取具而分頒好賜弔用又不預焉凡邦國之貢以待弔用以邦國之貢入待之此貢是諸侯因朝貢者鄭鍔曰諸侯之貢其上者以待弔邦國之用亦以䘏諸侯之禍災而已凡萬民之貢以充府庫九職所成即閭師所任八等之貢也充實也凡式貢之餘財以共玩好之用以九式用九貢而有餘者則以共玩好之用玩好者四海之巨麗千古之典刑玩之可以知戒好之可以比德凡邦之賦用取具焉歲終則以貨賄之入出㑹之凡九式之用先以九賦取給故九賦無餘財玉府掌王之金玉玩好兵器凡良貨賄之藏玉府貴重掌凡美物之蓄藏而玉為之良歐陽地山曰有司所用一不取於玉府意者玉府王之私藏若後世之内藏庫是也王之食曰玉食王之語曰玉音王之府曰玉府宜矣玩者目之所好好者心之所恱兵若兊之戈和之弓垂之竹矢之屬器若金鍾九鼎玉律欹器之屬賈氏曰器者赤刀宏璧琬琰之屬良貨賄則其質出於自然而美者藏者大府所頒而藏之林之竒曰書曰玩物䘮志而玉府掌玩好何也盖玩好人情所不免先王為之法度以節之則無溺於玩好矣共王之服玉佩玉珠玉服玉王禮服所用之玉佩玉常所佩者珠大珠玉類若明月之珠夜光之璧王齊則共食玉齊者所以齊一其心志致精致純以交於神明也林之竒曰齊則食之所以助氣體精純之養應龍曰惟辟玉食韋氏曰玉食珍異之食大䘮共含玉復衣裳角枕角柶掌王之燕衣服衽席牀笫凡䙝器若合諸侯則共珠槃玉敦槃如少者奉槃之槃敦者對也其形東西相對古者以槃盛水則珠飾之以敦盛食則玉飾之珠隂精所生玉陽精所化以二氣之精物為器示精一也凡王之獻金玉兵器文織良貨賄之物受而藏之林氏曰所謂獻者諸侯之職獻其國所有之物也則玉府受而藏之應龍曰王之獻謂諸侯獻王如賜賔而云賔賜獻王而云王獻也凡王之好賜共其貨賄九式曰好用大府曰賜予此合而言之曰好賜謂所賜皆金玉玩好兵器凡良貨賄之物故玉府共之王昭禹曰好用出於王之私恩惟其時物而已典絲云凡上之賜予皆以物授之典枲賜予亦如之盖以玉府所受好賜則玉府共之以内府所受好賜則内府共之用絲則典絲共之用枲則典枲共之若此之類固非一也内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用大用如用五兵之物則必有軍旅之事用禮樂之器則必有祭祀之事國之大事惟祀與戎故曰大事凡四方之幣獻之金玉齒革兵器凡良貨賄入焉齒象齒革皮革熊羆狐貍之屬或問玉府凡王之獻金玉兵器鄭注以為王獻遺諸侯何也曰歐陽氏之辨詳矣歐陽氏曰凡王之獻若曰王所受諸侯之獻下于上曰獻上于下為賜三尺童子知之名分所係不可移也如宋朝富弼奉使爭獻納二字而鄭氏謂王所以獻遺諸侯果何据乎鄭意特拘於内府凡四方幣獻之說嫌於與玉府同獨不思所謂獻有玉府所當受者有内府所當受者鄭說率不同莫此為甚非惟文義不明混惑後學而輕於立為淆亂名分之論以開僣竊之端不可不深辨凡適四方使者共其所受之物而奉之使者受王所以遺諸侯之物凡王及冢宰之好賜予則共之好即好用之式賜予亦與賔客羣臣為好所用者曰王及冢宰之好賜予其文義亦云王及冢宰廢置一也好賜之事具在九式凡王事皆冢宰詔賛而佐之非王有好賜予冢宰亦又有一種好賜予好廢置非王有廢置冢宰又别有一種廢置也外府掌邦布之入出以共百物而待邦之用凡有灋者鄭鍔曰周家之財賦大抵出於九貢九賦九功至於泉布之入則如載師所言凡宅不毛者有里布如閭師所言凡無職出夫布與夫絘布質布罰布㕓布之類則出於布而已王氏曰百物者百工之資凡國家營作器物以所受之布共給之有官府之常法者給非常法者不給共王及后世子之衣服之用凡祭祀賔客䘮紀㑹同軍旅共其財用之幣齎賜予之財用衣服常服也齎資也三宫衣服之用五禮幣齎之用與賜予之用即上文共其百物以待邦用之目財者言其布也用者言其用也三等衣服五等幣資及其賜予者言其所共物之事緒也凡邦之小用皆受焉上文五禮皆大事也何云小用云小用者共其工事之資爾工事小事故云小用稱凡者何上云百物其名未究故稱凡以縂之鄭鍔曰王或賜予而用泉布又邦之小用費財不甚多者皆受於此信夫周家邦布之入寡不若内府貨賄之多矣歳終則㑹唯王及后之服不㑹為用則㑹為服不㑹曰唯王及后者尊之也不言世子從父母可知也或問外府即賄之府内府即貨之府布是布帛之總名謂布為女功之始也司㑹掌邦之六典八灋八則之貳以逆邦國都鄙官府之治鄭鍔曰小宰掌典法則之貳以逆邦國都鄙官府之治司㑹又掌逆治無以異於小宰何也嘗攷司㑹以中大夫下大夫為之掌天下之大計而為計官之長欲括天下之財用而㑹計其數不可不掌典法則之貳也小宰執其貳以佐大宰之治使人不敢動摇其已成之法而司㑹則鉤攷之官掌其貳以㑹天下之財其語雖同其事則異也以九貢之灋致邦國之財用以九賦之灋令田野之財用以九功之灋令民職之財用以九式之灋均節邦之財用掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聽其㑹計四者之法及書契版圖在大宰之官府别有副書主天下大計之官以逆羣吏之治狀以聽其㑹計之事以參互攷日成以月要攷月成以嵗㑹攷嵗成徐氏音辨曰互交相也林氏曰要者一月之計也應龍曰参互者以舊章額數與入數出數又以在官者及在甲在乙者三者相參兩者相互而考之以周知四國之治以詔王及冢宰廢置廢置王法也以當詔告於王者贊冢宰以詔告焉司書掌邦之六典八灋八則九職九正九事邦中之版土地之圖以周知入出百物以叙其財受其幣使入於職幣九正即九賦正者征也有事而後有式九事即九式也凡上之用財用必攷於司㑹三歲則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徴令此序其財之目也三年一閏天道小成天道尚有積差况吏治乎財者財物若九職所就者器若禮樂器械若兵器農器如閭共祭器族共䘮器黨共射器州共賔器鄉共吉凶禮樂之器之類田野一夫百畆之數夫家家三人家二人之數六畜若二彘五雞之數以及山林川澤廣狹髙下之數徴令稅歛之事天地之間財有定數不在民則在官可逆彼以知此歐陽氏曰民財欲知其數則民之貧富可知此聖人富之之意也器械知其數盖車輦兵器之屬也小司徒登其車輦遂人簡其兵器盖可見矣田野之數孟子所謂土地闢田野治土地荒蕪田野不闢今訃其數欲知其闢且治者有㡬也荒蕪且不治有幾也夫家之數則鄉遂嵗時登其夫家之衆寡此聖人庶之之意也山林川澤鄭說然矣以此數者參互而考之則吏治之善否可見而暴征横斂之病民者可以悉攷而除之矣凡税歛掌事者受灋焉及事成則入要貳焉凡邦治攷焉法者十一十二二十而三二十而五之法事成而入其最要則受其貳以攷知其治狀此所以受其幣之故職内掌邦之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用林氏曰先王之賦民皆有職各以其物當賦以便其出賦之人則職内於邦賦之入則必辨其財用之物不亦宜乎應龍曰總者事之綱凖入知出凖王國知侯國歐陽氏曰職内掌賦入非受藏之府盖主其物數者辨其財用之物而執其總盖財用之數入於職内者也官府都鄙皆受財入然當官亦藏以為用不以歸於職内者也邦國之君賦取於民以為用是又邦國財用之數也在己者執其總在官府都鄙者貳其數在邦國攷其賦取於民當與不當而已凡受財者受其貳令而書之其有官府合用官物而受財者必得其副書而後與之而籍記之貳鄭鍔曰凡受財於此必有君之令如後世合同憑由取財於左帑也職内不受其貳令而書之則他日鉤考無以為証及㑹以逆職歲與官府財用之出而叙其財以待邦之移用以入凖出以此校彼是為逆法歐陽氏曰官府所用財受於職内嵗終而㑹計乃於職嵗之官取所出之數而攷之所謂貳令未必非自職嵗而來盖職嵗主財出也既攷職嵗財出之數又取官府財用之出數而攷之盖官府既受財以共用則必有出其所受之財而用之之數所以受於職内者其數如此而職嵗之出數又如此官府之用數又如此驗其同否庶㡬於財用之際無所欺矣職歲掌邦之賦出以貳官府都鄙之財出賜之數以待㑹計而攷之凡官府都鄙羣吏之出財用受式灋於職嵗鄭鍔曰職嵗之官專以掌財賦之出者也不謂之職出而謂之職嵗者盖出財當以嵗計也總計一年所出之數知其有餘不足然後冢宰於嵗之杪得以制用焉此名官以職嵗之意也凡上之賜予以叙與職幣授之幣餘之賦以待賜予故也此叙而授之者何職在掌出故也及㑹以式灋贊逆㑹歐陽謙之曰出財之式灋在職嵗故凡諸官之受財者皆先就職嵗受式灋焉故㑹計之際職嵗必用己所掌出財之式法以參贊㑹事則所出之成數有定而用財數可見矣應龍曰嵗㑹掌於大宰其書則掌於司㑹而司㑹或不知其出之式法故職内及㑹以逆職嵗與官府財用之出職歲則以式法與職内同賛司㑹而已先王經天下之政莫重於理財凡有所用必有其式凡有所治必有其法職幣掌式灋以斂官府都鄙與凡用邦財者之幣劉氏曰官府都鄙或月或嵗皆積羡餘及凡用邦財以興事役者則有餘物皆謂之幣則掌歛而聚之也歐陽謙之曰職幣所掌之式灋即大府職嵗之式灋也大府之頒財於官府既授之以式灋諸官府之出財用又復受式灋於職嵗今職幣復案式法計其已用之多寡而歛其餘焉於末言凡用邦財者則所以大總言之也周人於財用之際若此其嚴非苛且吝也不苛於出納之際乃所以不輕於征歛之際也振掌事者之餘財徐氏音辨曰舉而歸之曰振皆辨其物而奠其録以書楬之以待上之小用賜予劉氏曰書楬之謂書其目以標楬之歲終則㑹其出凡邦之㑹事以式灋贊之司裘掌為大裘以共王祀天之服中秋獻良裘王乃行羽物季秋獻功裘以待頒賜鄭鍔曰良言玉之致美為至尊之服也或曰行羽物當是班之工作林氏曰以待頒賜賜羣臣也王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大䘮廞裘飾皮車凡邦之皮事掌之歲終則㑹唯王之裘與其皮事不㑹射義曰天子大射謂之射侯天子將祭必先習射於澤宫澤者擇也朱氏曰畫布曰正棲皮曰鵠皆侯之中射之的也掌皮掌秋歛皮冬歛革春獻之遂以式灋頒皮革於百工鄭鍔曰秋則獮田之時獸之方殺者衆於是而歛皮冬則堅凝之時革乾者堅於是而歛革共其毳毛為氈以待邦事歲終則㑹其財齎方治皮為革時得其毳毛可為氈貯之以待祭祀賔客㑹同田役共氈案之屬内宰掌書版圖之灋以治王内之政令均其稍食分其人民以居之書典故也版名籍也圖地圖也書以治政令版以均稍食圖以辨人民之所居法者所以治之均之分之則人民者士庶子宿衛之等及王内之官屬閽寺奄奚工賈府史胥徒之類以隂禮教六宫劉氏曰六宫主王后也而三夫人在焉后雖尊而四德甚備不敢怠於聽學者日新其徳業以為六宫之範故詩稱尊敬師傅言告言歸者以為后妃之美周公所以擇下大夫之賢以為内宰而教成王之后者此書其實也以隂禮教九嬪以婦職之灋教九御使各有屬以作二事正其服禁其竒衺展其功緒鄭鍔曰周制自王后六服而下等降上下固有常制不可紊也上僣之禍率起於衣服之間衛刺緑衣謂其服之不正耳竒衺謂妖衺巫術以自衒媚應龍曰竒觚則怪而不常衺僻則媚而不正如漢武帝後宫為方術所悞致巫蠱之禍作猶起也已成為功已作為緒林氏曰展其功緒所以核其事也或曰二貳也貳者佐佑六宫為聽從於人之事大祭祀后祼獻則賛瑶爵亦如之此皆教嬪御之事也凡祭宗廟王既祼王出迎牲於祭祀若有間然后而從祼不令間獻謂王薦腥薦熟后亦從獻也及尸卒食王既酳尸后以瑶爵亞獻其爵以瑶為飾瑶次玉者曰賛者非内宰自賛之乃上文以隂禮教之目也正后之服位而詔其禮樂之儀賛九嬪之禮事凡賔客之祼獻瑶爵皆賛致后之賔客之禮凡䘮事佐后使治外内命婦正其服位皆禮之叙教之目也凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮中春詔后帥外内命婦始蠶於北郊以為祭服歲終則㑹内人之稍食稽其功事佐后而受獻功者比其小大與其麤良而賞罰之㑹内宫之財用正歲均其稍食施其功事憲禁令於王之北宫而糾其守上春詔王后帥六宫之人而生穜稑之種而獻之于王次三市之次叙三市之治叙肆賈人所居設也置也正也陳也皆始立之名案律厯五量籥合升斗斛左氏齊四量豆區釡鍾布帛廣狹之幅曰淳長短之制曰制林氏曰天下熈熈皆為利來天下攘攘皆為利往市之所在天下之民不求而自來天下之物不求而自至度量之不明淳制之不正則何以立民信而使之無欺歟出其度量淳制則民信立而三尺童子適市莫之或欺矣應龍曰隂禮者祭地示之禮也林氏曰祭始立市者報本反始之義也内小臣掌王后之命正其服位后出入則前驅若有祭祀賔客䘮紀則擯詔后之禮事相九嬪之禮事正内人之禮事徹后之俎后有好事于四方則使往有好令于卿大夫則亦如之掌王之隂事隂令閽人掌守王宫之中門之禁䘮服凶器不入宫潜服賊器不入宫竒服怪民不入宫凡内人公器賔客無帥則㡬其出入以時啓閉凡外内命夫命婦出入則為之闢掌埽門庭大祭祀䘮紀之事設門燎蹕宫門廟門凡賔客亦如之寺人掌王之内人及女宫之戒令相道其出入之事而糾之若有䘮紀賔客祭祀之事則帥女宫而致於有司佐世婦治禮事掌内人之禁令凡内人弔臨於外則帥而往立於其前而詔相之鄭鍔曰禁令者其所當為宜有以令之其所不當為宜有以禁之應龍曰内人弔臨為有所受命而行者立於其前猶前導然寺人之職云帥女宫者女宫之戒令也曰禁令者糾之之事也帥而往而立於前者相導之事也内竪掌内外之通令凡小事若有祭祀賔客䘮紀之事則為内人蹕王后之䘮遷于宫中則前蹕及葬執褻器以從遣車外而王内而后通使令者内竪為童而給事者止可小事鄭鍔曰内人雖賤而㣲然亦至尊所用者固不可使人得而犯之也此所以使内竪蹕焉應龍曰内人出自中禁故以童子為之蹕而寺人為之帥且相也九嬪掌婦學之灋以教九御婦德婦言婦容婦功各帥其屬而以時御叙于王所鄭鍔曰九嬪於婦道為明於宫中有師道劉氏曰御㓜少故立婦學而以四德之法教之應龍曰教凡在九御之列者善其徳言容功各帥其屬而以時御叙之於王所也屬者世婦二十七人為一屬女御八十一人為一屬而女御又為世婦之屬世婦又為九嬪之屬九人當御又為一屬九御即御之叙也九御而進御於君俱以九九為叙周官立婦學之法大槩謂可當九御之叙者非色取也取於有徳有言有容有功謂之賢才謂之淑女則可以其時其叙進而在御應在天之運備從人之道成隂陽化育之功立萬世人極之本夫以時則不亂以叙則無妬詩曰闗闗雎鳩在河之洲又曰參差荇菜左右流之參差荇菜左右芼之此為行中度聲中律容有禮事有功時稱而叙順則天下無私禮故曰有闗雎麟趾之意以行周官之法度若徒致詳於九九而御以為叙一月再周以為時而不求之於四徳之學非周禮也凡祭祀賛玉齍賛后薦徹豆籩賛薦而為之徹若有賔客則從后大䘮帥叙哭者亦如之九嬪從后如卿從王叙哭猶御叙也世婦掌祭祀賔客䘮紀之事帥女宫而濯概為齍盛及祭之日涖陳女宫之具凡内羞之物掌弔臨于卿大夫之䘮女御掌御叙于王之燕寢以歲時獻功事鄭鍔曰王之后宫雖六而王之燕息别有寢寢有六其一為正寢其五皆為燕寢也甞攷周制王不就后宫以息燕是故自后而下各以時而御見於燕寢之中卑者先進以法月方生之明尊者後進以法月既盈之盛女御掌之欲其進見有先後之序也凡祭祀賛世婦鄭鍔曰世婦於祭祀時或帥女宫以共役或涖陳女宫之具羞其事甚繁女御則佐而助之故曰凡祭祀賛世婦大䘮掌沐浴后之䘮持翣從世婦而弔于卿大夫之䘮䘮大記註曰翣以木為筐廣三尺髙二尺四寸方而兩頭髙衣以白布畫者畫雲氣即畫翣其餘各如其象即黼翣黻翣柄長五尺車行使持之而從以障車既窆樹于壙中障柩徐氏音辨曰以布覆之為方扇之狀持以從柩女祝掌王后之内祭祀凡内禱祠之事内祭祀若祭市祭先蠶之類内禱祠若疾病求瘳若祠髙禖之類女子聰明通鬼神示之居能祝事者后從王祭祀則女祝從后如王之有大祝小祝也掌以時招梗禬禳之事以除疾殃時者謂四時有乖沴之氣為疾殃則以四者之事除之四者如後世以桃茢祓除不祥之類鄭鍔曰男覡于冬則堂贈于春則招弭事殆類此聖人豈不知巫祝之非正尚有招梗禬禳者蓋人之精爽或失其正則淫厲之物得以乗隙而入以致疫殃故巫祝之類亦不可無非以為致福之由也亦欲以除疾殃而已故於男巫則曰以除疾病女巫則曰以除疾災歐陽氏曰禱祠以除疾殃事雖茫昧然坐視疾殃之至而付之於無如之何聖賢之用心盖不如是也周公代王之事其用心亦可見矣女祝任招梗禬禳之職其招者一而梗禬禳者三而又專為疾殃而為之亦可見徼福之意簡而除患之心切女史掌王后之禮職掌内治之貳以詔后治内政禮隂禮職婦職史掌文書凡内治之政令皆有其貳林氏曰治内政后也女史則詔之應龍曰詔猶告也此以下為貳内治之目逆内宫書内令書以法記言之史凡后之事以禮從以逹隂禮以法記動之史典婦功掌婦式之灋以授嬪婦及内人女功之事齎謂法者其資用及成就舊數嬪婦乃九職之嬪婦此嬪婦乃外工言及以殊之内人内工也曰女功之事齎者齎為資若絲枲之類鄭氏以嬪婦為九嬪世婦諸人多從之愚謂不然鄭鍔曰内宰作之以二事九嬪教之以婦功典婦功授之以事齎音咨必有以授之於其始乃可以責之於其終也或問典婦功掌婦式之灋以授嬪婦集傳所釋嬪婦不取古註鄭説而併鄭鍔之論不取何也鄭鍔曰言嬪即九嬪也言婦即世婦也彼皆學女功於宫中則宜給以布帛之資非民間任化治之職者也上言嬪婦下言内人非王宫之嬪婦而誰歟曰王宫之九嬪世婦比隆卿大夫之職有婦功則從后夫人之後按内宰以作二事及婦功唯據九御而言不見九嬪世婦有絲枲之事故知典婦功所授嬪婦乃九職之嬪婦也凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之良善也賈者别其直也楬者題署以表物也辨其苦良則苦功良功各歸所典比其小大則尺度中數若不中數各以類分此皆賈之事也凡賈始入而楬者時賈也謂所受之物有毁折入資則如初之賈獻功又賈楬之者校之資本相當與否且以待頒也以共王及后之用頒之于内府鄭鍔曰其精者以共王及后之用其餘則頒之於内府者以其良貨賄之所藏故也内宰言比其大小與其麤良而賞罰之此言辨其苦良比其小大而賈之者内宰則佐后宫官之長故得以行賞罰典婦功掌頒事齎則定其賈可矣至於賞罰不得而與也典絲掌絲入而辨其物以其賈楬之鄭鍔曰辨其物而定其價則綿帛苦良各隨其所宜授以本物則有司不得以苦易良以賤貿貴受賜者亦得以霑上之賜矣應龍曰嵗常入之絲或貢或買或以當賦入者故各以其物識其賈而表出之掌其藏與其出以待興功之時劉氏曰繡文組織以機杼染𤣥黄各有所宜之時頒絲于外内工皆以物授之凡上之賜予亦如之歐陽氏曰案典婦功有工四人縫人有女工六十人是所謂内外工也不必言外工嬪婦内工女御也應龍曰内工王内之人物者女工合用之材資也歐陽氏曰所謂以物授之者著其名物以授之防其以賤貿貴以惡易美故也及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜予良物材之美者功者因其材而成功或問典絲良功之説北海鄭氏與鄭司農說各異如何曰二説各為一義皆通但司農之說只從經文良功釋尤善凡祭祀共黼畫組就之物䘮紀共其絲纊組文之物凡飾邦器者受文織絲組焉嵗終則各以其物㑹之徐氏音辨曰纊綿也典枲掌布緦縷紵之麻草之物以待時頒功而授齎布緦縷紵四等成就布三十升緦十五升布而抽其半縷績紡所為紵白而疎麄者麻始刈穫之材草葛䔛之屬麻草之物初治而為紵再治成縷三治之成緦粗疏之布僅及十五升布之半四成之精而十五升三十升至三十升布之極善矣頒功以其度授資以其物王氏曰故書齎為資當以故書為正及獻功受苦功以其賈楬而藏之以待時頒頒衣服授之賜予亦如之嵗終則各以其物㑹之苦言物材之粗者良功亦入於典婦者若供朝衣冠之布及帷幄巾羃之屬按諸觧例以苦良之苦為麤盬不供上用非也詩曰為絺為綌服之無斁后妃何嘗不服粗綌之衣良當是物質自然之美用力省而成功者苦是女工勞苦所就者如銘曰桑蠶苦女工難之義謂若麻冕禮也用三十升布其經二百四十縷為細宻而難成今也純儉純絲也用功省約而易就此即苦良之辨内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣緣衣素沙辨外内命婦之服鞠衣展衣緣衣素沙林氏曰以翟之羽色揮㪚而明故以翬名之以翟之形體摇揚而飛故以摇名之聶氏圖說展衣曰此亦卿大夫之妻從夫助君祭宗廟得服之徐氏音辨曰袇如亷反純也枬也皆訓緣盖黑衣以纁為袇以其有枬故謂之純衣林氏曰先王制衣服豈苟然哉聞其名則知其義觀其服則知其禮性命之禮道德之義於是乎在應龍曰王之吉服九九陽數也后之吉服六六隂數也王服禪而不裏后服裏而不襌王上𤣥下纁不相連屬后上衣下裳連屬一色不屬者有定位之象連屬者有合德之象裳之屬於衣也有削幅如深衣要半下齊之制也其翟之數如王服之章凡十二章者以十二翟為列内司服鄭氏以為王宫裁縫官之長何也歐陽氏曰女御或是八十一御女中二人同掌之鄭氏之說鑿矣或問内司服辨内外命婦之服止有鞠衣展衣緣衣而外之諸侯夫人或得用三狄何也曰歐陽謙之之說是矣其說謂王后之服有褘衣揄狄闕狄盖曰從王祭祀之服也而辨内外命婦之服止有鞠衣展衣則内自夫人以下盖無助祭之禮則不得服闕狄以上則在外之命婦亦豈得而服之哉然則經言辨内外命婦之服止言鞠衣展衣緣衣其意亦可見但外之諸侯夫人或有從其君祭祀得用三狄如祭統曰君衮冕立於阼夫人副褘立於東房盖上公與王同服衮冕則上公之夫人宜與后同服褘衣也下而侯伯子男之夫人亦有用屈狄之制其意亦同凡祭祀賔客共后之衣服及九嬪世婦凡命婦共其衣服若䘮衰亦如之后之䘮共其衣服凡内具之物九嬪世婦當賔祭從后者命婦兼内外言之縫人掌王宫之縫線之事以役女御以縫王及后之衣服䘮縫棺飾焉衣翣栁之材掌凡内之縫事染人掌染絲帛凡染春㬥練夏纁𤣥秋染夏冬獻功掌凡染事染絲先染後織染帛先織後染㬥練者練其素而暴之𤣥纁者天地之色纁絳也染用石物考工記鍾氏染纁夏者備五色謂之夏翟染之擬五色之羽為深淺之度春温宜練夏暑熱潤冝湛研秋水清大備五色冬水凝涸而獻功追師掌王后之首服為副編次追衡笄為九嬪及外内命婦之首服以待祭祀賔客䘮紀共笄絰亦如之應龍曰服三翟皆用副衣展用編衣禒用次笄衡唯施於三翟鞠衣則無衡矣命婦之衣鞠衣展者服編衣禒者服次笄長尺有二寸紞用三采瑱以石若玉屨人掌王及后之服屨為赤舄黑舄赤繶黄繶青句素屨葛屨辨外内命夫命婦之命屨功屨㪚屨凡四時之祭祀以宜服之屨事省故通任王及后之用曰服屨者屨稱其服冕服赤舄皮弁白舄冠弁黑舄褘衣𤣥舄揄翟青舄闕翟赤舄林氏曰繶者屨相接之縫也應龍曰其飾用對方之色者繢飾之用相生之色者繡飾之歐陽謙之曰掌屨之官以王與后之屨而兼掌之可見其事簡而為屨之制略矣以𤣥衮赤舄與赤舄几几之言觀之則舄之制自赤舄之外不見其有異色則赤舄為王之舄黑舄為后之舄亦不辨而明矣夏采掌大䘮以冕服復于太祖以乗車建綏復于四郊
