body:
  text: 周官集傳卷十六元毛應龍撰匠人為溝洫賈氏曰古者人耕皆􅍒上種穀溝洫之間所以通水鄭鍔曰為國之本在農農民之利在水春耕夏耘者農事之有常旱乾水溢者天時之不常先王以為天下之大利害者亦莫若水故為之溝洫以瀦以蓄焉為農民之利而又以决以導焉除田間之害故命匠人為溝洫焉耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂易斫木為耒剡木為耜按增韻柄曲木曰耒耒端曰耜歐陽謙之曰耜之為物或謂之木或謂之金蓋木在內金在外陳氏曰古者必耦耕蓋以器言之則體并而用利以人言之則力協而功勸則其耕也深矣故一耦之伐廣尺而深亦如之謂之􅍒者田法所自始也歐陽氏曰􅍒即壟中種禾之所也􅍒中之土發於􅍒上者禾既成而後又下其土於壟中也田法於􅍒衍之而為田間水道之制焉陳氏曰田首倍之則􅍒向而注焉故廣二尺深二尺謂之遂即此所謂倍也九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專逹於川各載其名鄭鍔曰自澮而外則有川焉水由是㑹直逹於川則小水有所歸大水有所入旱乾則資以灌溉水溢則有所决導故農民不為水所困然自遂至澮水入於川其來也衆必須各載其名而識水之所從出則壅塞者知其所在疏導之為甚易矣禹平水土主名山川大司徒名其社與其野皆欲有所辨而况於溝洫之水乎然則溝洫之法考於遂人十夫有溝洫之制則不同說者謂鄉遂為溝洫之法而公邑為井田之法所以異也歐陽氏曰專逹於川此當為開鑿之川下文兩山之間必有川焉乃為自然之川凡天下之地藝兩山之間必有川焉大川之上必有涂焉陳氏曰兩山之間必有川則水有所赴而歸大川之上必有涂則道以通而逹凡溝逆地阞謂之不行水屬不理孫謂之不行梢溝三十里而廣倍鄭鍔曰為溝之法當順地脉苟逆地阞則不順其脉矣不順其脉溝雖可以强成而水必不可以强行注水之法當使順水以導之苟水屬不理孫則不順其性矣不順其性水雖可以强導而水不可常行故皆曰謂之不行蓋地勢有高者不可平之使下水勢有卑者不可激之使高也凡行奠水磬折以參伍鄭鍔曰水之所停留而不行者謂之奠水將以行之必如磬之折可也其直者三其曲者五是謂磬折其勢如此則雖停留者亦將奔趍而往矣欲為淵則句於矩鄭鍔曰水流至是渦邪回旋陳氏曰矩之法正方非特磬折而已况視此而又句乎如是則水勢反流而為淵矣凡溝必因水藝防必因地藝善溝者水漱之善防者水淫之歐陽謙之曰為溝所以疏導水而去之也故必因水下流之勢則水自潄齧而為溝矣為防所以瀦蓄水而聚之也故必因地關束之勢則水自淫注而易防矣凡為防廣與崇方其閷參分去一大防外閷凡溝防必一日先深之以為式里為式然後可以傅衆力鄭鍔曰先一日用功觀一日功之深淺用為法式乃以此式為準而傅衆力不為之式則一日之功不知其多寡而土功之興不知其久近又况民可與樂成難與慮始彼未知役之期或咨嗟愁嘆謂上之人苦我以力役也唯先為之式則用人之多寡計功之久近可坐而知以是賦功則指日而成不愆于素矣凡任索約大汲其版謂之無任鄭鍔曰築牆與防者必以繩縮版然後實土陳氏曰索若詩所謂其繩則直是也綿詩曰其繩則直縮版以載約若詩所謂約之閣閣是也斯干詩曰約之閣閣椓之槖槖大汲其版謂之無任言約之大過則汲土之時索有不勝其任矣葺屋參分瓦屋四分囷窖倉城逆墻六分堂涂十有二分鄭鍔曰涂者堂前之道也中高旁下竇其崇三尺牆厚三尺崇三之鄭鍔曰宫中通水道之處左傳所謂逃出自竇謂此也惟高三尺則通水利而無壅塞矣牆謂凡宫室之牆也陳氏曰下厚則上可以高法當以是為準過乎此高而易頽矣車人之事半矩謂之宣一宣有半謂之欘一欘有半謂之柯鄭鍔曰古之造器用者或取諸身以為度或取諸物以為度各因其宜則為造法之始此車人之事有欘有柯原其所始則取諸宣柯之外又取諸磬折焉蓋取諸人與物以為度也一柯有半謂之磬折鄭鍔曰一柯有半則其長四尺五寸蓋取人之身俯而磬折以為度也人長八尺中則四尺自帶而下則四尺有半故其俯身如磬之折則四尺半車人之器有長一柯有半者取諸此以為法也車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸自其庛緣其外以至於首以弦其內六尺有六寸與步相中也耒耕耒也庛刺也謂耒下前接耜之金也鄭氏以為接耜初未為過而賈氏遽以耜為耒頭金近代陳氏辨之其說謂易曰斫木為耜揉木為耒是耒耜皆取乎木惟耨則以金為之而用於耒耜者也陳氏之辨是矣而不詳言耜之為何用蓋嘗謂耒之前接者耜也耜之前接者耨也耨即所謂庛也以金刺土者也匠人言耜廣五寸鄭氏謂古者耜一金是已中直者謂庛之上句之下也上句者謂人手所執之處也自其尺有一寸之庛緣其外而曲量之至於中直者三尺有三寸又自其中直者曲量之至於上句者二尺有二寸則耒之長六尺有六寸而曰與步相中者何也蓋上下兩曲之內相望如弦望直量之止得六尺正合六尺之步然人之步恐其不均故以六尺之耒代之野度以步其謂是歟陳氏曰緣謂循而上之弦謂直而度之外謂邉也首謂上也內謂中也自庛緣其外以至於首度其左右上下小大多寡之數均矣然後以庛而弦直其中以審其度焉以弦其內得六尺有六寸之數則其度不差矣六尺有六寸即上文所謂尺有一寸三尺有三寸二尺有二寸之數合而成也六尺有六寸與步相中也蓋言其用之時則器之度與人之步適相當焉古者六尺為步而此以六尺有六寸之器為相中蓋以其上句中直而句居前則方其立而用焉前後相距適應乎一步之數則用之疾徐前後調而有節矣歐陽謙之曰以弦其內望直而量之所以為庛弦其內而不及六尺有六寸則太曲弦其內而過六尺有六寸則太直兩者皆耒之病也故必合六尺有六寸之度而後可堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地鄭鍔曰庛直則當堅地而推之必利庛句則當柔地而發之必利推者推而前也發者舉而起也陳氏曰倨句磬折謂之中地不過於句不過於直適如磬折之藝焉則用於剛柔得中之土所以謂之中地鄭鍔曰中地不堅不柔故耒之庛與其中之直兩者適調車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首鄭鍔曰斧柯起於宣而首則起於柯故言柯之長與博厚之尺寸乃五分其長取其一分以為之首首者斧之頭也五分三尺之一蓋首長六寸也轂長半柯其圍一柯有半輻長一柯有半其博三寸厚三之一渠三柯者三陳氏曰渠車門也鄭鍔曰渠車之牙也乘車之輪所謂牙者以為固抱即此也行澤者欲短轂行山者欲長轂短轂則利長轂則安歐陽謙之曰行澤行山俱謂任載之車非乘車也陳氏曰轂短則利轉長則鎮安澤泥山險各有所宜行澤者反輮行山者仄輮反輮則易仄輮則完鄭鍔曰木心多滑反而輮之則滑易而去泥為甚利矣山多沙石輪易甐敝惟仄木以為渠則堅刃相補不偏壞矣六分其輪崇以其一為之牙圍鄭鍔曰輪人言六分其輪崇以其一為之牙圍謂乘車之輪六尺有六寸者此則大車之輪九尺而六分之其語雖同尺寸則别柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍鄭鍔曰行山之車蓋以柏木為宜如詩人言檜楫松舟泛泛楊舟之類也柏者木之至堅山者地之至險以至堅之木而為車則行險而不甐歟大車崇三柯綆寸牝服二柯有參分柯之二鄭鍔曰箄一寸乃固也歐陽謙之曰以乘車言之輪崇車廣衡長三如一謂之三稱今大車輪崇九尺則輿之從亦九尺歟是以牝服八尺若論其橫則徹廣六尺牝服不應有八尺矣所謂牝服必輿上有鑿孔以受别木也羊車二柯有參分柯之一歐陽謙之曰以其承上牝服言之此言二柯有三分柯之一亦羊車牝服之尺寸也柏車二柯歐陽謙之曰此亦以牝服之材言之也柏車牝服之材蓋長六尺牝服鄭氏例以較解之按詩淇澳猗重較兮以為車前橫木出式者若徹廣六尺橫木不容有七尺八尺之制也任載之車不容有橫木在前謂之牝服則又不容在上意在輿上而或輢之下通謂之較也凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺鄭鍔曰鑿轅之鉤心則以轅之長而三分之使二分在前一分在後於其中而鑿之可也弓人為弓取六材必以其時鄭鍔曰古之聖人作弧矢以威天下後之人遂以為觀德之具自人君至大夫士莫不盡志於射由是專命弓人為之取材必有時取一不時不足以為良六材既聚巧者和之幹也者以為遠也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也陳氏曰和者合異以為同也凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下鄭司農曰檍讀為億爾雅曰杻檍應龍曰即詩所謂北山有杻陸機云葉似杏葉而尖白色皮正赤為木多曲少直枝葉茂盛二月中葉疏開花似楝而細蘂正白蓋樹今官園種之正名曰萬嵗既取名於億萬其葉又好故種之說文其屬大者可為棺槨小者可以弓材鄭鍔曰荆山荆堅而美凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則遠根鄭鍔曰既得七材又有相之之法相者察而視之以知其美惡也凡木必有陰陽之偏王昭禹曰木之資氣於陰陽者不能無偏正之異偏於內者察於外可知其心赤者陽之正色黑者陰之正色相幹欲赤黑者外焉得陰陽之正色足以知其心亦備陰陽之正色蓋偏乎陰則其材柔偏乎陽則其材剛皆非幹之良也鄉者同逹之義也凡木叩而擊之必有陰陽之聲聲之清者為陽聲之濁者為陰近根則陰其聲必濁遠根則陽其聲必清枝遠根則其材得陽氣而良近根則其材得陰氣而奴故擊之而其聲清揚則知其材之遠根也凡析幹射遠者用藝射深者用直鄭鍔曰凡弓有射遠者有射深者欲為射遠之弓則用其材之藝者欲為射深之弓則用其材之直者居幹之道菑栗不迆則弓不發鄭鍔曰用鋸以剖謂之居用鋸以剖則所以處鋸者不可不順其文理也菑栗謂解剖而裂之也菑如菑田然開而耕之也栗如栗烈之栗不迆不邪行絶理也木必有文理剖而析之不可不順焉苟於菑栗之時不絶其文理則以是弓幹用之雖久而不發傷也傷之所由起則謂之發不發則傷無由起也凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤角欲青白而豐末鄭鍔曰角最美者惟以青白豐末為貴夫角之本蹙于􅑠而休於氣是故柔柔故欲其藝也白也者藝之徵也釋文􅑠又作腦蹙於􅑠謂角近於腦也鄭鍔曰將欲知其青白豐末者亦有法也夫角之根本近牛之􅑠而為􅑠氣之所休煦故角之本常柔夫角之中恆當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也鄭鍔曰夫角之中弓曲處用以附幹當弓之隈曲處則必屈撓以其勢當屈撓故欲其堅實而不弱焉然而何以辨其堅哉惟相其角之中色青則是堅之徴驗也蓋白者陰之色陰為至柔故因白以知其柔青者陽之色陽為至剛故因青以知其堅夫角之未遠於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徴也鄭鍔曰夫角之末去􅑠為遠􅑠之氣所不能及而不休煦之也氣所不及則必脆而易折此所以貴其柔柔則不折矣然則何以辨其柔惟相其角末之豐大則是柔之徴驗也蓋氣之所及故豐豐則柔矣此角所以貴豐末焉角長二尺有五寸三色不失理謂之牛戴牛鄭鍔曰角長二尺有五寸長之極矣既極其長又且本白而中青其末又豐三色俱不失其文理如此之角是牛戴牛蓋一角直一牛之價如牛之上又戴一牛也茲其至貴者歟趙氏曰豐末不可以言色而同為三色者豐末雖不指色而言然亦未害無其色蓋三色只是三件之意初不為顔色而言也凡相膠欲朱色而昔昔也者深瑕而澤紾而摶亷陳氏曰紾而摶亷其理紾密而摶轉嚴利也鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃凡昵之類不能方說文曰餌粉餅也王昭禹曰魚膠用其膘也凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝漆欲測絲欲沈得此六材之全然後可以為良鄭鍔曰又言用筋之法欲用筋必先椎之嚼之練治至熟然後可用椎嚼至熟是謂勞敝欲其敝之又敝則可用也凡為弓冬析幹而春液角夏治筋秋合三材寒奠體氷析灂鄭鍔曰此言為弓之法非一日而成必順時之冝積至一年乃可成也陳氏曰析者析而治之液者漬而治之也歐陽氏曰析灂之義意其今之退光漆之類當漆性堅定之時而磨治之則漆之理回環於一弓之間者可以堅定而不至於坌起矣冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流氷析灂則審環鄭鍔曰弓以幹為體凡木入材至冬則堅凝可治治於冬則節目去其理致滑易矣故析幹宜用冬角之為物堅實不和至春陽和則角乃可液液之於春則其氣浹洽矣故液角冝用春筋本攣結不紓冝緩而治之夏者解緩之時於斯時治之則筋藝慢易不煩亂矣故治筋冝用夏幹角筋治於三時弓猶未之成必用膠絲漆然後可合秋者陰氣揫斂之時於是時而用膠絲漆則合固不解矣故合三材冝用秋六弓之體有往有來寒凝之時內於檠中則體可定一定而不復流移蓋寒氣有以堅固之也寒而奠其體則張而用之雖久亦不流於檠中而析其漆灂復從而內之則其漆之灂環而審定後不復動蓋結而不解也春被弦則一年之事鄭鍔曰自冬而析幹至氷而析灂則弓體成也至春乃可被之以弦而用焉由是言之成實一年也析幹必倫析角無邪斫目必荼易曰其木為堅多節蓋木之有節目尤堅斫之遽必或傷之斫目必荼緩其勢也斫目不荼則及其大修也筋代之受病夫目也者必强强者在內而摩其筋夫筋之所由幨恆由此作鄭鍔曰苟斫目欲急而不徐則細是幹以為弓至於大修久之後而筋代幹受病矣何則筋在幹之背所以助幹而强也幹之節目固則强矣苟不徐去之其去也不盡以是幹處內則其節目當摩齧乎筋筋不勝乎木之强則久遠之後筋必結起如幨筋之所以幨者其病常起於此爾幨言起而垂也故角三液而幹再液液幹角之制諸儒或以為水漬或以為火炙其義差遠歐陽謙之以為用脂油透過欲其柔潤此義似近之厚其帤則木堅薄其帤則需鄭鍔曰帤者弓之禆也所以禆助乎幹以為强故雖至美之幹亦未常無禆以助之然禆大厚則幹必失之大堅禆大薄則幹失之大需需偃弱也是故厚其液而節其帤約之不皆約疏數必侔鄭鍔曰纒而約之亦不可以皆約之也或疏或密要使平均而侔則善矣陳氏曰約以膠漆固其體也次比纒之是謂皆約約則弓帤為是而不皆約焉必有疏數之度矣不等則體力不均故必欲其侔也斫摯必中膠之必均鄭鍔曰摯謂幹之堅摯也斫摯不中膠之不均則及其大修也角代之受病夫懷膠於內而摩其角夫角之所由挫恆由此作鄭鍔曰斫幹者要使得中膠所以為幹之固膠之厚薄亦貴各適乎平焉苟斫摯不中施膠不均膠在內角在外懷膠於內有厚有薄引角之時膠常摩齧乎角此角之所由蹴而折也凡居角長者以次需恆角而短是謂逆橈陳氏曰過於長則勢反緩而不利焉歐陽謙之曰前云長者以次需角之法先以長者置於隈曲之中後以短者足於兩頭如是則得中謂盡一角之意盡一角而短則力失之弱盡一角而長則力失之强皆非弓之善也惟長者以次需則為善引之則縱釋之則不校恆角而逹譬如終紲非弓之利也今夫茭解中有變焉故校於挺臂中有柎焉故剽歐陽謙之曰茭解中有變乃是反言恆角不可逹也弓隈與弓簫必兩角相接也所謂變即接也知恆角而逹也辟如弓紲則知茭解中有變焉故校矣恆角而逹引如終紲非弓之利鄭鍔曰再言此者甚言夫弓之不可恆角而逹也嬌幹欲孰於火而無贏嬌角欲孰於火而無燂引筋欲盡而無傷其力煮膠欲孰而水火相得然則居旱亦不動居濕亦不動苟有賤工必因角幹之濕以為之柔善者在外動者在內雖善於外必動於內雖善亦弗可以為良矣鄭鍔曰幹角嬌之以火宜無過為火所傷幹過於火則易折角過於火則壞爛筋欲使之引長然不可傷其力傷其力則引之太過也煮膠雖貴乎熟然過乎水則太柔過乎火則太堅惟以水火相得為美如是而為弓居濕居旱弓皆不變其體矣不過乎火則不至於燥雖亢旱而陽過之時不與燥俱變也不過乎水則不至於柔雖處下濕而陰過之處不與濕俱變也凡為弓方其峻而高其柎長其畏而薄其敝宛之無已應鄭鍔曰峻者弓之末亦謂之簫以其在上而高故名曰峻柎者弓之輔以其有側骨故云柎畏則弓之曲而隈處也敝則人所執持而易敝之處也應龍曰謂弓常應手而來無時而止也下柎之弓末應將興為柎而發必動於閷鄭鍔曰為弓之柎而至於發動則必將連其接中亦動矣弓而羽閷末應將發古注羽讀為扈無義理當從本字鄭鍔曰凡鳥必兩翔閷者弓之兩頭接中也為弓而兩頭接中皆動則弓簫欲應陳氏曰羽言動之輕也以簫為末則柎當弓之要可名本矣申言下柎之病後本之强固也弓有六材焉維幹强之張如流水維體防之引之中參鄭鍔曰體以防之或往多來寡或往寡來多防其深淺無過不及則引之常中維角䟫之欲宛而無負弦引之如環釋之無失體如環引之欲其宛順而弓體無辟戾之患陳氏曰六材之中惟角能正之引之如此其釋亦然故曰引之如環釋之無失體如環申明宛順之義也材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有參均均者參謂之九和九和之弓角與幹權筋三侔膠三鋝絲三邸漆三庾上工以有餘下工以不足鄭鍔曰物之所處者謂邸邸疑如人用籰以邸絲但不知三邸輕重幾何也凡三侔三鋝三邸三庾之物足以為九和之弓然上工用之則有餘下工用之必不足蓋良工能調使多寡適中而拙工雖足用之物其用之無法故每見其不足也為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之鄭氏曰材良則句少也陳氏曰弓之大致尚强而已材良則曲少無事於為强故也材敝則句多所以為强故也以其定體合而成規曲少則取數多句多則取數少鄭鍔曰司弓矢辨其名物故不可言為弓弓人掌作弓者也故皆以為言之謂制作以取規之法當如此也凡為弓各因其君之躬志慮血氣豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿藝以奔若是者為之安弓安弓為之危矢其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以願中鄭鍔曰豐肉而短寬緩以荼者其人心必舒遲宜於峻疾之弓弓太疾則太過宜用安徐之矢以濟之故為宜峻弓安矢骨直以立忿怒之藝如欲奔然其人必躁疾宜用安徐之弓弓太徐則不及宜用峻急之矢以濟之往體多來體寡謂之夾臾之屬利射侯與弋按歐陽角弓詩解云弓之為物其體往張之則內向而來弛之則外反而去鄭鍔曰射侯不深中而不落爾繳射而遠輕而不深爾往體寡來體多謂之王弓之屬利射革與質鄭鍔曰往者寡來者多則其弓必反而直材必堅而弓强又曰甲革堅椹質厚皆難入惟堅弓則利射之往體來體若一謂之唐弓之屬利射深鄭鍔曰射而深者由材之直故利射深大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂合灂若背手文角環灂牛筋蕡灂麋筋斥蠖灂弓背用牛筋之漆則其文理如蕡麻之實㸃紋可觀若用麋筋之漆則其文理如斥蠖之形其文小而曲也和弓􅌛摩覆之而角至謂之句弓覆之而幹至謂之侯弓覆之而筋至謂之深弓反覆而觀之角善矣幹又善焉而筋未善也角與幹善則矢疾而遠可以射侯此射侯之弓
