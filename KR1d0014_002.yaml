body:
  text: 周官集𫝊卷二元毛應龍撰小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁鄭鍔曰小宰以中大夫二人為之大宰之二也應龍曰小宰為十二小卿之首掌者職所専主也建邦之宫刑者自立國以來之法即王宫之政令與凡宫之糾禁是也王宫有禁衛官府次舍庖膳醫藥酒漿貨賄徒役之政令政者出入功緒禀稍之等令者作止期㑹告戒之事糾以察其隱匿禁以止其邪僻刑如儀刑之刑不専以刑罰言也大宰總馭內外之官府為一小宰則與內宰對掌王宫王內之政令有內外之異至宰夫掌治朝之法則又王宫政令之一事也此長二之分别也陳君舉曰按大宰之屬小宰掌外治凡與王左右親習之官𨽻焉內宰掌內治凡與后親習之官𨽻焉掌邦之六典八法八則之二以逆邦國都鄙官府之治大宰正月布治施六典於邦國施八法於官府施八則於都鄙其書之副小宰掌之至嵗終上計則各以其副迎受而考其同異凡施以典者逆以典施以法者逆以法施以則者逆以則典必合於典法必合於法則必合於則然後謂之治執邦之九貢九賦九式之二以均財節邦用歐陽謙之曰執者有一定不可移易之意應龍曰貢賦致其均式用有其節凡六典八法八則之治治在大史者大史逆之治在司㑹者司㑹逆之治在小宰者小宰逆之三官之所逆大宰仍以典法則待其致事待者舉其綱逆者詳於目九貢九賦九式之治大宰所制小宰佐之司㑹計之大府受其成法而出入之也以官府之六叙正羣吏一曰以叙正其位二曰以叙進其治三曰以叙作其事四曰以叙制其食五曰以叙受其㑹六曰以叙聽其情前云以八法治官府此云以官府之六叙正羣吏吏即庶人之在官者冢宰有禮絶之敬正者先尊後卑各依秩叙位者朝位治者職業事者功叙條目食者邑祿稍食㑹者成嵗㑹計情謂辭訟情實聽斷之時各以其序自此以下六叙六屬六職六聯八成六計凡六條即上文所謂典法則貢賦式之二也又曰吏之說不一或以為自大夫以下或以為士以下或以為總六屬之吏鄭鍔因大計羣吏之文欲并卿以上言之考諸經之冢宰以八則治都鄙而有官府之分秋官三刺之法有羣臣羣吏萬民之别官與吏不同名臣與吏不同位故大宰曰馭羣臣小宰曰正羣吏自有截然之辨陳氏曰六叙在前六計在後此是考課法中間皆是官吏事有尊卑有先後有緩急以叙正其位者定尊卑也治者功狀也謂如今日朝諸侯且先還諸侯奏功狀其它不衮在這裏以叙作其事者謂如今日理㑹朝諸侯事則朝事在前其他在後今日理㑹祭祀便是祭事在前其他又後爾制其食亦有叙如聽其情須是一人聽了一人再說才是有體統朝廷上將六叙去區處百官便有六計去察他今一人善便察得見他如此善各各察他自然無遺材以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則專達二曰地官其屬六十掌邦教大事則從其長小事則專達三曰春官其屬六十掌邦禮大事則從其長小事則專達四曰夏官其屬六十掌邦政大事則從其長小事則專達五曰秋官其屬六十掌邦刑大事則從其長小事則專達六曰冬官其屬六十掌邦事大事則從其長小事則專達賈氏曰六屬舉邦治者謂官盛任使應龍曰官盛任使所以敬大臣也凡官各有屬而屬各有長達猶行也大小者指事之體而言事雖略而所繫者重必從其大事雖繁而所繫者輕亦得專達六官之屬皆曰六十舉成數爾以官府之六職辨邦治六職與六典之文若相近似而義有不同六職無官府一節蓋是以官府所守之法為職也自邦國萬民之外又各舉官府之一事以明小宰職之所當治者切而財用逺而賔客明而百物幽而鬼神隱而盜賊無不揆之有道治之有法其職辨其治亦辨矣鄭鍔曰小宰六職言邦國萬民而獨不言官府蓋所謂治職者官府之治也教職者官府之教也禮政刑事則官府禮政刑事也一曰治職以平邦國以均萬民以節財用均者致其平在下則言均在上則言節二曰教職以安邦國以寧萬民以懷賔客寧則雖有不安者亦置之安懷亦安也田野闢道路通廬宿館候各有委積三曰禮職以和邦國以諧萬民以事鬼神禮主和和而後鬼神享四曰政職以服邦國以正萬民以聚百物四方無虞萬物各由其道五曰刑職以詰邦國以糾萬民以除盜賊詰之使不容奸糾之使不為非國不容奸民不為非則盜賊除矣六曰事職以富邦國以養萬民以生百物居四民時地利春秋傳曰時以作事事以厚生以官府之六聯合邦治一曰祭祀之聯事二曰賔客之聯事三曰喪荒之聯事四曰軍旅之聯事五曰田役之聯事六曰斂弛之聯事凡小事皆有聯祭血祭祀禋祀享先王亦曰祀祭祀吉禮喪喪禮荒荒禮軍旅田役皆軍禮田以簡衆役以任衆斂者斂民之財弛者弛民之力鄭氏曰荒政弛力役此六聯合治者如大祭祀大宰贊玉幣司徒奉牛牲宗伯奉玉鬯司馬羞魚牲奉馬牲司寇奉明水火之等謂祭祀之聯也餘小事亦皆有聯凡六官之屬各與其六十屬之同官為聯各官亦自為聯謂膳夫之屬庖人內外饔亨人自為聯酒正之屬酒人漿人為聯而膳夫酒正又各以其事為聯又如膳夫上士二人為聯中士四人為聯下士八人又為聯府二人聯史四人聯胥十有二人徒百有二十人又自為聯聯則有合而不散之義惟聯故合也以官府之八成經邦治八成即大宰八法官成之二也官成所以待萬民之治於事為詳然各有舊章品式可依據行之凡民物之數簿書圖籍之事皆一定而不亂者一曰聽政役以比居比居者猶五家為比之比並居相次各有伍籍凡聽賦役使之事則以地之比居為據二曰聽師田以簡稽師所以用衆田所以簡衆簡者閲而選之稽者計而考之三曰聽閭里以版圖有民人之事則以民數之版聽之有土地之事則以地域之圖聽之猶今保伍之政四曰聽稱責以傅别稱如孟子云又稱貸而益之之稱責者責其所償𫝊者朝士所謂地𫝊謂若將來亡其人則指其地為證别謂以一札破而為二所謂凡有責者有判書以治則聽五曰聽祿位以禮命鄭諤曰禮則國家宫室車器衣服之儀命則一命至九命之數可以斷其祿位之所當得應龍曰祿如卿祿四大夫大夫倍上士之祿位如卿一位大夫一位之位禮者數命有等如九儀九命之等凡授祿賜位以此為之制六曰聽取豫以書契書契一執其一豫者執左取者執右合而驗之以行其取豫凡曰别曰契皆要也稱責謂别則其用以别為主取豫謂契則其用以契為主七曰聽賣買以質劑賣買商賈之治釋者曰長曰質短曰劑地官質人之職曰大市以質小市以劑案質者立之佑而人為之徴劑者前後作二契於中央破之兩家各得其一皆有手所書字異於傅别也夫結繩作而有書契書契不足而有質劑質劑不足而有傅别此取豫買賣稱責三者所用有輕重大槩契憑書為信劑憑人為質别憑地為傅也鄭鍔曰長曰質短曰劑者以所期久近言之也大曰質小曰劑者以所約多寡言之也八曰聽出入以要㑹出謂給以用者入謂受而藏之者月計曰要嵗計曰㑹凡財物之出入聽之以月終之要嵗終之㑹又按以上八成之物皆文籍也政役師田閭里稱責祿位取豫賣買出入八者為定名所謂常也比居簡稽版圖傅别禮命書契質劑要㑹八者為徵驗所謂成也簡稽禮命要㑹用於公者比居版圖傅别書契質劑官民皆用之非有司法守之嚴凡民何所措其手足以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨以聽官府之六計者以上八成聽政役聽出入之治而著其治狀曰官計凡六條目也弊止也斷也猶言治狀之止處也亷察也善有淑德孟子云可欲之謂善能者能行政令敬不懈于位也正無傾邪也法守法不失也辨者事至能斷不為物所惑亂也舊謂六事以亷潔為本非也豈有敬正而貪能守法而不潔已者弊羣吏之治而云亷猶上文經邦治而云聽也以法掌祭祀朝覲㑹同賔客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聽其治訟法者治官之成法也令百官府者戒也共其財用者具也治其施舍者施其所當施舍其所當舍也舍謂國中有貴者賢者服公事者老者疾者在所舍也凡事嚴而不辨財用而不給施舍之不當而有治訟治者在所理訟者在所爭皆小宰受而聽之凡祭祀贊玉幣爵之事祼將之事玉幣爵三者以禮神王祀五帝則大宰贊王小宰復助大宰以贊也祼用鬱鬯祀先王所用將則用瓉祼者王所以酌鬯於圭瓉之事將者人臣持以灌於地之事王親酌灌所以致敬昔者商人尊神交於明故先樂而求諸陽周人尊禮交於幽故先祼而求諸隂凡祭鬯人共秬鬯鬱人共祼器者入鬱草以和鬯酒祀天地則陳而不祼祀先王則有祼將之儀與其節大宰無祼將文互見於此凡賔客贊祼凡受爵之事凡受幣之事助冢宰贊此三事王待賔亦有祼以事神之道交之敬之至也喪荒受其含襚幣玉之事含襚所以贈死者王喪諸侯有致含襚幣玉之事凶年諸侯亦有致幣玉之事受者小宰專受之以復于上大宰無荒禮之文互見於此月終則以官府之叙受羣吏之要贊冢宰受嵗㑹小宰宰夫職文並以專達者居前從長者居後如宫刑所專典式所從月要所專嵗㑹所從嵗終則令羣吏致事大宰則令百官府此則令羣吏嵗終季冬十有二月也既於月終以叙受其要又于嵗終以叙受其㑹先令後受使無違慢正嵗帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑正嵗建寅之月得四時之正以成嵗功也治象之法大宰所縣於象魏者也帥其屬則易從官從而民可知徇警之切也木鐸金口木舌國有文事則振之以警衆也縣之魏闕則有目者無不見徇之木鐸則有耳者無不聞每嵗孟春必觀象徇鐸以警動萬民之耳目於觀感之下人事嵗功於此乎履端率作也夫治官之法大宰既懸象以示之小宰乃以身而帥之帥者喫緊致詳蓋有取於耳目聲色之外而敷求於躬行踐履之間聖人慮或帥之而不從徇之而不知則又申之以辭命曰不用法者國有常刑常刑者一定不易之刑也仁聲善教反覆詳盡其著於人心者深矣按大宰有正月之文小宰變文曰正嵗同是建寅之月以觀象之事足徵也蓋大宰布治而縣之小宰帥屬而觀之自是同時之事非有先後之異凡經中變文之類放此乃退以宫刑憲禁于王宫乃者亦更端也退者既徇而退也宫刑者職首所掌也禁禁之使不犯也治外不遺內舉逺不忘近正嵗縣治象於雉門之外宫中有不見者故縣象徇鐸之次以宫刑表縣之於宫中也令于百官府曰各修乃職考乃法待乃事以聽王命其有不共則國有大刑職如醫師醫為職膳夫膳為職法成法也待其事者若徵令復逆其來無常者皆曰待也君命無俟苟有聽聞而不共于此三者則用大刑此曰大者君親臨之宜莫大焉宰夫之職掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令宰夫掌凡考之事下大夫四人為之法為位次禁令謂若王南面三公北面東上卿大夫西面北上羣吏在其後之位禁之使不干于法令之使不愆于禮叙羣吏之治以待賔客之令諸臣之復萬民之逆法者朝位禁令治者待令與復逆之三事此三條皆宰夫職之總名目凡夏官司士大僕小臣秋官小司寇朝士司儀之屬所掌皆掌其法而叙其治事令者令于下也既掌治朝之法於王日聽朝則正其位賔客朝聘莫先焉故叙致其令也先賔客而次羣臣之復如說復于王之復也報之義也羣臣羣吏之次州長衆庶皆在焉故次以萬民使咸得通達其情無壅蔽也掌百官府之徵令辨其八職官則有正師司旅府史胥徒之名府則有治要治凡治目治數治藏贊治治序徴令之所掌辨者上徴某人則辨曰某人為某官上令某事則辨其某事在某府或以名舉或以叙及各致其辨無迷亂也一曰正掌官法以治要正各官之長其屬之所取正譬於治官則冢宰教官則司徒也法如治官則治法教官則教法也要者事之綱治之總㑹處也二曰師掌官成以治凡官必有師如宰夫鄉師之屬成者成事品式物之模範凡者分總衆條之名項安世曰官成即日成月成嵗成三曰司掌官法以治目司者有司若宫正宫伯以下各治一職行一司之事法如膳有膳法醫有醫法酒有酒法之類王昭禹曰一官有一官之法目如網之有目官長分其事而與之治司乃治其一條一目四曰旅掌官常以治數旅者衆也如旅下士之屬旅則遵奉故常視例而已五曰府掌書契以治藏契者憑驗如酒正云凡有秩酒者以書契授之是也凡府之事非契不行六曰史掌官書以贊治鄭鍔曰史主文書者歐陽謙之曰書契以後天下之事紀録之浩繁文移之往復記古昔之㖧㖧𫝊千里之忞忞要豈小補八職獨史稱贊治良有以哉七曰胥掌官叙以治叙掌大小官職尊卑之次叙八曰徒掌官令以徴令正當也長也師衆也二也司者有官府之名目為各屬之長旅者百執事之屬各任所執之事司與正同為長而大小不同師與旅同為衆而上下有異要與綱目為數是凡之目府庫非契不受政令非書不行契者得其凡要書者詳其數目才智可為胥則發施有叙役使謂之徒則走趍視令已上三節言掌治朝之法則與小宰掌治王宫之政令為有等言叙羣吏之治稱羣吏則避尊者言掌百官府之徵令稱叙及徵令則胥徒之事此宰夫職之所得專達者以下四節掌治法市法之吉賔弔喪之禮嵗終之法正嵗之法皆是為天官之考而從其長之事掌治法以考百官府羣都縣鄙之治乘其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之治法大宰治官之法考者㑹稽勾考之也掌其法以考其治都縣鄙三等采地羣者槩舉之也六遂五百家為鄙五鄙為縣四鄙為都乘猶計也算法乘除之名始此財有物用有名辟名者謂以虛為實指甲作乙書契財物不相應也足用者用度不闕謂不失財也長財者長猶養也謂蓄藏有法善物者善無惡也謂納受不苟乘其財用之出入者所掌治法在此也於失財足用二者考見百官府羣都縣鄙之治狀以告于冢宰視八法之官刑而誅賞之舊說財泉榖也用貨賄也物畜獸也雖於財用物三字為順而上文既單言財用則財為見物用為用度其出入之義自明故不取舊說以式法掌祭祀之戒具與其薦羞從大宰而視滌濯式法九式之法戒具見太宰掌者非掌其物也掌以法考其如式不如式爾從大宰而視滌濯以式法贊大宰也凡禮事贊小宰比官府之具凡五禮之事皆助小宰比校百官有司之所共具此事之應考而非職之所專達則執其式法贊小宰而為之考凡朝覲㑹同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飱牽與其陳數牢有飪有腥有牽委積給賔客道用者禾米芻薪之等膳食之善者獻禽獸也飲食者享食之禮如公食大夫之食飱食也春秋傳曰飱有陪鼎是也牽餼牽也謂牛羊之屬生致者陳者陳設數者品秩數目牢禮者總名也在道曰委積致館曰膳獻既聘有飲食贈送曰賔賜此皆行人掌客之職宰夫掌其禮以其式法而考之無過不及或曰牢禮王饗諸侯之禮按經曰王合諸侯而饗禮則具十有二牢庶具百物備是也其句曰牢禮委積曰膳獻飲食曰賔賜之飱牽賔賜者好賜也唯其膳獻以事君故下文又起意賔賜掌客掌四方賔客之牢禮餼獻飲食之等數凡諸侯之禮上公五積皆眂飱牽三問皆修羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米眂生牢牢十車車秉有五籔車禾眂死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔侯伯以下以是為等凡邦之弔事掌其戒令與其幣器財用凡所共者弔謂以弔禮哀禍災者戒所當共令所當具幣帛器具賜貨用物凡所必用者皆共之大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之有司羣吏也嵗終則令羣吏正嵗㑹月終則令正月要旬終則令正日成而以考其治治不以時舉者以告而誅之鄭鍔曰總一嵗之治者謂之㑹㑹言合聚之衆也總一月之治者謂之要要言綱領之詳也總一旬之治者謂之成成言事緒之就也應龍曰治者職業也㑹要成三者皆當考考嵗㑹以歸之大宰考月要以歸之小宰若日成則已職之所專理以日成旬以旬成月以月成嵗其有嵗終而不成嵗㑹月終而不正月要旬終而不正日成雖有治狀謂之不時令之而不飭于治考之而不協于正雖以時至謂之不舉不時舉者以告于治官之長而誅責若後世之違時令失期㑹者也令之而後考不徒考也不時舉者誅之不徒令也正嵗則以法警戒羣吏令修宫中之職事正嵗孟春之月小宰帥治官之屬而觀法徇以木鐸以宫刑憲禁宰夫贊其事以法警敕羣吏之職班令使修宫中之事宫中之事本非宰夫之職特以正嵗助小宰施令而已書其能者與其良者而以告于上能有道藝而見於事者良有德行而見於事者書謂記其姓名某也能某也良告謂以所書之姓名又告于上以俟他擢用夫如是小大之臣安得不咸懷忠良也宫正掌王宫之戒令糾禁正者宫官之屬於是乎取正凡言正者皆其屬官之所就正也王宫對王內言之也戒警戒令命令糾察糾禁防禁此一節是其所掌之綱劉氏曰飭人以畏慎之謂戒齊之以遵守之謂令詰之以過差之謂糾遏之以違誤之謂禁斯其所掌也以時比宫中之官府次舍之衆寡比者以此校彼比之欲其均也官在王宫者府者司存次者掌直舍者其所居寺也衆寡者名物之數也次舍有定處衆寡有定名其比較有定法如春秋潘崇掌環列之尹如漢光祿勳諸郎謂之郎衛職衛尉主衛士謂之兵衛職或問宫正所謂官府之在王宫者得非治職於王宫以給宿衛與曰劉氏之說亦善劉氏曰宫中而有官府者奉上之物用有不可以逺者如膳夫宫伯庖人內饔王府之類是也次謂八次所以待宿息也舍謂八舍所以待休沐也皆在宫中其人有時而衆寡不同故持其增減而殺之胡仁仲曰先王之制凡官府次舍列于庫門之外所以别內外嚴貴賤也今宫正乃比宫中之官府次舍之衆寡又曰去其竒邪之民則是妃嬪與官吏雜處而內外亂矣殊不知宫正所掌者宫中徒役之民與典婦功典絲典枲染人屨人等官皆士人也皆有室廬官署在內雖在宫中不應與妃嬪雜處漢郎吏舍衛士廬周匝殿內自後世而觀亦豈與妃嬪雜處蓋此有兩項一項是公卿大夫士之子弟國子貴游為之分置八隅宫伯領之所謂掌王宫之士庶子至授八次八舍之職是也一項是官府之在宫中徒役為之錯置于士庶子八次八舍之職間環衛於區廬以周王室宫正領之所謂掌王宫之戒令糾禁至教之道藝是也大抵兩項人皆是環列之衛至於人主切身侍御僕從却令掌於大僕而屬於司馬故宫伯所掌在漢時所謂郎衛宫正所掌在漢時所謂兵衛固悉領于大宰至春秋時猶存其制如潘崇為大師掌環列之尹是也陳君舉曰漢制猶有周官遺意以衛尉教衛兵如周官宫正之職以光祿勳掌郎從宿衛如宫伯之職而大司馬以三公都試郎從羽林兩衛城門宫衛北門軍兵屬焉近周制宮正宫伯之權統於小宰矣為之版以待此以上是宫中職之要夕擊柝而比之二木相擊以示警禁若後世之酉㸃者國有故則令宿其比亦如之故者事之適至非常事也令者以其故命於在版者宿者宿衛宿衛常事於有故而特云令宿何也常事則畨休更直有故則百官有司皆在焉如文王世子云諸父守貴宫貴室諸子諸孫守下宫下室是也比者比其人之在否辨外內而時禁辨外內外不干之內內不交于外時禁如擊柝在夕振木鐸在春秋夜行則以燭之類以上是戒令糾察禁之節稽其功緒糾其德行幾其出入均其稍食治職業者已成見功未成見緒緒者成事之端也稽之以警其怠慢糾之使無差慝幾伺察也幾其出入之迹慎作止也均則無貧餼稟稱事所以勸也四者之序先其事而後其食所以教也或曰稽其在官之功緒以糾其德行幾其名籍之出入以均其稍食去其淫怠與其竒邪之民去者去其惡使不為使之不為是即去也淫過也過則侵官怠慢也慢則曠職考而得其功緒之淫怠察而見其出入之竒邪則去之以上一節是戒令糾禁之目㑹其什伍而教之道藝㑹計也道者應事接物各有當行之法猶道路也藝如禮樂射御書數之類㑹其什伍者比其衆寡之目也二五為什則比於衆五人為伍則比于寡比亦附也教之道藝不徒㑹也㑹而計之使得有比以相從更畨上直遞休入學學在公宫南虎門之左教有師保氏之官而宫正之戒令糾禁行焉書曰綴衣虎賁克用常人為其常有常心也侍御僕從罔匪正人有以導之正道也月終則㑹其稍食嵗終則㑹其行事月終則㑹以求月成嵗終則㑹以考嵗成月㑹稍食不月㑹則失出入之實嵗㑹行事通一嵗則見功狀之完稍食行事者互見其文㑹其行事不徒食也㑹其稍食以稱事也此一節是以時比之目凡邦之大事令于王宫之官府次舍無去守而聽政令大事如小宰七事之屬無去所守守其常也無敢去者以從政也聽政令者無敢後也聽而後行無輕動也春秋以木鐸修火禁春秋二時大火出入之候春火將出則以木鐸徇于王宫之官府次舍使因火之出而有修治焉懼其始出而暴怒秋而火入則又以木鐸警之使因火之入而有修治焉懼其入而有餘烈鄭司農以讀春秋以木鐸修火句禁凡邦之事蹕按云季春出火此用木鐸當時孟春修者預為之防也凡邦之事蹕宫中廟中則執燭大喪則授廬舍辨其親疏貴賤之居凡邦之事合上文有故有大事言之也凡國有事而動官衆事在外則鳴蹕以止行人嚴清衛事在宫中廟中則執燭以察幽隱備非常此上皆時禁之目也徐筠曰宫正掌王公之戒令糾察自宫正至掌次凡三十官此王宫之官也內宰掌王內之政令自內宰至夏采凡十九官此王內之官也大府至掌皮凡十一官亦𨽻於王宫而皆總于大宰掌財賦出內之官也宫伯掌王宫之士庶子凡在版者鄭鍔曰士謂諸吏之適子庶謂諸吏之庶子應龍曰伯亦掌也士庶子者公卿大夫元士之適子庶子入衛王宫學以授其世業者管子曰處士於官府是也版猶名籍凡在版者謂在王宫又有公族之正室支庶有國子之賢者能者有庶人之在屯衛者執技能者給役使者皆著其籍掌其政令行其秩叙作其徒役之事政令者行其秩叙作其徒役之事也徒衆也所謂公徒役趍使也諸解俱以作徒役之事為大子所用役自是諸子之職已上是職之綱凡諸官職首一節皆是提一官之大要授八次八舍之職事次者執掌所直舍者宿衛區分次如次于陘之次舍如舍于郊之舍鄭司農以在內為次在外為舍皆是約而言之即如康王即位八人立於門堂階垂可見八次之大略如漢掌張衡云兵衛八屯可見八舍之遺意八次八舍之人各有所任之職所執之事宫伯授之為行其秩叙之事也若邦有大事作宫衆則令之此作其徒役之事也月終則均秩嵗終則均叙以時頒其衣裘掌其誅賞秩者以位制祿均秩所以佐宫正之均其稍食也叙者才氣等第也均叙佐宫正之稽其功緒也宫伯月終嵗終則均之宫正月終嵗終則㑹之均者乃齊整焉以待其㑹也夏時頒衣冬時頒裘若後世之賦冬夏衣也賈氏曰賦班也宫正㑹其行事宫伯行其誅賞誅賞者大宰之法小宰所掌建國之宫刑於此奉而行之也
