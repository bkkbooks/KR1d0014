  text: 欽定四庫全書經部四
  hash: sha256:753fed3570de885feea2655f2afda2dcac3de78d0edd6607684749ed59d8b745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0014_WYG_000-1a, image: WYG0095/WYG0095-0761a.png}
body:
  text: 周官集𫝊禮類一周禮之屬提要臣等謹按周官集𫝊十六卷元毛應龍撰張萱内閣書目稱應龍字介石豫章人大徳間官澧州教授而江西志乗俱佚其名始末已不可詳考矣是書於諸家訓釋引據頗博而于鄭鍔之解義徐氏之音辨及歐陽謙之之説所採尤多其自出己意者則題應龍曰以别之其中有沿襲誤説未考古義者如鐘師掌金奏以鐘皷奏九夏杜子春鄭康成皆以九夏為樂曲而應龍獨引歐陽謙之説謂左𫝊襄四年曰金奏肆夏之三工歌文王之三文王而曰工歌是有詩而可歌者也肆夏而曰金奏是徒有其聲可以金奏而無詩可歌明矣今考孔穎達左𫝊疏云作樂先繫鐘故稱金奏此晉人作樂先歌肆夏肆夏是作樂之初故于肆夏言金奏也次工歌文王樂已先作非復以金為始故言工歌也其説足與鄭注相發明如以九夏之文統金奏之下即以為非樂曲則鐘師又有凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩之文貫于金奏下豈亦均非樂曲乎又喪祝禂牲禂馬亦如之鄭注禂讀如誅今侏太字也為牲祭求肥充為馬祭求肥健也應龍亦主謙之説謂禂稠也禱牲稠盛也以康成改讀為非考禂侏二字古音本通非康成改讀揚雄國三老箴負乗覆餗姦冠侏張晉書慕容垂載記符堅報書曰侏張幽顯魏書恩倖𫝊侏張不已北齊源彪𫝊呉賊侏張侏張即譸張侏與譸蓋猶侏與禂音同故義借安得指為康成改讀乎又㮚氏為鬴應龍引鄭鍔之説曰晏子謂六年四升為鬴管子謂百升而成釡康成則謂四升曰豆四豆曰區四區曰釡為六斗四升以下文觀之其臀一寸而容一斗則當為斗釡之臀一寸而容一斗則釡之内方一尺而容十斗無可疑者十斗則百升正管仲所謂釡也康成謂四升曰豆毎四而加故區至釡而六斗四升彼殊不考之于梓人也梓人為飲器爵一升觚三升獻以爵而酬以觚一獻而三酬為一豆矣夫一獻則一升矣三酬則九升也以一合九非十升為豆而何而康成謂四升為豆失之矣今考康成謂鬴六斗四升實據經文方尺深尺以粟米法算之葢粟米法方一尺深一尺六寸二分乃容一石鍔以鬴容一石則是鬴方尺深尺六寸二分矣其何以解于經文方尺深尺耶管子海王篇鹽百升而釡房元齡注謂鹽十二両七銖一黍十分之一為升當米六合四勺百升之鹽七十六觔十二兩十七銖二纍為釡當米六斗四升則是海王篇百升之釡乃寔百升之鹽非寔百升之粟也今鍔以管子量鹽之鬴為㮚氏量粟之鬴比擬已為不倫至于康成注梓人以豆為斗寔以豆止四升不及一獻三酬之数鍔誤以豆為飲器遂牽合十升之文反詆改豆為斗之非不知古以斗為飲不以豆飲詩行葦篇毛𫝊曰大斗長三尺戰國䇿曰令工人作為金斗長其尾與代王飲即因反斗擊之此斗為飲器之証也越語曰觴酒豆肉韓子外儲篇曰取一豆肉是豆寔食器而非飲器之証也又安得引梓人之文為管子之旁証乎諸如此類皆未免膠執舊聞疎于考核至于冕服車旗之度廟祧昭穆之制司尊彛之六尊六彛司凡筵之五几五席方功義弓之異名正嵗正月之並用條例引証頗為明晰宋以來諸家散佚之説尚因是以存其厓畧則蒐輯之功固亦非尠矣其書諸家著録皆云二十四卷今散見于永樂大典者地官夏官適當缺帙其餘四官首尾頗為完具謹録為十六卷以一官三卷共得二十四卷計之仍其舊第也應龍所著别有周官或問五巻在集𫝊之外永樂大典割附集𫝊之後其存者僅天官十九條春官十四條秋官冬官各一條篇幅寥寥不能别成一帙今仍附于各𫝊下既免以畸零散佚且使一家之説互相參証亦足以資發明焉乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
