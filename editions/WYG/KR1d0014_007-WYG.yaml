body:
  text: 周官集傳卷七元毛應龍撰樂師掌國學之政以教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞聶氏圖曰帗列五采繒為之有秉舞者所執羽舞師註曰析白羽為之宛丘詩曰無冬無夏值其鷺羽值者持也鷺翿之翳謂舞者所持以指麾又蔽翳其身也形如帗鄭司農曰干舞者兵舞劉氏曰謂執干盾以為武舞也人舞者手舞劉氏曰謂使人效四夷來王之舞也教樂儀行以肆夏趨以采薺車亦如之環拜以鍾鼓為節鄭鍔曰此皆王出迎賓之時所奏名曰肆夏則以安肆為義行則緩而安肆也名曰采薺則以齊速為義趍則急而齊速也在堂則賓已近故速若在車上則行趍然亦在車而謂之行謂之趍者盖言所奏之遲速與行趍時無異也又曰環拜盛禮鍾鼓盛樂也禮之盛者必用盛樂也凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節鄭鍔曰射者何以聽何以射盖言應節之難也天子五節以聽四節以射其詩則騶虞也諸侯三節以聽四節以射其詩則貍首也大夫士一節以聽四節以射詩則采蘋采蘩也按射儀注云騶虞采蘋采蘩詩篇名貍首逸凡樂掌其序事治其樂政凡國之小事用樂者令奏鍾鼓凡樂成則告備詔來瞽臯舞及徹帥學士而歌徹令相饗食諸侯序其樂事令奏鍾鼔令相如祭之儀燕射帥射夫以弓矢舞樂出入令奏鍾鼔凡軍大獻教愷歌遂倡之凡䘮陳樂器則帥樂官及序哭亦如之凡樂官掌其政令聽其治訟歐陽氏曰凡聲音之正否器物之備缺時節之先後舞列之謹怠凡屬於樂事者無非樂政也則無非樂師之所當治矣鄭鍔曰國之小事或有當用樂者令奏樂者鍾鼓不當用者不令之則不敢奏也大胥掌學士之版以待致諸子春入學舎采合舞秋頒學合聲鄭鍔曰入學頒學均謂之學也一字之義分而為經㫖不然也質之月令春入學合舞秋入學習吹之以為入學頒學者無二義皆學宫也盖周家建五學其中謂之辟雍水南曰成均水北曰上庠水東曰東序水西曰瞽宗春令學士始入學所以學於辟雍也總處於此以觀其能然後分而處之至秋則所觀者以知其能否矣於是分而處之冝學禮者處之瞽宗冝學書者處之上庠宜學干戈者處之東序宜學樂者處之成均非惟不分學士為二義又合周家立學之制也以六樂之㑹正舞位以序出入舞者比樂官展樂器歐陽謙之曰當合樂之時掌樂之官欲其俱在焉作樂之器欲其俱備焉故湏此展省之然後可以作樂也必大胥比之展之何也大胥掌習舞者此之合樂其為學士習舞而設故耶凡祭祀之用樂者以鼓徴學士序宫中之事鄭鍔曰如當用樂則鳴鼔以召學士記曰大昕鼔徴以警衆也歐陽氏曰大胥所職盖無與於宫中而云宫中之事竊意宫字當為官字序官中之事序次其一官所掌之事也士師云掌官之政令與此意同小胥掌學士之徴令而比之觵其不敬者巡舞列而撻其怠慢者正樂縣之位王宫縣諸侯軒縣卿大夫判縣士犆縣辨其聲凡縣鍾磬半為堵全為肆大師掌六律六同以合隂陽之聲陽聲黄鍾太簇姑洗蕤賓夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾鄭鍔曰陽律則順而左旋隂吕則逆而右轉進陽退隂故迎而與之合也大師以十二管吹而求其合方其未得所合則陽自為陽隂自為隂樂聲無自能合及其吹而合之則黄鍾與大吕配大簇與應鍾合姑洗奏而南吕應蕤賓奏而林鍾從由是天地神人皆可得而感動之六吕亦名六同謂同乎陽也又名六間謂間於六陽之間也皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹鄭鍔曰六律六同已合則必以五聲文之易曰物相雜故曰文言用五聲以相雜使如錦綉之成文也司馬氏樂書註曰宫弦最大用八十一絲聲重而尊故為君商是金金為决斷臣事也弦用七十二絲次宫如臣次君也角弦用六十四絲聲居宫羽之中比君為劣比事為優故云清濁中民之象徴屬夏夏時生長萬物皆成形體事亦有體故配事弦用五十四絲羽為水最清物之象弦用四十八絲或問六律六同相合相生之義鄭鍔曰黃鍾者言陽􅂔始萌於黃泉之宫施布種地也大吕言陽􅂔大旅助乎陽以牙物也大蔟言陽􅂔大族出乎地也夾鍾言夾助乎陽以宣乎種物也亦謂之圜鍾以為圜丘之樂宫取天體之圓以言之也小吕言隂􅂔旅助乎陽始萌而尚小亦謂之中吕言至此地為隂陽之中處也蕤繼也賓尊也言陽氣𨗳隂􅂔而生養萬物也函鍾即林鍾也林君也君氣繼陽君主種物也又謂之函鍾言地道之能包容也夷則言陽􅂔正法度使隂夷則傷物也南吕言隂􅂔助陽而任成萬物也南任也又言南方之功成於此也無射言陽􅂔成物終而復始無有厭射應鍾言隂氣應無射而閉藏種物也教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音歐陽氏曰教六詩未必即是教之歌詩也以風賦比興雅頌之義教之爾故瞽矇以歌詩為職而不知其義得無如齊髙厚之歌詩不類者乎大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼔􅉧大饗亦如之大射帥瞽而歌射節大師執同律以聽軍聲而詔吉㐫大䘮帥瞽而廞作匶諡凡國之瞽矇正焉林氏曰堂上之樂以歌為主故謂之升歌堂下之樂以管為主故謂之下管小師掌教鼔鼗柷敔塤簫管絃歌孔氏曰柷以合樂敔以止樂聶氏圖曰爾雅註云簫二十三管風俗通云舜作簫以象鳯翼大祭祀登歌擊拊下管擊應鼔徹歌大饗亦如之大喪與廞歐陽氏曰擊拊應鼔歌三事小師之職也以登歌下管徹為節也大饗亦如之從登歌擊拊下管擊應鼔徹歌皆如祭祀之時也凡小祭祀小樂事鼓􅉧掌六樂聲音之節與其和歐陽氏曰􅉧所以引樂也大祭祀大饗大師鼔􅉧以引樂小祭祀小樂事則小師鼓􅉧以引樂瞽矇掌播鼗柷敔塤簫管絃歌鄭鍔曰古之王者作樂必欲審聽其音非好樂也盖將以知政爾聽必使矇瞍者謂其收視於内不亂於外聽必審也然人而無見乃廢疾也使其以疾而見廢則先王之所不忍者是故閽者使守門刖者使守積聾者使司視而瞽者使司聽兹又不忍棄人之仁心也諷誦詩世奠繫鼓琴瑟鄭鍔曰諷誦詩及世奠繫則鼔琴瑟以颺之使聽者既聞其聲又逹其意當諷誦而鼓琴所以平和君心也其心和平則聞規戒不惟不怒且又樂而無倦也或謂先王使公卿大夫各致其規警諷諌非不足以聞過彼微而樂工乃使之諷誦古時及世帝繫耶愚謂得於言則其聽也未必審得於樂則其聞也入必深所樂在是所聞必詳因恱樂之時得規戒之益其效㨗於卿大夫之諫非以為朝廷百辟無能誦前代之事以論興衰也所謂瞽矇誦詩之諫見於此矣掌九德六詩之歌以役大師鄭鍔曰九德之歌夏書九功之可歌者也六詩之歌風賦比興雅頌之聲節以役大師聽從其令也眡瞭掌凡樂事播鼗擊頌磬笙磬鄭鍔曰樂工用瞽矇三百人故用眡瞭亦用三百人以扶之其眡明瞭又明者也播鼗本瞽矇事為其無目故眡瞭先播之使聞皆言播鼗盖有先後也又曰列於東方謂之笙磬東物生之地取物所由生之義列於西方謂之頌磬西物成功可歌之義眡瞭或擊其東或擊其西掌大師之縣凡樂事相瞽鄭鍔曰大師知音然目不明於眡故為之正其序又曰相瞽矇以升堂大䘮廞樂器大旅亦如之賔射皆奏其鍾鼓鼜愷獻亦如之歐陽氏曰賔射皆奏其鍾鼓言皆則賔客與射為両事言其則鍾鼓眡瞭自作也凡樂事有令之者又有奏之者又有作之者經中言奏皆是舉起引發而使他人作之之意典同掌六律六同之和以辨天地四方隂陽之聲以為樂器凡聲髙聲䃂正聲緩下聲肆陂聲㪚險聲斂逹聲嬴㣲聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石鄭鍔曰律呂之數皆起於黃鍾因黃鍾之數以求長短多少則律呂由是生矣律呂不和則聲必至於不和而制氣則為聲之病是故有大髙大正或䃂或緩之失器莫大於鍾於是言鍾之病鄭鍔曰形謂偏陂則其聲㪚而不収又曰十二辰零鍾其不甚圜凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之鄭鍔曰用十二律以為之度數則長短多寡由此而生用十二聲以為之齊量則大小輕重由此而准或厚或薄或髙或下由數度之不審也以是病而求之得其聲矣或侈或弇或達或回由齊量之或差也以是病而求之得其制矣如是而為樂器和焉磬師掌教擊磬擊編鍾教縵樂燕樂之鍾磬鄭鍔曰先儒謂磬為四方之音又以磬音為象萬物之成盖六秋之音為至清也惟清故難調䕫特以擊石拊石百獸乃率舞詩人特曰依我磬聲此所以設磬師以教其擊之之法凡祭祀奏縵樂杜子春云縵讀為怠慢之慢縵者雜聲比朝祭為慢縵非正聲祭祀亦奏縵樂將以安神示之懽心也鍾師掌金奏凡樂事以鍾鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏凡祭祀饗食奏燕樂凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采繁掌鼙鼓縵樂鄭鍔曰鍾之名有鏄有鏞而又有編鍾編鍾十有六為一虡小胥正其位磬師教其擊者也鏞則十二辰之鍾書所謂笙鏞以間典同則辨其聲者也鍾師掌鳴鍾以奏樂故曰掌金奏叩之大小鳴之大小鏘鏘喈喈為樂之盛故奏九夏必擊之歐陽氏曰左傳襄四年曰金奏肆夏之三工歌文王之三文王而曰工歌是有詩而可歌者也肆夏而曰金奏是徒有其聲可以金奏而無詩可歌明矣九夏之樂其所謂金奏之樂乎後世承訛習舛而以諸夏為詩篇也笙師掌教龡竽笙塤籥簫箎篴管舂牘應雅以教祴樂聶氏曰諸管參差亦如鳥翼聶氏圖曰笛者滌也所以滌蕩邪穢也徐氏音辨曰築地曰舂樂記曰迅疾以雅疏云雅樂名舞者迅疾奏此雅器以節之也凡祭祀與饗射共其鍾笙之樂燕樂亦如之大䘮廞其樂器及𦵏奉而藏之大旅則陳之歐陽氏曰或不用備樂只用鍾與笙也鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賔射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之大䘮廞其樂器奉而藏之歐陽謙之曰凡軍之夜三鼜盖鼓人軍旅夜鼓鼜是也皆鼓之盖鎛師以鼔警發鼓人鼔之也守鼜者盖掌固所謂夜三鼜以號戒是也亦如之亦如軍旅三鼜皆先鎛師鼔之而後有鼔鼜者也韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之鄭鍔曰或謂四夷之樂東方曰韎南方曰任西方曰侏離北方曰禁韎東方之樂名設官以掌之何也愚以象胥之官推之象胥譯四夷之語者也其文曰東方曰寄南方曰象西方曰狄䪘北方曰譯以是知周家之德能致四夷明矣至於樂則止有韎師竊以三方之樂不作於祭祀之時而東夷之樂為近正故奏之也何則東夷孔子之所欲居且為箕子之國則其樂有中國之氣可知不然何獨設官以教之歟祭祀舞韎樂明其得逺夷之懽心以祀其先王大饗亦舞之示諸侯以逺夷向化歌舞聖德如此則為諸侯者可不奉王命乎旄人掌教舞㪚樂舞夷樂凡四方之以舞仕者屬焉鄭鍔曰樂師所教凡六而旄舞居其一攷之於經或用之社稷或用之山川旱暵獨旄舞無所考掌觀掌四夷之樂凡有三官曰韎師曰旄人曰鞮鞻氏作四夷之樂當從其國之舊不變其俗所尚立韎師則所服者赤韋示不變其所服也立旄人則所執者牛尾示不變其所執也立鞮鞻氏則所履者革示不變其所履也凡祭祀賔客舞其燕樂鄭鍔曰祭祀賔客作燕樂之時旄人則用其所習之㪚樂夷樂而舞之也籥師掌教國子舞羽龡籥祭祀則鼔羽籥之舞賔客饗食則亦如之大䘮廞其樂器奉而蔵之歐陽氏曰鼔羽籥之舞亦當如鼔金奏之類使之聽鼓聲而為舞之節也籥章掌土鼔豳籥中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之鄭鍔曰周之先公開國於豳教民稼穡與夫為寒暑之事備於七月詩而謂之豳風至於成王王業大備念其祖務農之勤教民之悉凡四時所行皆以豳詩從事故用豳籥名官殆由齊竽趙瑟秦缶皆其國之所尚也以籥而吹豳詩殆猶瑟之曲笛之弄也然所掌者乃用土鼓土鼓伊耆氏之樂也伊耆氏即神農始教民畊者也周人以先世開國以農不敢忘土事之始由是設籥章之官專掌土鼓而用豳國之籥所吹皆豳國之音不忘本也凡國祈年于田祖龡豳雅擊土鼓以樂田畯朱氏詩傳曰周禮所謂豳雅王氏謂亡之或疑即楚茨以下四篇是楚茨信南山甫田大田也歐陽氏曰田畯之義當從爾雅為正或以為先教田者或以為田大夫未必經意也鄭鍔曰祈年吹豳雅雅者正也國祭蜡則龡豳頌擊土鼔以息老物朱氏詩傳曰豳頌擊土鼔以息老物王氏以為亡之或疑即思文臣工噫嘻豐年載芟良耜等篇未知是否或問杜氏引郊特牲蜡祭十二月鄭氏謂十二月建亥之月賈氏取月令為證如何曰周以建子為正而月數未嘗改七月之詩月數皆夏時也孟冬祈來年亦猶社曰卜來嵗所以重嵗事而為早計爾鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之鄭鍔曰祭祀用之以樂神示燕樂用之以明盛德之所致也典庸器掌蔵樂器庸器鄭鍔曰庸器者紀功之器也經曰民功曰庸樂器則國家所自造之器而庸器者則王者有救民之功然後得此器二器雖在所蔵而所以示後世者以救民之功為主祖先傳之後世以為榮子孫守而不墜以為之寳故特以名官也及祭祀帥其屬而設筍虡陳庸器饗食賔射亦如之大䘮廞筍虡爾雅云木謂之虡所以挂鍾磬案韻虡或作簴鄭鍔曰樂器必用筍虡以縣之此以掌蔵樂器為職故凡祭祀時則帥其八十人之屬以設筍簴然但設而不掌其縣所當陳者庸器爾陳於祭祀之時以表先王有功能得此器子孫能守以奉祀也陳於饗食賔射以彰先王之功可服諸侯且以為國之華也司干掌舞器歐陽氏曰名官以司干而以掌舞器為職則所謂干戚羽籥之具宜無所不掌矣祭祀舞者既陳則授舞器既舞則受之賔饗亦如之大䘮廞舞器及葬奉而蔵之歐陽謙之曰祭祀之時必待舞者皆陳列就位而後以其器授之貴其整肅也大卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百掌三易之灋一曰連山二曰歸蔵三曰周易其經卦皆八其别皆六十有四朱氏曰周代名也其卦本伏羲所畫而有交易變易之義故謂之易其辭則文王周公所繫故繫之周變易便是流行底交易便是對待底掌三夢之灋一曰致夢二曰觭夢三曰咸陟歐陽謙之曰三夢之法皆占夢之書也其經運十其别九十鄭鍔曰其經運十占夢之正法有十也一運而九變十運而九十變故經運十其别九十也十運者夢之運變也精神之運心術之動然後見於夢故三夢占書名之曰運或問大卜云其經運十鄭氏注改運為煇之說何如曰此經言掌夢之法故鄭說為非鄭鍔曰視祲有十煇之法此日旁之氣十煇者日之輝光也十運者夢之運變也安有改運字以為虛邪以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政鄭鍔曰使掌北門之管而或誘秦以伐鄭約晋伐狄而或有二心於狄則人不可以輕與謀者始剏議以立事吉凶悔吝由動乃生作内作外吉凶不一則謀事之始宜致其審果者進退未决而求其决也當斷不斷或有受其亂之悔宜進不進或失投機之㑹則行事之不果爾至者㑹言近止而人或過期欲有所往而道或不通凡國大貞卜立君卜大封則眡髙作龜大祭祀則眡髙命龜凡小事涖卜國大遷大師則貞龜凡旅陳龜凡䘮事命龜鄭鍔曰涖卜尊者之職也事既小則大卜尊矣其涖之宜哉卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆鄭鍔曰以理推之方兆者言占四方之事也漢武發易而占知神馬當從西北來非占四方之事乎功兆者占立功之事也楚司馬子魚卜戰令龜曰鮒也以其屬死之楚師繼之尚大克之非占立功之事乎義兆者占義之事也南蒯筮得黃裳元吉惠伯曰忠信之事則可不然必敗非占行義之事乎弓兆者弓有射意故後世有覆射法東方朔射守宫跂跂縁壁之語非有覆射之事乎卜師眡龜而得之兆象乃開出其書如書所謂啓籥見書也愚按四兆之義不可彊為之説姑記所聞以俟知者凡卜事眡髙揚火以作龜致其墨凡卜辨龜之上下左右隂陽以授命龜者而詔相之鄭鍔曰凡卜必以龜骨可灼之髙處眡於涖卜之人乃揚熾其火以發作其龜兆而致其墨致龜食墨則有吉凶可占龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入於龜室上春釁龜祭祀先卜若有祭祀則奉龜以往旅亦如之䘮亦如之賈氏曰春時風氣燥達之時也菙氏掌共燋契以待卜事徐氏音辨曰莊子爝火不息亦作燋燋所以持然火也凡卜以明火爇燋遂龡其焌契以授卜師遂役之徐氏音辨曰爇燒也占人掌占龜以八簭占八頌以八卦占簭之八故以眡吉凶鄭氏曰卜筮皆當占特言掌占龜說者引左傳筮短龜長不如從長之言謂掌占夢者專以龜為斷也愚謂卜筮各立一官占人專掌占龜筮人專掌占筮各不相干晉獻卜驪姬卜人知其不可從長之言有為而發豈曰專以龜為斷乎以八筮占八頌事有先以蓍而筮者則又兆之於龜兆之頌也以八卦占簭之八故事有先用龜以卜者則又卜之於筮之辭也筮有九此言八筮亦云八故盖所筮之八事曰征曰象與謀果至雨瘳也謂之八命亦云八筮亦云八故亦因八事之故乃有八筮乃占於頌頌有千二百而以八頌為占者盖所筮之事有偶於八頌相符者則從而占之於千二百中之八也至於用龜以卜既成八卦又參之筮以占之其所占者此八故爾然則占人既用卜又參用筮也凡卜簭君占體大夫占色史占墨卜人占坼凡卜簭既事則繫幣以比其命歲終則計其占之中否鄭鍔曰墨龜所食之墨也簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶劉氏曰予謂九筮之名而以辨吉凶則不可以巫為筮矣此乃前世通於占者九人其遺法存於書可傳者也古者卜筮之官通謂之巫更咸式目等皆其名者也巫咸見於他書多矣易疑為陽所謂巫陽也其他則未聞雖未聞不害其為有也凡國之大事先簭而後卜上春相簭凡國事共簭或問筮人先筮而後卜鄭氏云於筮之凶則止不卜集傳不載何耶曰賈氏云曲禮曰卜筮不相襲若筮不吉而又卜是卜襲筮故筮凶則止不卜按洪範云龜從筮逆又云龜筮共違於人觀此則筮不吉而又卜不嫌其為先筮後卜賈附㑹鄭說謂彼是箕子所陳用殷法故與此不同非也占夢掌其嵗時觀天地之㑹辨隂陽之氣鄭鍔曰所占者人君之夢也人君精神與天地隂陽相為流通夢之吉凶天下之吉凶禍福繫焉故設官以三夢之書占其六夢以日月星辰占六夢之吉凶天地之㑹有升降往來隂陽之氣有盈虛消息歲之所建時之所運固有常數所以觀之辨之又以日月之運星辰之次以占夢之吉凶焉盖日月星辰其垂象可見者也按堪輿黄帝問天老所謂大㑹有八小㑹亦有八則十二月皆有建厭對配之義占夢者又必以日月星辰推之一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢季冬聘王夢獻吉夢于王王拜而受之乃舎萌于四方以贈惡夢遂令始難敺疫鄭鍔曰如文王之夢九齡髙宗之夢傅説孔子之夢周公則平時思之故夢焉盖夢之正也夢飲酒者旦而田獵夢有喜者旦而哭泣幽明之相反顛倒錯亂孰為吉孰為凶也是故考諸天地隂陽以决之也不然何必占夢之官邪眡祲掌十煇之灋以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降正嵗則行事嵗終則弊其事掌主也眡祲主以法為之安其居處也降下也降如天降割於我家之降人見妖祥則不安叙述降災之故為祈禳之語以去之民心均欲除惡樹善占夢以季冬贈惡夢此以正嵗而行安宅之事所以順民心也弊斷也正嵗之行歲終斷之計其吉凶多少以驗其禳降之有效否以行賞罰亦所以餼廩稱事歟
