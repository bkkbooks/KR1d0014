body:
  text: 周官集𫝊卷三元毛應龍撰膳夫掌王之食飲膳羞以養王及后世子膳言善也善牲肉以饌謂膳致滋味以進謂羞食飲膳羞四者食物之總名養者奉養王之身體后天下之母配王而內治世子者王之繼體及者致養之道如養王之法凡飲食之道食養隂氣飲養陽氣膳羞之物地産以養形天産以養精合天地隂陽之妙於割烹煎和之間順時令法造化輔血氣育神明作隂德不使勝於陽作陽德不使勝於隂致養於鼎爼之末端民本於臣民之上膳夫掌之凡庖人所供內甕所辨外甕所陳亨人所執皆總其法大宰統之其於王身為至切是所以保其身體厚為輔翼而歸諸道者也凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋羞者致滋味之名百二十品者或云臐膮膷修之等雉兔鶉鴽爵鷃蜩芝栭之屬散見於禮記內則等篇中者愚謂當時六畜六獸六禽之物割烹煎和之異體名肉物之别旅陳之為百有二十之數珍羞者膳羞之别名此一節釋上文四物之目也臐許云反羊臛也膮許堯反豕臛也膷音香牛臛也鴽爾雅云鴿也鷃鴿屬蜩蟬也芝栭芝水芝栭無華而實者王日一舉鼎十有二物皆有爼朝食一殺牲而三時進之中夕食雖有備味之養不更殺也正鼎割烹之鼎陪鼎煎和之鼎爼以盛物取於鼎以實爼曰唯一舉則不多殺鼎爼有數則不極配肥甘之欲且以集九州四海之美味以天下養一人而必定其名物度數焉鄭鍔曰案禮記郊特牲鼎爼竒而籩豆耦者鼎爼以盛牲體牲者動物之屬乎陽者也其數亦竒今則十有二何也考於禮家之數牛一羊二豕三魚四臘五腸胃六膚七鮮八臘九所謂正鼎九也又有膷一臐一膮一所謂陪鼎三也或九或三其數皆竒不以竒為言而合之以十二者豈非以示人君之尊宜法天之故歟觀天子衣之十二章門之十二重馬之十二間冕之十二旒則鼎爼之竒以十二為言意可知矣以樂侑食膳夫授祭品嘗食王乃食卒食以樂徹于造鄭氏曰侑猶勸也應龍曰司樂王大食三侑是也禮飲食有祭示有所先膳夫授所為祭之物如殷祭肝周祭肺是也祭所以仁鬼神也祭而食無終食之間違仁也品者物品品嘗者物物皆身嘗之為盡已之職愛君之道也賈氏曰鄭司農云徹置故處謂造食之處即厨是也應龍曰徹而復於造為知其所嗜知其所廢也王昭禹曰王之食也以禮而侑徹也以樂則禮樂未嘗斯須去身也王之所養蓋可知矣王齊日三舉三舉者非殺牲以養之謂也備品物之薦舉鼎爼如朝食之禮者三盛典禮而薄滋味也所謂割不正不食魚尾不盈尺不殺薄味以養神精意以致純也此與下文一節言食之變大喪則不舉大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉不舉謂若殺禮而不備物聽樂為自貶損如禮曰歲凶年穀不登君膳不祭肺後世亦有减膳徹樂之文所謂樂以天下憂以天下也王燕食則奉膳贊祭燕食饗燕飲食之禮所以親宗族兄弟四方賔客也上文授祭是朝食有牲殺而祭也奉膳贊祭是有燕禮而祭祭而燕食也凡王祭祀賓客食則徹王之胙爼凡王之稍事設薦脯醢此賓客為來助祭者稍事是待客之禮設薦脯醢是待王之事王燕飲酒則為獻主燕義云使宰夫為獻主宰夫亦膳夫也王燕食則奉膳贊祭王燕飲酒則為獻主通為饗燕之禮以上四節亦通為有賓客之事而掌食飲膳羞之目也春秋𫝊魯公在齊飲酒使宰獻而請安公如晉是齊以食大夫者待魯公也掌后及世子之膳羞稱膳羞者示與王同牢而不特殺也凡肉修之頒賜皆掌之牲肉脯羞王以自養者養賢謂鼎肉也頒者膳夫掌受命而頒之賜以君命將之也凡祭祀之致福者受而膳之鄭鍔曰臣下有自祭其先而王賜之禽者既祭則歸胙於王應龍曰致福如都宗人凡都祭祀致福於國家宗人凡祭祀致福是也祭畢則歸胙於君謂之致福致福者歸美報上之義受而膳之者享其誠以成其政也少儀曰凡為人曰祭福為已祭而致膳於君子曰膳凡膳告於君子主人展之以授使者於阼階之南南面再拜稽首送之反命主人又再拜稽首其禮大牢則以牛左肩臂臑折九個少牢則以羊左肩七個犆豕則以豕左肩五個應龍曰臑肩腳也九個者取肩自上斷折之至蹄為九段也臑奴報反犆豕集韻說文豕三嵗為特特敵德反或作犆以摯見者亦如之摯群臣朝見所執者大宗伯以禽作六摯是也其羔鴈雉鶩雞之屬雖微物而百代不刋之典故亦授之以供王之膳致福者愛君摯見者敬君也受之者享之也膳之者善之也歲終則會唯王及后世子之膳不㑹歲終則㑹會其六穀六牲酒醬醯醢出入之數謂與下飲食之官為長故當會也唯王及后世子之膳不㑹者蓋為牲則會為膳則不會庖人王及后之膳禽不會惟膳不會未膳而為禽則取之有司者烏得不會唯共上之飲酒之出於酒府者不會不言世子者於此已見世子之文不重為見也餕食侍食人子之事祭祀父母洗腆父母之慶不待舉其文而已見也何以見共上之酒非會也下文共其計是也庖人掌共六畜六獸六禽辨其名物應龍曰六獸鄭司農以為麋鹿熊􅍪野豕兔康成以狼易熊干寶以麞易􅍪六禽司農以為鴈鶉鷃雉鳩鴿康成引未孕曰禽以為羔豚犢麛犢雉愚按經曰大禽公之小禽私之當是六畜馬牛羊豕犬雞之大者曰六獸小而未孕者六禽至於狼兔之屬野物之數不畜於國獸人共之也此其物皆有名號物色凡經文多有一句之中自分綱目者類此庖人所辨名物與內饔不同凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞共祭祀之好羞共喪紀之庶羞賓客之禽獻凡者發其凡死者此謂田漁所進之已殺者生全者按廣韻鮮亦作鮮凡此四物乾濕相資故名為膳后世子不言薦為有所從也凡令禽獻以法授之其出入亦如之法者式法也此即所謂當獻之數也入者謂所屬以所令之禽至則再以此法校數之出者謂致於賓則又以此法比數之凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮羽膳膏羶歲終則會唯王及后之膳禽不會春宜羔豚物生而肥則膳以牛脂其臭香牛屬土秋宜犢麛物成而充則膳以雞膏其臭腥雞屬木夏宜腒鱐暵熱而乾則膳以豕膏其臭臊豕屬北方水冬宜鮮羽水涸而性定則膳以羊脂其臭羶羊屬南方火上八物皆未孕之禽得四時之氣為尤盛為人食之弗勝以下四物皆大獸之屬得四氣之廢是以用休廢之脂和王相之物雞亦為獸者雞之類自分小大凡氣休王相乘為得其宜此凡共膳羞之法膏臊鄭司農云豕膏也內饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物割以授烹煎以致和肉割而有體名烹而有肉物煎和而有百品之别曰百品味者百詳於名品詳於物味詳於肉辨者各致其别識王舉則陳其鼎俎以牲體實之陳叙設之也選百羞醬物珍物以俟饋共后及世子之膳羞賈氏曰俟待也預選知當王意所欲者以待膳夫共王之饋辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲視而交睫腥馬黑脊而般臂螻鄭鍔曰辨者必辨毛色聲音之間鄭司農曰庮朽木臭也謂若牛無事夜鳴者其肉如朽木臭鄭鍔曰羊取柔毛者美若其毛本稀泠末毳結者其肉必穢惡貍謂氣不通泄應龍曰豕聽物宜俯睛不合望視而睫交今米猪在在有之四臭之不可食者此六牲之疵癘為臭惡者不食也凡宗廟之祭祀掌割亨之事凡燕飲食亦如之鄭鍔曰宗廟祭祀掌其割烹則事死如事生燕羣臣而飲食亦掌其事君臣之禮不以宴而廢矣凡掌共羞修刑膴胖骨鱐以待共膳刑脊肉膴膺肉胖破牲體之半或曰骨肉相半或曰脯而不乾乾濕半之骨骨物鱐乾物待待膳夫之共王膳食則掌共羞也凡王之好賜肉修則饔人共之膳夫所掌饔人是供外饔掌外祭祀之割亨共其脯修刑膴陳其鼎俎實之牲體魚臘凡賓客之飱饔饗食之事亦如之饗食既聘而饗謂三饗三食三燕之禮飱饔致於館饗則王親饗之饗人掌之如祭之事邦饗耆老孤子則掌其割亨之事饗士庶子亦如之鄭鍔曰録其功而念其親則有時設盛禮以饗之重其為死者之親也士庶子宮伯之所掌者録其宿衛之勞則饗之亦如耆老孤子之禮應龍曰饗者祭畢而饗也禮曰春禘而秋嘗春享孤子秋食耆老師役則掌共其獻賜脯肉之事凡小喪紀陳其鼎俎而實之師所以用衆役所以任衆凡師役必祭祭而饗食如獻禽饁獸及勞還之屬則有獻賜或曰獻言祭賜言饗也亨人掌共鼎鑊以給水火之齊劉原父曰六牲大小不同則水火斯有其齊矣齊數得所則生熟適中而不失其味焉應龍曰凡生物始殺而腥之在鑊體解而熟之在正鼎致味而煎和之在陪鼎各給其水火之齊齊者無過不及之度職外內饔之㸑亨煮辨膳羞之物祭祀共大羮鉶羮賓客亦如之職者以是為任㸑用水火由㸑有烹煮之名烹者孰之煮者孰甚辨膳羞之物者饔人則解以授烹必有名物亨人孰以授饔亦辨其名物以復之凡膳之物共膳羞之物共羞甸師掌帥其屬而耕耨王藉以時入之以共齍盛王藉者王親耕之田天子躬秉耒而三推之以首事甸師任終畝之役必借民力之助焉王藉千畝每十畝借一家之力計上地之農家可任者三人為徒三百人也唯復有番休之地則再易之為三千畝又為三百夫之力粢致精潔盛致馨熟劉氏曰甸人列於亨人之次者祭祀以粢盛為本故也或問甸師掌王藉以時入之賈氏云十月穫之送入地官神倉集𫝊引賈氏說乃去地官字何也曰月令季秋命冢宰舉五穀之要藏帝籍之收於神倉政不必拘地官為說祭祀共蕭茅共野果蓏之薦蕭香草以合黍稷馨聞逹於墻屋茅包茅三脊焫蕭合黍稷祭脂以求神於陽束茅縮酒灌地以求神於隂王藉之間若疆場有蕭茅果蓏之屬皆培植時取以共祭祀之用野者甸師職在郊野在樹曰果桃李之屬在地曰蓏壺瓜之屬喪事代王受眚烖歐陽謙之曰甸師所掌乃耕籍之王為粢盛之用古人憂深慮逺於國家遭喪之後乃禱於神以為前日之黍稷不馨所以獲罪於神者皆已之故非王之咎若降眚烖已當受之應龍曰眚如目有赤眚之眚烖天地大烖代如以旦代某之身受眚烖弭後烖也此禱禳之事起於古人愛君忘身之義遂為典故王之同姓有罪則死刑焉王同姓者有罪獄成則掌囚者奉以適甸師氏刑於隱處不與國人慮兄弟也死刑二事鄭鍔曰甸師掌耕籍與祭薦之物以奉宗廟刑之於甸地非特隱之又以明宗廟之法雖親有所不恕也或問甸師同姓死刑云二事何也曰王氏曰有罪謂犯五刑則刑殺不必市朝此言死刑焉謂死及肉刑帥其徒以薪蒸役外內饔之事左𫝊云其父析薪即大木可析曰薪自然小者曰蒸應龍曰按膳夫掌飲食之官在內而於王身為切者甸師代王耕籍之官在外而於王身為切者此序官之法先親而後疏先內而後外獸人掌罟田獸辨其名物冬獻狼夏獻麋結繩而為網罟則佃漁之始制罟者罟田器之長也田獸田取獸物也辨其名物名者狼麋之等物者禽獸之異春秋獻獸物春秋溫凉適中萬物生成之時凡獸皆可用凡獻以充庖皆順四時之宜以輔四氣之贏不足時田則守罟時田者以時而田也古者非時不田守罟者獸之所聚有所辨擇取舍曰豺祭獸然後田獵鳩化為鷹然後設罻羅四時之田各有名法三田之用各稱其事不廢禮亦不暴天物故曰時田及弊田令禽注于虞中鄭司農曰及弊田植虞中於其中致禽而珥焉應龍曰珥者取左耳以致功若斬首獻馘之謂鄭鍔曰注者欲其趍赴之速如水之就焉凡祭祀喪紀賓客共其死獸生獸劉氏曰所獲生獸囿人育之於囿及其將用則獸人取之以共焉凡獸入于臘人皮毛筋骨入于玉府共其死獸生獸之餘凡獸入於臘人乾其肉以為臘凡田獸者掌其政令凡田獵之政令皆掌之則凡任田獵之事者皆受政令焉漁人掌以時漁為梁劉氏曰網罟所得曰漁斷而取之曰梁應龍曰結繩為罟偃水為梁皆盡魚之法也故専官掌之以有禁令或問漁人掌以時漁為梁賈鄭二說如何鄭氏曰月令季冬命漁師為梁賈氏曰以時者謂一歲三時取魚曰鄭所引月令季冬命漁師為梁賈氏謂月令云是月命漁師始漁天子親往文句不同義非是愚按王制獺祭魚然後漁人入澤梁則為梁乃季冬之時義固通但取魚不必以季冬為拘賈氏謂一歲三時取魚皆為梁以時取之又不若鄭鍔之說為通鄭鍔曰王之膳羞祭祀賓客之薦豈專於一冬哉所謂以時者有用之時不必冬之一時也春獻王鮪春獻鮪者國之典故有專名則他名不獻鄭鍔曰爾雅鮪頭尖如䥫口在頷下青黑色甲可治薑大者不過七八尺辨漁物為鮮薧以共王膳羞凡祭祀賓客喪紀共其魚之鮮薧物者名物漁如春獻鮪之類薧如夏行腒鱐之類凡漁者掌其政令凡漁征入于玉府鄭鍔曰漁者取魚受政令於獸人稟命而行則無數罟竭澤之害如是則靈沼於牣圉圉洋洋常有以共禮食而不闕矣鱉人掌取互物以時簎魚鱉龜蜃凡貍物春獻鱉蜃秋獻龜魚鄭鍔曰漁人為梁鱉人用簎取魚以時應龍曰以時簎取而時漁之魚貍藏之如鰌之屬祭祀共蠯螺蚳以授醢人螺蚌互物蛾子埋物授以為醢是皆宗廟之好羞典故所用鄭鍔曰三者物之微而祭祀亦用何也蓋先王之祭內盡志外盡物物之微者無所不盡然後見其誠非為飲食之道也記曰不敢用常䙝味而貴多品所以交於神明者非食味之道也殆謂是類爾掌凡邦之簎事凡當用簎者悉掌其事歐陽謙之曰經嫌互物包括未盡故於官末言凡以包之臘人掌乾肉凡田獸之脯臘膴胖之事掌田獸之肉乾之以共用脯臘膴胖者乾肉之名物凡祭祀共豆脯薦脯膴胖凡臘物賓客喪紀共其脯臘凡乾肉之事豆脯豆實薦羞之實四者舉其概言凡者舉其所列之物言共者各有司取以共王之用醫師掌醫之政令政令如下文分治稽制之等亦若采取炮煉治療之方也聚毒藥以共醫事毒藥療治之治諸毒之藥如寒暑毒諸物毒之屬醫以藥為主聚者俱收並蓄收之萬里之外蓄之百年之上共者待用無遺取給於顛沛之際活人於呼吸之頃愚按舊以毒藥為五毒謂藥之物恆多毒非也本草所載藥之無毒者居多此是言攻毒之藥如言氷鑑乃盛氷之鑑又如食玉乃食用之玉物凡邦之有疾病者疕瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食言王國中之政則四方以是為法十全為上十失一次之十失二次之十失三次之十失四為下伊川鄭氏曰醫以十全為上非謂十人皆愈為上若不幸十人皆死病則如之何但知可治與不可治治證分明十人皆中即為上應龍曰醫師𨽻王宫之官而職掌止及民物何也為臣子者善則歸君疾病惡也為嫌有指斥故惟陳治法而泯於言隱然有忠愛之意食醫掌和王之六食六飲六膳百羞百醬八珍之齊劉氏曰食醫者通知食物冷熱之性有所抑有所惡鄭鍔曰人徒知病生於血氣之不調而不知實生於飲食之過度藥之醫也醫於己病之後食之醫也醫於未病之前應龍曰饔人所和調五味之和以致口體之養食醫所和調四氣之和以助隂陽之理其功在燮理之末百羞百醫舉成數言之凡食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時醬飲之屬皆性熱故宜凉宜寒凡調和之法必取正於四時者象天之四氣生成萬物也凡和春多酸夏多苦秋多辛冬多鹹調以滑甘劉氏曰人者五行秀氣所結而成故其五臟五事應於四時五行以春多酸以養肝夏多苦以養心秋多辛以養肺冬多鹹以養腎凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽齊也和也會也皆調一之義四氣適時為齊五味合調為和二物相成為會膳牛羊之屬食黍稷之屬鄭鍔曰稌澤中所生黍禾屬而黏可以為酒故從禾從水說文曰稷百穀之長沈括曰稷乃今之穄子例反朱氏曰稷似黍而小粱粟類有數色爾雅曰苽雕胡也鄭鍔曰苽米之生於水也應龍曰凡十有二物各以溫冷寒熱之性相配以氣味相成凡君子之食恆放焉君子以位言放者由是推而放之君子與王其貴賤之分為不同而所以養生之理則未嘗異故皆得以放王而自養焉疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾鄭鍔曰孟子云苟得其養無物不長凡疾病起於隂陽之偏勝抑其有餘而養其不足二者適平則疾自愈矣四時皆有癘疾至冬時有嗽上氣疾癘者隂陽乖沴之氣在人為疾冬之時隂上陽下隂陽相逆於心肺之間其疾為嗽則上攻而喘急應龍曰春四時之首陽氣上行首為諸陽之所聚氣不和則有頭首酸削之疾夏時陽已極隂始生氣不和則有癢疥之疾秋時隂陽之氣不平隂盛陽伏氣不和則有瘧寒之疾冬時隂已極陽始生氣不和則為嗽上氣喘逆之疾由四氣之代謝不齊五行之克制不當失風雨寒暑之序乘隂陽燥濕之宜相𫝊而成四者之疾以五味五穀五藥養其病以五氣五聲五色視其死生劉氏曰人五臟根自五行其氣有不足而為病也故可以五穀五味養之氣既平病既却斯可矣不已則有偏盛偏盛而不容於衆則反傷焉是故五行有相生五臟亦相生五行有相克五臟亦相勝其傷而疾病也或養其母而子自安其盛而偏也或養其傷而盛自抑此五味五榖五藥迭相為用循環相生而養人和平不復為病也應龍曰五味者五穀五藥各有酸苦辛甘鹹之味養者以五行之生尅視五臟之贏不足或養其母以固其子或養其子以安其母治國者德不足輔之以刑治病者穀不足繼之以藥醫書曰酸以收之辛以散之苦以泄之甘以潤之鹹以耎乳兖切之五穀五藥各因五味以逹其藏亦養病之大略也兩之以九竅之變參之以九藏之動兩者開塞也變者失其常也賈氏曰九竅之開是其常參者驗九竅之變與不變而以九藏之動參之也參之以九藏之動者三部六脉三三成九所謂三診九候也寸關尺浮中沈凡民之有疾病者分而治之死終則各書其所以而入于醫師鄭鍔曰此言分而治之則中士八人自分焉至於因醫以至死或非因醫而自終其天年使各書其不同之狀史記所載淳于意對治疾之狀是已瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊腫瘀腫潰膿血出金刃創折骨傷損治上四傷用下四劑祝者祝也古醫經祝由科是也謂若頭傷不任用藥或在肯綮不任劀殺則以術攝五行之氣祝之藥用五藥凡療瘍以五毒攻之深入曰攻凡瘍藴毒而成必以毒攻去之以五氣養之以五藥療之以五味節之醫書云精不足養之以氣形不足養之以味瘍者血氣偏負之所致五味在五藥之中見之節者酸收辛散之等凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅木堅類骨金柔類筋潤下類脉炎上類火肉猶水火金木之載於土竅如地之有空五氣行焉故利之以滑六者皆以類相從凡有瘍者受其藥焉四瘍之外凡有瘍者皆受藥雖治法有四齊之殊而必以藥為之主獸醫掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之灌之以藥劑節之以馳驟灌以求其病行以致其逺動其氣而視其脉觀其所發而養其所偏負慶鄭曰隂血周作張脉僨興是所發也凡獸之有病者有瘍者使療之死則計其數以進退之鄭氏曰獸之類不一其當醫者必有用之獸漢張里以馬醫而學鍾黃憲乃牛醫子則獸醫其為牛馬設歟民之病與瘍則列為二獸之疾與瘍則一醫而兼療君子之行仁固有等差應龍曰古者聖人仁民而愛物又立之獸醫以弭物之癘懼其及人也其政令視人為有等然欲其生而惡其死一也酒正掌酒之政令以式法授酒材劉氏曰政令謂凡酒之材用法式出入之政令式五齊三酒四飲和合醖造之式凡為公酒者亦如之古無私飲凡飲必在公雖農事畢而飲如七月之詩曰曰殺羔羊朋酒斯饗躋彼公堂稱彼兕觥公堂為州黨之學也辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨此五次成熟之節一節為一齊齊成即可飲鄭鍔曰沈則不泛矣自泛而之醴自醴而之盎自盎而之緹自緹而之沈非唯色不同也味亦不同也非唯厚薄之不同也清濁亦不同焉其齊不同不可不辨故使酒正辨之辨三酒之物一曰事酒二曰昔酒三曰清酒鄭鍔曰昔之為言宿昔之意清酒其色清明禮記所謂盞酒涗於清盞酒盎齊差清酒人以清酒涗之則知清酒之為清矣盞音仄産反涗音稅歐陽謙之曰事酒或是專為一事而造之酒或是四時祭祀貴其専特為事而作酒故特以事名則昔酒清酒酒人歲計則常作之酒也不然清酒昔酒意不相屬矣辨四飲之物一曰清二曰醫三曰漿四曰酏漿人共王之六飲入於酒府此四飲有清而無水凉醴者清即為凉醴則在五齊之中水則𤣥水故酒正四飲不更著其名漿者米汁相載而為漿漿而成醴醴而泲之曰清投以薄粥曰酏酏而泲之曰醫四飲者五齊之始也三酒者五齊之終也三酒五齊泲而後用若四飲則以久近共克化之齊三酒共人事為燕飲之用掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒劉氏曰饌謂飲時所薦應龍曰饌其食也凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數唯齊酒不二皆有器量以法共五齊三酒者夏后氏尚明水殷尚醴周尚酒以三酒泲鬱鬯五齊而用之如郊特牲所云縮酌用茅以下是也八尊者彛為上也尊次之罍為下也八尊五齊五尊三酒三尊故云以實八尊獻酌縮酌涗酌修酌酌之名儀禮勺三酌實於尊中及九獻九酌之類酌之六彛六尊二罍之屬謂之器器之升㪷廣狹謂之量如勺一升爵一升之類鄭鍔曰八尊之實本以祀神不以飲也三酒之用則不一始焉以酌獻終焉飲諸臣貴其有餘而不欲其嗛是故大祭度用一尊則用三尊以為副二中祭度用一尊則用二尊以為副二小祭度用一尊則用一尊以為副二祭之大則所酌者多祭之小則所酌者寡此所以等降然要之皆有酌數取足而無乏爾歐陽地山曰五齊三酒分而言之齊為五齊酒為三酒統而言之齊可以亦謂之酒也唯齊酒不二蓋所以指五齊而謂之酒也共賓客之禮酒共后之致飲于賓客之禮醫酏糟皆使其士奉之酏而泲之清者為醫滓濁為糟士其二也凡王之燕飲酒共其計酒正奉之凡饗士庶子饗耆老孤子則共其酒無酌數計者計其數度此計字為膳夫解中酒會飲不會之徴凡酒之頒賜皆有法以行之法有尊卑勞佚凡有秩酒者以書契授之秩常給也書契者書其常數於契以授之使受於酒府也酒正之出日入其成月入其要小宰聽之周家酒政嚴故日入月入必於小卿聽其成若要也嵗終則會唯王及后之飲酒不會以酒式誅賞會則冢宰受之式者節財用之式誅賞者治官府之法嵗終則會雖共王燕飲之酒其出於酒府亦有計唯王及后之飲酒不會已共而飲則不當會徐筠曰酒之有禁不見之於酒官何哉禁飲酒於市有司暴之職𨽻於地官幾酒謹酒有萍氏之職屬於司寇司暴乃市官之屬與民相親萍氏乃刑官之屬有刑可禁酒正以下則大抵女酒女漿奄奚之類皆王宫之官與民不相親但主乎為酒此其所以不掌其禁令而第掌乎酒之政令耳酒人掌為五齊三酒祭祀則共奉之以役世婦共賓客之禮酒飲酒而奉之凡事共酒而入于酒府鄭鍔曰凡事共酒則不一事也事不止於一皆共其酒歐陽謙之曰酒人之所共酒有只共酒而不奉之者有共而奉之者有共酒以往者所謂共酒者酒人但共其酒而奉其事者蓋不與焉是蓋酒正之所掌如王四飲三酒之饌王燕飲之酒賓客之禮酒饗士庶子耆老孤子之酒皆入其酒於酒正之官長而聽酒正之官長自處酒人但共其物而已所以凡事共酒而入於酒府大總言之也凡祭祀共酒以往賓客之陳酒亦如之宫中祭祀共之以役世婦在外之祭祀亦以酒共之皆非自往也致禮於賓客亦使人以酒從往之非自行也劉氏曰亦如之亦如以往之禮漿人掌共王之六飲水漿醴凉醫酏入於酒府共賓客之稍禮鄭鍔曰六飲要之於利渴而已應龍曰漿人掌漿先之以水貴本始也由水用米米汁相載謂之酨祖代反漿米暫化汁向渾而謂之醴醴而泲之為凉投以薄粥曰酏酏而泲之清曰醫或曰凉者糗飯雜水則凡漿之屬皆然曰若今寒粥則酏其中也古者壺漿以此今飲之以新陳相克化按內則言水者凡十曰水曰漿又曰重醴曰濫濫其凉乎又曰醷曰黍酏醫醷同音爾共夫人致飲于賓客之禮清醴醫酏糟而奉之夫人后也周官稱后又曰夫人猶稱太子又曰世子也蓋周建國之初據典故舊文雜見爾視前兼有清醴猶彼云四飲此云六飲也此漿人專職故於飲之名物為詳舉其文以互相足或問漿人共夫人致飲於賓客之禮則猶冢宰之有好賜豫也諸家說皆不明言夫人后也按玉人云夫人以勞諸侯鄭康成於玉人注內亦言之但不明爾凡飲共之歐陽謙之曰凡國事有用飲者皆共之不必專指王也凌人掌氷或問凌人掌氷政注云故書正為政句當作掌氷正今從賈鄭說其掌冰為句何也曰鄭司農云掌冰政主藏冰之政也義固通但以正連歲作正歲以表夏正文義猶為明順正歲十有二月令斬氷三其凌斬謂鑿取也歐陽謙之曰三其凌者是必三處為冰室一處所藏或有消釋尚有二處未必皆得消釋也春始治鑑凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之劉氏曰春氣尚溫所以防饐敗也祭祀共氷鑑賓客共氷大喪共夷槃氷夷猶大也夏頒冰掌事秋刷頒以賜食祿之家刷除其舊俟更納新籩人掌四籩之實朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐八籩下四物皆魚歐陽氏謂籩中所載往往可食者魚肉生臠似非籩中之物當考朝事朝踐朝獻為互文饋食之籩其實棗㮚桃乾䕩榛實先朝食為未食時則此饋食為未食所進劉氏曰饋食者朝踐後體解牛羊犬豕烹而熟之將獻時后先獻籩八豆八以配王之薦熟也尸未入室之前王與后再酌醴齊以獻謂之饋食也加籩之實菱芡㮚脯菱芡㮚脯內宗云掌廟之祭祀薦加豆籩加籩盛禮者也羞籩之實糗餌粉餈羞致滋味若中夕食所進者二物四列按儀禮少牢賓長致爵受酢宰夫羞房中之羞司士羞庶羞於尸此四說附見於此愚謂籩豆之設共凡王之饋食饗燕皆具如天子二十有六豆是也四籩之實類見內則不必專歸之祭祀若止為祭祀則下文不當重出賓祀之目凡祭祀共其籩薦羞之實喪事及賓客之事共其薦籩羞籩為王及后世子共其內羞凡籩事掌之詩云籩豆有踐賓客之謂也醢人掌四豆之實醢豆實不曰豆人而曰醢人籩豆本一物而有竹木陶鑄之異故以醢記曰恆豆之菹水草之和氣也其以醢言醢陸産之物也加豆陸産也其醢水物也四豆之實如下文朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茒菹麇臡凡醢皆淹久之物菹猶苴也說文曰菹酢菜玉篇曰酢酸也肉物曰醢有骨曰臡八豆之實韭也昌蒲根也蔓菁也茒也醓肉汁也麋麞也鹿輔陽麇輔隂饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢應龍曰先王之制飲食其取物也類有食以助養者食其受二氣之先者食其惡以示戒者食其有害民物者皆有典故故禮曰可食也不可好也加豆之實芹菹兔醢深蒲醓醢箈菹雁醢筍菹魚醢芹廣韻水菜食之宜丈夫羞豆之實酏食糝食劉氏曰酏食者酒溲諸粉以為食也糝食者米糝合漬諸肉菜以為食也凡祭祀共薦羞之豆實賓客喪紀亦如之為王及后世子共其內羞王舉則共醢六十罋以五齊七醢七菹三臡實之賓客之禮共醢五十罋凡事共醢此在膳夫職中有醢事故特著其職之所専者與醢之名物醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賓客之禮共醯五十罋禮曰醯醬處內醯醬者食之主也醢味鹹醯味酢又曰五齊七菹於醢人為醢在醯人為醯醬其總名凡事共醯醯醢之物凡言共者入於膳夫而共也鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賓客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之凡齊事煮盬以待戒令四方所産百事所用有若散形飴之别有受入共煮之法是為政令徐氏音辨曰本草戎鹽一名胡鹽生胡鹽山及西羌北地幂人掌共巾幂巾幂以覆為用巾是幂之物幂者巾之事祭祀以疏布巾幂八尊聶氏禮圖曰此巾用二尺二寸之幅而圓也應龍曰巾疏不畫貴其質也八尊通六尊二罍言也記云酒醴之美𤣥酒明水之尚貴五味之本也黼黻文繡之美疏布之尚反女功之始也八尊名見司尊彛以畫布巾幂六彛凡王巾皆黼畫以雲氣貴臭也布精然後可畫蓋尊布疏則畫巾布精可知此為畫布則黼巾刺繡可知宫人掌王之六寢之修歐陽謙之曰修者灑掃糞除之事為其井匽除其不蠲去其惡臭漏井通而流之匽豬四壅聚之井匽相受井有去故維新之義匽有納淤藏疾之象惡臭者不蠲之積也除其不潔以致其潔除其不蠲所以去惡臭也於以潔寢處而通壅滯道血氣以交神明也共王之沐浴凡寢中之事掃除執燭共爐炭凡勞事四方之舍事亦如之沐浴之處必為井匽沐用潘浴用湯潘淅米汁也掌舍掌王之會同之舍設梐枑再重林氏曰再重則內外環固矣應籠曰梐猶陛也枑猶護也如今鹿角欄杈之屬設車宫轅門為壇壝宫棘門為帷宫設旌門無宫則共人門詩所謂敦彼獨宿亦在車下若兵衛輩是也凡舍事則掌之㑹同之外凡舍事悉掌之又按王宫五門王行所在亦如之梐枑一也所以外護車宫梐枑以內方三百步環以車為車宫車宫轅門又以外衛壇壝轅門之內環以壝壝若今小墻四面為門謂為壝宫壝宫㦸門㦸門之內逹於九十六尺之壇壇三成幕人掌次之官供張帷幕於此四旁曰帷謂為帷宫四門立旌旌者王遊幸所載由旌門而入至於王所環衛在列輔弼左右則武士掌直如二人綦辨執戈上刃夾兩階戺當升降之道亦謂之門此為備五門之制王行所屆為止若宿則供張又隨事而異省置亦隨地而異己矣幕人掌帷幕幄帟綬之事凡朝覲㑹同軍旅田役祭祀共其帷幕幄帟綬大喪共其帷幕帟綬三公及卿大夫之喪共其帟王在朝在廟在國在野皆共之掌次掌王次之法以待張事王曰次者王盛主如日在天雖光輝無有不照而行度必有十二辰之次王大旅上帝則張氈案設皇邸朝日祀五帝則張大次小次設重帟重案合諸侯亦如之師田則張幕設重帟重案歐陽地山曰王大旅於上帝鄭氏謂祭天於圓丘無所經據然其為祭天一也雖大旅非圓丘之事不妨作圓丘之事其張設與此同也宗伯國有大故旅上帝及四望鄭氏謂上帝五帝也五帝之說出於周禮自詩書以上無聞唯月令有迎氣四郊之說鄭氏皆以祭帝解之至使後人有疑於六天之說然則大旅上帝均言昊天上帝又何嫌乎以此為昊天上帝彼為五帝乎諸侯朝覲會同則張大次小次師田則張幕設案孤卿有邦事則張幕設案孤卿降於諸侯矣凡喪王則張帟三重諸侯再重孤卿大夫不重不言幕案則無矣凡祭祀張其旅幕張尸次射則張耦次掌凡邦之張事旅視孤鄉尸則視王
