body:
  text: 周官集傳卷十元毛應龍撰士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁鄭鍔曰士師為羣士之師法故名官曰士師栁下惠為士師蓋非明智君子明以用刑不足以為羣士之所師也又曰刑罰施于已為之後先王之不得已也其意實欲無犯焉故用五禁之法禁之于未為之先是乃所以左右之也宫禁則閽人所謂不入官者是也官禁則無故不得擅入者是也國禁則入國而問禁者是也野禁則今之田律野中之禁也軍禁則歡譁夜行軍中之禁也皆以木鐸徇之于朝書而縣于門閭以木鐸徇之于朝所以示乎貴者也書而懸于門閭所以示乎賤者也夫貴者賤者無不知禁焉則刑不期措而自措矣以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于㑹同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙應龍曰案小宰職掌凡宫之紏禁乃退以宫刑憲禁于王宫憲若布憲掌憲邦之刑是也掌鄉合州黨族閭比之聫與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞鄭鍔曰凡此皆小司徒與族師之職耳使士師掌之何耶愚以為司徒屬官專治其事而刑官之屬以刑助之教以誘之于其先刑以鞭之于其後則民知所畏之六鄉之政成矣掌官中之政令察獄訟之辭以詔司冦斷獄弊訟致邦令掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰嬌邦令六曰為邦盜七曰為邦朋八曰為邦誣鄭鍔曰隂為諸侯刺探國事則反以告之甘口喋喋是為邦諜徐氏音辨曰若魏公子嬌魏王令代晉鄙為將若邦凶荒則以荒辨之法治之令移民通財紏守緩刑凡以財獄訟者正之以傅别約劑鄭鍔曰司徒荒政有緩刑而無移民通財紏守事獨掌于此蓋不移民不通財不紏守者斯待以刑也若祭勝國之社稷則為之尸王燕出入則前驅而辟鄭鍔曰勝國國為吾所勝也不絶其社稷所以為戒祭必有尸未有用刑官為之者勝國則無主後矣然實我用兵以勝之如周勝商不廢亳社以湯之故不絶其祀是以祭之必用士師為尸焉蓋其勝之也本于甲兵之大刑故使刑官為尸乃所以示戒也又曰王者以祭祀賔客㑹同之事而出入則有司警蹕孰敢犯屬車之清塵哉若以燕逰而出入則尤當致嚴使刑官前驅而辟則人畏刑而無敢犯也祀五帝則沃尸及王盥洎鑊水凡刉珥則奉犬牲諸侯為賔則帥其屬而蹕于王宫大喪亦如之鄭鍔曰饗在廟燕在寢師屬蹕王宫則在寢時也大師帥其屬而禁逆軍旅者與犯師禁者而戮之鄭鍔曰王師所過而敢有沮遏王師所須而有不從令是謂逆軍旅軍中之禁而輒敢干犯則不循軍法之人也是謂犯師禁安可不戮也耶晉魏絳將與狄人戰于太原請皆卒自我始荀吳之嬖人不肯即卒則斬之雞澤之盟晉侯之弟楊干亂行于曲梁魏絳戮其僕謂是也歲終則令正要㑹正歲帥其屬而憲禁令于國及郊野鄭鍔曰令正要㑹令刑官之屬耳應龍曰小司寇所宣布者及四方之逺士師憲禁于國及郊野憲其近也鄉士掌國中各掌其鄉之民數而紏戒之鄭鍔曰鄉民之數教者掌之此又掌其數者蓋欲行紏戒而非正治其數也歐陽氏曰紏舉其罪過而禁戒之使勿為惟恐其陷於刑辟也聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽于朝鄭鍔曰獄訟之情以辭而後見聽其獄訟而不察其辭則曲直失當情無由伸惟察辭而知其詳乃從而辨之辨論其獄與訟之情狀其有死罪則别舉其文書使與不死之刑異既定其要辭又俟一旬之久乃職主其事為之入聽于王朝必待一旬然後入則在已所思者欲審容囚亦得以自反覆也歐陽氏曰鄉士旬而職聽于朝遂士二旬縣士三旬方士三月而上獄訟于國所以因地逺近為期之遲速之差者其哀矜死刑防間獄事之意深矣易之中孚曰君子以議獄緩死其若是乎司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王㑹其期鄭鍔曰司冦聽所要之辭乃斷其獄弊其訟于朝與衆共之不敢任一已之見也應龍曰羣士自鄉士至訝士皆是司刑凡有職者皆是也使羣士司刑皆在各出已見引法為證以其所犯之罪而附于法共議之據其所犯合用何法使罪與相應成者議已定而不變也衆議以定朝廷于其間擇取其中而用之中者所斷得中無不及也士師受其中乃獄訟之已成也大祭祀大喪紀大軍旅大賔客則各掌其鄉之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之鄭鍔曰掌其禁令使人勿犯王出至郊夾道而蹕以刑肅人也凡國有大事則戮其犯命者鄭鍔曰國有大事謂田役之類也鄉民有犯令得而戮之民雖鄉官所治刑戮則在鄉士也遂士掌四郊各掌其遂之民數而紏其戒令聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各于其遂肆之三日若欲免之則王令三公㑹其期若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕六卿若有邦事則為之前驅而辟其喪亦如之歐陽謙之曰就郊而刑殺就其四郊之獄所在而刑殺之也先王之殺人也以殺止殺遂所殺肆之各于其遂所以令當遂之人見之而知所懲也抑亦刑人于市與衆棄之之意乎凡郊有大事則戮其犯命者歐陽氏曰郊有大事戮犯命者恐事當在郊則遂士掌其殺戮也縣士掌野各掌其縣之民數紏其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日若欲免之則王令六卿㑹其期若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者方士掌都家聽其獄訟之辭辨其死刑之罪而要之鄭鍔曰此王畿之四靣耳其士乃謂之方者蓋自鄉而遂自遂而家邑都鄙各分在王畿之方而方士以十六人為之四人主一方故名曰方士也三月而上獄訟于國司冦聽其成于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中書其刑殺之成與其聽獄訟者鄭鍔曰地又愈逺故三月乃上于王國其地已分公卿大夫為都邑矣故謂王朝為國别異之也凡都家之大事聚衆庶則各掌其方之禁令以時修其縣法若歲終則省之而誅賞焉凡都家之士所上治則主之鄭鍔曰方士既不屬鄉遂慮其易以廢壞歲終特巡省之以行誅賞訝士掌四方之獄訟諭罪刑于邦國凡四方之有治于士者造焉四方有亂獄則往而成之邦有賔客則與行人送逆之入于國則為之前驅而辟野亦如之居館則帥其屬而為之蹕誅戮㬥客者客出入則道之有治則贊之凡邦之大事聚衆庶則讀其誓禁歐陽氏曰有治則贊有朝享之事將通達于王則訝士掌為之贊佐而通達之也朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右胏石達窮民焉帥其屬而以鞭呼趨且辟禁慢朝錯立族談者凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽凡有責者有判書以治則聽鄭鍔曰司市言得貨賄六畜者三日而舉此至于旬者市者衆之所聚三日可以見矣外朝人所罕至故十日而後舉凡民同貨財者令以國法行之犯令者刑罰之歐陽氏曰二人同以財賈販出息恐一人侵欺不可考䆒故以國家府庫所以出入之法行之其出入皆有簿書可稽考其數犯令或一人有所欺用訟至于官則官為之罰犯令者凡屬責者以其地傅而聽其辭歐陽氏曰此義諸家之皆未詳蓋前有凡有責者有判書以治則聽令後有凡屬責者以意解之前凡有責者有判書是其責之大者也令屬責者蓋責之小者無判書但有所屬信于人而豫之也所屬信者即地傅也傅保也地𫝊為保任以豫之也以其無文書可據但慿信地傅以豫之故須得地傅以為之證然後聽其理訟之辭而决之也凡盜賊軍鄉邑及家人殺之無罪凡報仇讎者書于士殺之無罪歐陽氏曰軍鄉邑及家人殺之無罪盜賊之犯于一軍一鄉一邑一家者本軍本鄉本邑本家之人殺之者無罪以其人之受害或一時與之格鬬而殺之也若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶鄭鍔曰所遭之變故大矣民有犯刑者或出于不得已而國之用刑亦不可以用平時而不為之減殺故令之慮刑貶焉慮猶計度也計度其刑則寬宥于常刑之外計度其財則貶損于常用之式凡此皆恤民而已言邦國都家縣鄙則朝士所令者遍天下矣歐陽氏曰慮刑貶只當是減省刑罰未必便及用財之事也與荒貶之意不同司民掌登萬民之數自生齒以上皆書于版辨其國中與其都鄙及其郊野異其男女歲登下其死生及三年大比以萬民之數詔司冦司冦及孟冬祀司民之日獻其數于王王拜受之登于天府內史司㑹冢宰二之以贊王治鄭鍔曰天子為天牧民則民者天子之所司也設官而名之曰司民蓋天子司牧養之事司民司其多寡之數而登之耳自生齒以上皆書于版生齒則能食能食則成人戶口之所由始也不辨其國中都鄙郊野則無以知其地之人數辨之使不相雜則其地之戶口衆寡皆可見也不異其男女則無以知其生之種䫫異之使各從其類則他日嫁娶之年歲高下皆可知也每歲有死者則下之有生者則登之以知其存殁也司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百若司寇斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重鄭鍔曰刑者國之大法民命之所係當與罪相應有是罪冝附以是刑司刺掌三刺三宥三赦之法以贊司冦聽獄訟鄭鍔曰刺殺也取也死者不可復生故必刺取臣吏民之意以可殺然後殺故名以司刺也以三刺三宥三赦三者刺取其實先王非有心于用刑大抵以赦宥為心一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民歐陽氏曰一刺再刺三刺之義若曰羣臣以為可殺一也羣吏以為可殺二也萬民以為可殺三也蓋至于臣吏民三者皆以為可殺然後殺之冝矣一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老旄三赦曰蠢愚以此三法者求民情斷民中而施上服下服之罪然後刑殺鄭鍔曰既以三宥求之其可宥也又求以生之而有三赦之法焉蓋宥也者雖所以寬其罪然尚有罪以加之不若赦之為恩先王用刑豈真有意哉司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之鄭鍔曰成王之于魯也命得郊與祀泰山外祭則郊社內祭則嘗禘與夫三代命祀祭不越望是也又曰周分魯以殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏分康叔以殷氏七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏分唐叔以懷姓九宗職官五正則治民不可以無約也凡大約劑書于宗彛小約劑書于丹圖鄭鍔曰大約劑與諸侯為約欲與宗彛並大小約劑與萬民為約欲與丹書永𫝊若有訟者則珥而辟藏其不信者服墨刑若大亂則六官辟藏其不信者殺大司冦云凡邦之盟約大史司㑹及六官皆受其二而藏之若大亂則諸侯僣竊變亂舊章而去其典籍必率六官而共辟其藏以眀其罪大六卿共證之不信者則必誅無赦也司􅉀掌􅉀載之法鄭鍔曰世之說者皆謂􅉀為衰世之事先王所無有其說出于禮記􅉀詛不及三王也嘗考之書載苖民之罪以為民興胥漸泯泯棼棼罔中于信以覆詛􅉀則五帝之世已有是事詩云君子屢􅉀亂是用長非謂不可也謂􅉀之屢而無信適所以長亂也學者不察以周官太平之書胡為王府有珠槃玉敦之事戎右有贊牛耳桃茢之文于此又設司􅉀之官而信何休戰國隂謀之說蓋不考之詩書耳先王以信結民上不欺下而下不詐上猶用􅉀以結信蓋􅉀雖未必用去古稍逺淳厚一散則世未嘗皆君子而無小人皆善良而無嵬瑣此司􅉀所由設歟凡邦國有疑㑹同則掌其􅉀約之載及其禮儀北面詔眀神既􅉀則二之􅉀萬民之犯命者詛其不信者亦如之歐陽氏曰􅉀之禮儀即朿牲載書㰱血牛耳桃茢珠槃玉敦之事也鄭鍔曰神向眀而司􅉀向幽以神為眀而南面告幽故北面也又曰禮儀皆北面詔眀神故曰亦如之凡民之有約劑者其二在司􅉀有獄訟者則使之􅉀詛凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司􅉀共祈酒脯鄭鍔曰有約劑而不信至于訟獄則使之􅉀詛中有所愧者不敢聽而獄訟自息矣竊疑周家獄訟者先使之􅉀詛􅉀詛已訖乃使之束矢鈞金措刑之術本諸乎此職金掌凡金玉錫石丹青之戒令受其入征者辨其物之􅍇惡與其數量楬而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府入其要掌受士之金罰貨罰入于司兵歐陽氏曰金罰疑是入鈞金三日乃聽者亦是也朝士之職凡民同貨賄者令以國法行之犯令者刑罰之此所以有貨罰也金罰貨罰二者皆自士官而入于職金故職金受之以入于司兵槀人掌受財于職金以齎其工金言入于司兵者大總言之與旅于上帝則共其金版饗諸侯亦如之凡國有大故而用金石則掌其令鄭鍔曰屏風以金為飾與司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入于司兵其奴男子入于罪隸女子入于舂槀凡有爵者與七十者與未齓者皆不為奴歐陽氏曰辨其物兵器不一也貨賄不同也皆有數量計其多少之數也賈而楬之計其貴賤之直也然後入于司兵防其侵欺及更易之也犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之凡幾珥沈辜用駹可也凡相犬牽犬者屬焉掌其政治鄭鍔曰盧令歇驕之類不得不相其善惡以犬遺人當防其噬囓相之則不失其善惡之實牽之則不失左右之防歐陽氏曰掌其官之政治若用牷用駹因所祭以别其所用相犬牽犬之職擇其人差其廪祿皆是也司圜掌收教罷民凡害人者弗使冠飾而加眀刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財冠以飾首也弗使冠飾使之免冠而見首也加眀刑者以版書其罪狀與姓名著于背表示于人鄭氏曰罷民不能自強于善散而無所屬故自恣而為害拘之圜土而役之所以收之也勞苦之使其善心自生所以教之也弗使冠飾以見其無禮而被辱眀書其罪于背所以告人使知其以是罪而至此也掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪臨江劉氏曰梏者校也在頭曰梏春秋傳曰以弓梏華弱于朝謂之梏者以其在首猶牛馬梏耳及刑殺告刑于王奉而適朝士加眀梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺案王鄭之說適朝士絶句以朝士掌外朝王與公卿聽獄訟之所恐王與公卿或又得而審詳焉重人命之至也掌戮掌斬殺賊諜而摶之凡殺其親者焚之殺王之親者辜之凡殺人者踣諸市肆之三日刑盜于市凡罪之麗于法者亦如之唯王之同族與有爵者殺之于甸師氏歐陽氏曰凡殺人者皆于市罪不至死而加刑不于市獨盜則刑于市焉惡之之甚欲人懲之切也凡軍旅田役斬殺刑戮亦如之墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積歐陽氏曰軍旅田役之時所有斬殺刑戮之事亦如刑盜于市踣諸市肆之三日蓋所謂小懲而大戒也司隸掌五隸之法辨其物而掌其政令帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事邦有祭祀賓客喪紀之事則役其煩辱之事掌帥四翟之隸使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁狄或作翟前漢胸奴𫝊曰夷翟是也此四翟謂蠻閩夷貉四者之翟罪隸掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽傍其守王宫與其厲禁者如蠻𨽻之事鄭鍔曰凡封諸侯與其大夫之家彼挈其所有以之官或得用公之牛以助其載任則罪𨽻為之牽傍也在前曰牽在旁曰傍豈詩人所謂王命傅御遷其私人者歟然罪𨽻乃中國之人因親屬有罪沒入于官與四夷之人不同故不掌鳥獸牛馬之事所以別中外也蠻𨽻掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁鄭鍔曰蠻人知養馬故以役校人閩𨽻掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉鄭鍔曰閩人知養馬故以役掌畜四𨽻皆言守王宫之事而閩𨽻不言者閩蠻之别種以蠻𨽻見之爾歐陽氏曰掌子則取𨽻焉其義未詳或有闕文悮字也或謂掌子謂鳥至于阜蕃而欲之掌其子則取閩𨽻之屬以其人知畜養夷𨽻掌役牧人養牛馬與鳥言其守王宫者與其守厲禁者如蠻𨽻之事鄭鍔曰夷人知養牛馬通鳥言故以役牧人歐陽氏曰蠻𨽻守王宫者執其國之兵在野外則守厲禁貉𨽻同貉𨽻掌役服不氏而養獸而教擾之掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事鄭鍔曰或謂南方曰蠻閩則其别種也東方曰夷貉則其别種也獨無西戎之𨽻何耶蓋周之始開國于西戎西戎服之久矣武王伐紂庸蜀羌髳微盧彭濮皆從則不待于征伐而虜獲之也至于蠻閩夷貉之國自克商始通道于九夷八蠻其間有不服者或征伐而取之故以為𨽻爾應龍曰自罪𨽻至貉𨽻通為五𨽻皆掌于司𨽻一官以五者其𨽻各有百二十人故于百二十人之中各分頭目以掌之遂有五者之名非如司𨽻以中士下士為之則得謂之王官也
