body:
  text: 周官集傳卷十二元毛應龍撰司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節鄭鍔曰擯在門外主接賔也相在廟中輔行禮也人道之交貴乎有禮行禮之際貴乎有儀儀者俯仰揖遜周旋進退之容也保氏教國子以六儀二曰賔客之儀正謂是爾行禮之際司儀掌擯之以禮以詔王之容儀辭令揖遜之節使有可畏之威可象之儀動容中禮使人知其盛徳之至儀容以形貌言之辭令以出語言之揖遜以交接言之皆欲其中節無失之俯而卑無失之仰而傲焉將合諸侯則令為壇三成宫旁一門詔王儀鄭鍔曰時見之㑹殷見之同皆為壇於門外以命事故謂之壇與四時之常朝異又曰每旁各一門主之所處則四方諸侯各以其方而入亦闢四門之意也南鄉見諸侯土揖庶姓時揖異姓天揖同姓歐陽謙之曰拱揖之禮以舉手高為重天揖舉手為高尊之也時揖舉手為平次之也土揖舉手迎下卑之也或者謂天揖為自尊倨土揖為自卑下厚於庶姓而薄於同姓失先王之意矣王昭禹曰異姓親於庶姓同姓親於異姓故其揖之儀有降殺如此及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之王燕則諸侯毛鄭鍔曰既奠則拜而獻其國之所有以為幣其獻也亦各於其等故曰亦如之已將幣則王祼以鬱鬯其祼而禮之亦於其等故曰亦如之又曰行人言饗禮而不及燕此特言燕禮者葢國之正禮有饗有食則有燕可知此則㑹於國外之壇嫌於拒而外之故特言齒以見㑹而命事於外必入燕於國中之寢以示恩也凡諸公相為賔主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送鄭鍔曰勞以勞其行一勞在境二勞在逺或使卿或使大夫皆三辭者辭其勞已於逺而不敢當也主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜致館亦如之致餐如致積之禮鄭鍔曰賔至近郊則主君親出郊而勞之於是有郊擯之禮賔陳九介主君於門外陳五擯上擯傳辭與承擯承擯傳辭與末擯末擯傳與末介末介傳與承介承介傳與上介上介傳與賔賔又傳與上介上介傳與承介承介傳與末介末介傳與末擯末擯傳與承擯承擯傳與上擯上擯入告謂之交擯擯已傳辭乃三辭其君之勞而不受辭不獲已乃出車以迎主君之辱而臨已又三揖三辭然後拜而受其勞受勞訖方出車以送主君三還三辭之乃再拜而别聘禮云三讓而後傳命三讓而後入廟門三揖而後至階三讓而後升所以致尊讓也又云君使士迎於境大夫郊勞君親拜迎於大門之外而廟受北面拜貺拜君命之辱所以致敬讓也敬讓也者君子所以相接也及將幣交擯三辭車逆拜辱賔車進荅拜三揖三讓毎門止一相及廟唯上相入賔三揖三讓登再拜授幣賔拜送幣每事如初賔亦如之及出車送三請三進再拜賔三還三辭告辟致饔餼還圭饗食致贈郊送皆如將幣之儀鄭鍔曰三揖三讓而入廟門諸侯五廟始祖之廟在中兩廂各兩廟則有二門每止一門則止一相止謂絶行在後至祖廟則唯上相入以其詔相禮事不可止也歐陽氏曰致積致飱致館郊勞其授受之前皆有三辭之禮獨將幣之時既登階之後直授幣而已更無辭遜之禮何也當攷毎事如初賔亦如之亦如上再拜受幣賔拜送幣主人以爵禮賔客必再拜而受爵主人亦再拜而送爵賔之拜禮拜饔餼拜饗食賔繼主君皆如主國之禮諸侯諸伯諸子諸男之相為賔也各以其禮相待也如諸公之儀諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聴命下拜登受賔使者如初之儀及退拜送致館如初之儀鄭鍔曰此記諸侯之國諸臣之儀也公國之臣來聘公國相與為客又曰登受受其郊勞之幣也聴命受幣皆登堂尊主君之命而致敬也使者退而去則客拜而送之也客至則遣使致以所舎之館其儀亦如郊勞之初言如初則如其始時之禮而已不儐使者也及將幣旅擯三辭拜逆客辟三揖毎門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀及禮私面私獻皆再拜稽首君答拜出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟致饔餼如勞之禮饗食還圭如將幣之儀鄭鍔曰如初謂與將幣之禮同也私獻私有所獻非其國君所遺之禮也君館客客辟介受命遂送客從拜辱于朝明日客拜禮賜遂行如入之積凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之鄭鍔曰君就館省視之凡四方之賔客禮儀辭命餼牢賜獻以二等從其爵而上下之凡賔客送逆同禮凡諸侯之交各稱其邦而為之幣以其幣為之禮鄭鍔曰凡賔客送逆不以其去來而為之勤惰故自逆至送其禮如一也應龍曰上經指言諸公相為賔諸侯諸伯諸子諸男之相為賔諸公之臣相為國客侯伯子男之臣相為客而相禮此經四方之賔客則五等諸侯之君五等諸侯之臣互相為賔客互相為朝聘之禮或假道過往之類主國所以待之之禮者也凡行人之儀不朝不夕不正其主靣亦不背客歐陽謙之曰行人之儀言於司儀何也司儀正行之屬序官可見行夫掌邦國傳遽之小事􅍇惡而無禮者凡其使也必以旌節雖道有難而不時必達居於其國則掌行人之勞辱事焉使則介之焉當如字環人掌送逆邦國之通賔客以路節達諸四方舎則授館令聚􅝵有任器則令環之凡門闗無㡬送逆及疆象胥掌蠻夷閩貉戎狄之國使掌𫝊王之言而諭説焉以和親之若以時入賔則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賔相之鄭鍔曰傳其辭言使達中國之語於朝王時言語可以相通也出入送逆之禮節幣帛辭令其於揖遜辭受則擯之相之詔侑以禮儀也訂義曰凡字疑當作掌字凡國之大䘮詔相國客之禮儀而正其位凡軍旅㑹同受國客幣而賓禮之應龍曰愚按象胥本為夷狄而設鄭氏註二經皆指諸侯為言今不取凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子鄭鍔曰作事謂王國將有事於四夷非中國之事大事使諸侯主之其次使卿其次使大夫又其次使庶子主之事有小大爵有尊卑權有輕重用人各得其稱固理之宜也必於象胥言者葢馭夷狄之道尤不可不謹也事之大者而俾卑者處之則夷狄無所畏憚事之小者而俾尊者主之則輕其國體而取笑四夷矣掌客掌四方賔客之牢禮餼獻飲食之等數與其政治王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子壹眂其大夫之禮鄭鍔曰王巡守於一方及因巡守而合諸侯於一處主君必用犢以充天子之膳諸侯事天子猶天子之事天用犢貴誠以為物不足以稱其徳故以誠為貴也諸侯之於天子亦唯誠之貴故其殷膳以牲犢也歐陽氏曰百牲皆具者百官既衆必具百牲以待之也百牲以數目之多寡言之非以名物之差殊言也凡諸侯之禮上公五積皆眂飧牽三問皆脩羣介行人宰史皆有牢飧五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飧之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米眂生牢牢十車車秉有五籔車禾眂死牢牢十車車三秅芻薪倍禾皆陳乗禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飧饔餼以其爵等爲之牢禮之陳數惟上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆眂飧牽再問皆脩飧四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飧之陳牽三牢米百筥醯醢百罋皆陳米三十車禾四十車芻薪倍禾皆陳乗禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飧饔餼以其爵等爲之禮惟上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆眂飧牽壹問以脩飧三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飧之陳牽二牢米八十筥醯醢八十罋皆陳米二十車禾三十車芻薪倍禾皆陳乗禽日五十雙壹饗壹食壹燕凡介行人宰史皆有飧饔餼以其爵等爲之禮惟上介有禽獻夫人致禮六壺六豆六籩膳眂致饗親見卿皆膳特牛鄭氏曰牽者各視其數而已問皆以脩於其始至以問間闊則有脩焉脩脯也鄭鍔曰皆用脯脩以將之自飱五牢以至牲三十有六皆陳者此致飱之禮也夕食曰飱謂其薄也食以十為列凡四列也黍稷者食之常而稻粱特以為禮爾朱氏鹿鳴詩傳曰筐所以盛幣帛飲則以酬賔送酒食則侑賔勸飽凡諸侯之卿大夫士為國客則如其介之禮以待之鄭鍔曰不以其君來而加厚不以其自來而寖薄所以示其至誠之心如一而已凡禮賔客國新殺禮凶荒殺禮札䘮殺禮禍烖殺禮在野在外殺禮鄭鍔曰行禮必假於物物不備之時勉強以如禮非所以為禮也故當國故而物不備之時遂有減殺之法凡賔客死致禮以䘮用賔客有䘮唯芻稍之受遭主國之䘮不受饗食受牲禮鄭鍔曰賔客死於主國致之以禮皆以遭䘮之具所以使其䘮有所給若賔客在主國自聞其親䘮凡主國饗之之禮皆不敢受若夫芻稍以人馬日用不可以一已之䘮而不受故受芻稍歐陽謙之曰不受饗食者蓋主人有䘮不宜速賔雖主人備禮且不當受當辭之受牲禮若飱饔餼牽牲而致之者則可受也主國自有牲牢待賔之禮不必改為腥字也掌訝掌邦國之等籍以待賔客若將有國賔客至則戒官脩委積與士逆賔于疆為前驅而入及宿則令聚􅝵及委則致積至于國賔入館次于舎門外待事于客及將幣爲前驅至于朝詔其位入復及退亦如之凡賔客之治令訝訝治之凡從者出則使人道之及歸送亦如之凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝凡訝者賔客至而徃詔相其事而掌其治令掌交掌以莭與幣巡邦國之諸侯及其萬民之所聚者道王之徳意志慮使咸知王之好惡辟行之使和諸侯之好達萬民之說鄭鍔曰執節與幣巡邦國之諸侯及萬民所聚之處而告之以王者徳意志慮徳則王脩諸身而充實光輝者意則王之所藴蓄在心而未為者志則王之所趨嚮而見於施為者慮則王之所逺圖而預防者九重之上人不可得而知掌交所至則道而達之諸侯萬民斯曉然知上心之所在矣故知王之所好惡則從而辟之從其所好而辟其所惡則情不相違而心如一矣掌邦國之通事而結其交好以諭九税之利九禮之親九牧之維九禁之難九戎之威鄭鍔曰邦國有朝覲聘問相通之事事之常也然或恐有時而不通又從而為之結其交好使其相與之情固結而不可解也當其往而通之則諭以九稅之利使用九職任萬民而取其財也利國之法莫利於此故言利諭以九禮之親使遵九儀之禮以相聘問而致其親也鄰國相親莫親於此故言親諭以九牧之維使知九州之牧以相親比而為國之維也為國之維莫如方伯連帥故言維諭以九禁之難使知司馬九法以禁邦國者不可犯誠可畏難也諭以九戎之威使知司馬九伐之法以威邦國者誠為威嚴也掌察闕掌貨賄闕朝大夫掌都家之國治日朝以聴國事故以告其君長鄭鍔曰都家之事君長得以自治然有當治於王國者朝大夫為之治於王朝歐陽謙之曰國謂王國也國之事故不必施於都家者凡國有事故都家皆當知之朝大夫皆當達之所以上下之情通若今進奏官報州縣者也國有政令則令其朝大夫凡都家之治於國者必因其朝大夫然後聴之唯大事弗因凡都家之治有不及者則誅其朝大夫在軍旅則誅其有司鄭鍔曰國若有政令將達之於都家則令其朝大夫以傳達之都家之治有當治於王國者必因朝大夫而上達若夫國之大事則不可因朝大夫以達也其君當自至而稟王命可也都則闕都士闕家士闕
