body:
  text: 周官集傳卷十四元毛應龍撰攻金之工築氏執下齊冶氏執上齊陳氏曰總說金工之事故序於前鄭鍔曰所制之器不同所用之齊亦不一故有上齊下齊之别焉齊如食醫所謂食飲膳羞八珍之齊齊限量也所用之物各有限量無過不及也削殺矢同居下齊之中記工之目以冶氏為殺矢而此言執上齊者蓋戈㦸居上齊冶氏所執實在於此所謂殺矢非冶氏正職乃先得制作遺文於秦之後傳之或失其序而已且殺矢之制自有矢人記之故也鳬氏為聲㮚氏為量段氏為鎛器桃氏為刃金有六齊六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊鄭鍔曰鍾貴其聲之清鼎貴其體之圓斧斤戈㦸欲其鋒之利金多則然也所以用上齊刃也削也殺矢也雖皆以利為上然金之用刃皆欲摩錯使其光明瑩照則知其色之青白矣惟錫多則然也所以用下齊又曰六金之工有桃氏有冶氏有鳬氏有㮚氏有段氏有築氏或為削或為戈㦸或為鍾或為劒或為量為鎛獨無為鼎為斧斤為鑒燧之工鼎亦鍾之屬可附於鳬氏之官斧斤亦上齊可附於戈㦸之列鑒燧獨無所可附意者自有鑒燧之工乎夫以明水火之用於祭祀也大祝執之以號祝大司冦奉之以表人主之明潔其重如此比之斧斤戈㦸削劒之類固不侔也削劒戈㦸利用之物專設一官况鑒燧乎意有是工記者亡之爾不然則無工以作之司烜氏何所取而用之耶築氏為削長尺博寸合六而成規欲新而無窮敝盡而無惡鄭鍔曰自開闢以來有制字之聖人而毫楮之制則未立也雖大事書於䇿小事書於簡而簡䇿所書者非筆也百名以上書於䇿不及百名者書於方而方䇿所書者亦非筆也大約劑書於宗彛小約劑書於丹圖而彛圖亦非筆也然則如之何而名曰書蓋為書刀而刻字于其上爾削也者書刀也其長一尺其博一寸可謂削小矣故名之曰削其為器甚微其為制甚易特立一官以掌之又先攻金之工而言之者何耶著古昔之惛惛傳千里之忞忞者莫如書未有毫楮之傳而書之所託者獨在削所以記久者在是所以傳逺者在是將異其制用而不窮安得輕而易之耶此則設官之意而築氏首六工之意也又曰取六削而周環以合之欲其成規取諸圜也蓋削者曲刀也其形偃曲如弓之反張而為之也其形曲則過乎曲不可也不及乎曲亦不可也合六削而環然後其曲而得中此蓋言其制作之法其度當如是爾冶氏為殺矢刃長寸圍寸鋌十之重三垸鄭鍔曰冶氏執上齊殺矢金五而錫二殆下齊也戈㦸為於冶氏殺矢為於矢人其工異也戈廣二寸內倍之胡三之援四之鄭鍔曰戈之狀有曲而下垂者謂之胡有直而上逹者謂之援其柄謂之柲柲之受胡者謂之內內所以受胡之入已倨則不入已句則不决長內則折前短內則不疾是故倨句外博重三鋝歐陽氏曰長內則折前折字恐當為不前對下文不疾字內長則援短以之刺人則擁之不能前去也內短則援長以之鉤人則引之不能以速疾也應龍曰按戈㦸小支上向則為㦸平之則為戈又曰㦸偏距為戈戈有四病詳見或問卷中圖解㦸廣寸有半寸內三之胡四之援五之倨句中矩與刺重三鋝鄭鍔曰此㦸既有三鋒胡直中矩援者乃其旁之直而達者刺乃其當中直前之鋒也㦸之廣既減於戈廣之半寸若不三鋒則不得與戈同重三鋝言合三鋒乃如戈之重故言與刺三鋝應龍按此義亦與圖不合歐陽氏曰刺疑是鐏三鋒當同一金不應别言中鋒鐏則不嫌是别物謂之刺以其刺地言也桃氏為劒臘廣二寸有半寸兩從半之以其臘廣為之莖圍長倍之桃氏掌攻金以為劔而取名於桃者按典術云桃者五木之精仙木也鄭鍔曰古者臣膳於君葷桃茢天子弔諸臣之喪則巫祝桃茢以先之開氷之時用桃弧棘矢皆所以除不祥也欲除不祥者必用桃木蓋鬼神之所畏也劔者君子防身之具凡小大之以暴惡凶害乎人者亦不祥也用劒以防之殆亦用桃木以除不祥之意乎又曰劒之兩旁皆有刃其廣皆二寸半也又曰兩從半之謂自劒脊而中分之兩旁皆殺以趨鍔其廣則半臘之中其莖設其後參分其臘廣去一以為首廣而圍之鄭鍔曰設大也臘廣二寸半取而三分之去其一分用為首之徑歐陽氏曰莖長五寸中其莖設其後二寸半以後稍大也身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之莖長五寸言五其莖長者謂長二尺五寸并莖五寸為三尺也按冶氏注三鋝重一斤四兩故知此九鋝重三斤十二兩鳬氏為鍾兩欒謂之銑鳬水鳥清揚而善飛周人以鳬氏為聲鍾官蓋鍾之聲貴乎清揚而能逺鄭鍔曰鍾之制有鏄有鏞有編鍾編鍾十六枚而在一簴小師正其位罄師教其擊者也鏞則當十二辰之鍾者所謂鏞也旁有兩欒正有兩靣面皆有帶先王之制鍾也大不出鈞重不過石律度量衡於是而生其方則在西其音則尚羽實樂最大者也然其以鳬名官何耶蓋鳬之為物輕揚而善飛沒而不溺者也鍾之制重厚矣其聲則欲其輕揚而逺聞鍾為衆樂之宗作樂者貴於無沉溺之過名官以鳬既以見鍾之所宜又因以為戒也歐陽公集古録曰景祐中修大樂冶工拾銅更鑄編鍾得古鍾有銘於腹因存而不毁即寶和鍾也余知大常禮院時嘗於太常寺按樂命工叩之與王朴夷則清聲合初王朴作編鍾皆不圓至李照奉詔修樂皆以朴鍾為非及得寶和其狀正與朴同乃知朴為有法也陳氏曰欒銑一物而二名也名曰欒者言其狀如木之檀欒然也金之澤者謂之銑或曰銑小鑿也鍾欒謂之銑以其類銑然也然銑音洗則以其聲生於此清揚不鬱其净如洗然也銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞鄭鍔曰于之上所擊之處其名曰鼓言聲之自作也鼓上謂之鉦鉦之為言正也左右上下此居正中焉鉦上謂之舞者義取諸發揚其體者從此也歐陽謙之曰以鄭氏圖考之鍾體分為三最下一截為鼓是擊處中間一截為鉦最上一截為舞舞上謂之甬甬上謂之衡陳氏曰舞上謂之甬言若甬生出焉甬上謂之衡言若衡之適平焉歐陽氏曰甬似金鍾鼻連於鍾體者衡似别一物用穿鼻以縣鍾者今二物皆謂之鍾柄其意未明鍾縣謂之旋旋蟲謂之幹陳氏曰鍾繫謂之旋言其飾之盤旋鍾帶謂之篆篆間謂之枚枚謂之景于上之攠謂之隧鄭鍔曰數物者必以枚計日之光謂之景景則明而可觀枚之數顯然可數明著如日之景故曰景十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣以其鉦之長為之甬長以其甬長為之圍參分其圍去一以為衡圍參分其甬長二在上一在下以設其旋鄭鍔曰鍾之制當應乎十二律律有長短之不同則鍾之制亦宜異也伶州鳩謂周景王曰古之神瞽度律均鍾蓋言度律呂之長短以平其鍾而和其聲也審如是說則鍾不可以立一定之制可知矣歐陽謙之曰十分其銑去二以為鉦以其徑並鍾體而計之也以其鉦為之銑間去二分以為之鼓間謂之間除鍾體自其空中而計之也銑連體十分鉦連體八分銑之間八分鼓之間六分不言鉦間意必與鼓間相若舞間四分此其上小下大之制意其長短之數亦與廣狹不相異厚薄之所震動清濁之所由出侈弇之所由興有說鄭鍔曰先王之制器也不說之理默寓於其中使後世之人觀其制於法度之中得其意於法度之外故曰禮樂法而不說若夫鍾者樂之大者也聲出於形形得其度則聲調不得其度則不調固有可說之理苟不說以詔後人則後世或妄以意為之求樂之和不可得矣故聖人不得不明告之以有其說也歐陽氏曰震動所謂發見也形之厚薄其發見必異聲之清濁其所從出必有自形之侈弇其必有以形於聲厚薄之所震動石播是也清濁之所由出大而短小而長是也侈弇之所由興柞鬱是也言厚薄而不言石播言清濁而不言大小長短言侈弇而不言柞鬱而終以有說作文之法也鍾已厚則石已薄則播侈則柞弇則鬱長甬則震鄭鍔曰鍾已厚則石已薄則播此所以說夫震動之由也體失於大厚則聲如石而不發石之為物堅實而無聲也體大薄則聲渙散而不聚播如播種之播布散而不聚也是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞歐陽氏曰鼓間之數居銑間十之六鉦間之數經不著竊意鉦間必差小於鼓間也為遂六分其厚以其一為之深而圜之鄭鍔曰遂即攠也又曰取其厚之一分為之深則擊處當深六分之一而已深而又圜所以受擊宜圜故也㮚氏為量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之量之以為釜栗本作㮚鄭鍔曰為量名官曰㮚何也㮚之為果最堅而實者也故言玉之堅則曰縝密以栗言風之急則曰栗烈婦人之贄用栗取其謹飭而堅守也量所以量多寡摩於物者其敝必易故必改煎金錫以為之使縝密而堅實然後磨而不磷堅而不耗用而量則常得其平焉又曰為量欲其堅實而可久故煎金錫則必改更而煎之既煎之又再煎焉消湅之精則不復減耗也煎而又煎則消融者去而盡矣其所留者皆其精而不復減耗者矣於是稱其輕重既權之矣然後準之者雖已知其輕重又欲平其多寡用準以平之矣然後量之則量其多寡而各納於模範之中矣此文不止為一量也如為一量則不必權其輕重平其多寡矣惟不止於一則恐大小不等始有量之準之之法深尺內方尺而圜其外其實一釜鄭鍔曰孔子於公西華之母請粟曰與之釡及左傳所謂豆區釜鍾即此所作之釜爾諸家說其所容之數皆不一焉晏子則謂六斗四升為釜管子則謂百升而成釜為左傳說者則謂五升為豆四豆為區四區為釜則釡八斗也康成則謂四升曰豆四區曰釜為六斗四升以下文觀之其臀一寸其實一豆豆當為斗釡之臀一寸而容一斗則釜之內方一尺而容十斗無可疑者十斗則百升正管仲所謂釜也康成謂四升為豆每四而加故自區至釜而六斗四升彼殊不考之於梓人也梓人為飲器爵一升觚三升獻以爵而酬以觚一獻而三酬而一豆矣夫一獻則一升也三酬則九升也以一合九非十升為豆而何而康成謂四升為豆失之矣或者以廩人萬民之食而疑其數蓋謂人四釜上也三釜中也二釜下也若以十斗為釜豈其一月能食米至於四釜也殊不知謂為一月之食米者亦康成之失也且廩人掌九榖之數以嵗上下詔榖用非謂米也凡榖二而米一則四釜之榖為米二釜爾月無二釜之米何足謂之豐年哉則釜之數宜以百升為正即今所謂斛也量金錫以納模範而為釜其深一尺其內一尺而其形方其外則圜焉其實可容一釜故其名謂之釜也其臀一寸其實一豆其耳三寸其實一升重一鈞鄭鍔曰覆釜用底深一寸可容一斗爾耳謂釜之兩旁人所挈舉者也其聲中黃鍾之宫槩而不稅陳氏曰聖人之制器也不止一端每名為之說以廣其傳使後世有失焉可即此器以求之若璧羡以起度量聲中黃鍾之宫者是也鄭鍔曰槩平也量所以平物之多寡非特公家之用而已民咸用焉使得咸用而不取其稅此所以民皆樂用之其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後茲器惟則鄭鍔曰古者作為銘文皆所以詔後世非苟炫文以為工此銘量之人自謂是銘之作非苟作也乃思索古人制量之法允信乎至於法之極也後世有作者無以加也是故作是銘文以銘此量非苟為之銘蓋深思精求所以制作之道知其為是量也允信乎臻於至極制器以為用至矣盡矣立法之妙後世不可復加矣是宜為文辭以銘之也觀如中正以觀天下之觀是量既成可以觀示四方之國使四方之人則而用之也又曰非特以觀四國示當年而已矣又可用此永以開迪後世之子孫使之常法則於兹器則為之銘以詔後世宜矣啓如啓迪我後人之啓古者器用皆有銘惟湯之盤銘載之記量之銘載於此湯欲日新其德則載其銘者所以為後世人君修德之法考工載制作之度而特載量之銘蓋其制器可為後世之防制作法盡於是矣何則量所以出內者也使四國之人不法乎是則多寡不均五尺之童適市而欺之者至矣雖然是猶可忍也若夫後世有天下者不能則乎兹器則弄柄之人或因出納以市恩斂怨天下之亂由是生也此所以特載於銘使用量者觀銘而知所警垂誡之意逺矣厥後齊國之君不識乎此執政之臣如田氏者以家量貸而以公量收之陳氏之量豆區釡鍾各加其一民謳歌之而齊國為田氏所有豈不信哉陳氏曰以此示之使彼觀焉以觀四國使同其用則雖有私智無所施矣凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也鄭鍔曰欲鑄金為器先消湅之以求其精消湅之精粗必觀其氣候氣候者消湅之烟也五行木生火火生土土生金然則金者禀氣自東方之木託形於中央之土青者木之色黃者土之色木猶金之父土猶金之母而白者西方之色乃金之本質也黑濁者隂陽不辨之氣也始而煎之則黑濁之氣生蓋金錫相雜兩者交戰於烈火之熖故其氣之上達者當然也是氣既竭則黃白次之蓋金土之氣始見也及其久也黃白之氣竭則所以託形為母者盡矣然後青白次之是則受氣之父與本質皆見矣久而青白之氣竭而青氣獨見則其本質之氣亦不復留惟所以受氣者獨存則其反本復始歸於其初將百鑄而不能耗矣如是乃可鑄也古人之制器也非徒制作之巧而銷鎔金錫之法亦如此此其用心蓋將以為萬世之計也段氏闕函人為甲犀甲七屬兕甲六屬合甲五屬犀甲壽百年兕甲壽二百年合甲壽三百年凡為甲必先為容然後制革權其上旅與其下旅而重若一以其長為之圍凡甲煆不摯則不堅已敝則橈屬音燭鄭鍔曰函人為甲欲周營而包護之使人勿傷也故曰函如遍覆包函之義惟甲所以周人之身是乃所以函之也玉篇曰犀似豕形如水牛黑色三角一在頂一在額一在鼻亦有一角者兕似牛一角青色重千斤說文云兕如野牛其皮堅厚可制鎧又曰屬連綴之義上旅下旅以札相續曰屬取其連屬也犀皮不甚堅故七屬蓋札短則以七屬相續而成兕皮則堅其札長故以六屬相續而成至於取獸之皮去其裏以二皮之表相合為甲則其堅也極矣其皮堅其札堅故五屬而成可也凡察革之道視其鑽空欲其惌也視其裏欲其易也視其朕欲其直也櫜之欲其約也舉而視之欲其豐也衣之欲其無齘也鄭鍔曰鍛革之熟則革之裏必平易而無敗薉故視其裏欲其易易者治之精而無薉也與孟子百畝不易為已憂之易同朕謂革之理也如兆朕視革文理則欲其直而不曲蓋革朕已直則其制而為甲也必正視其鑽空而惌則革堅也視其裏而易則材更也視其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也陳氏曰甲以自營戎事所先先王於此尤致意焉謂不如是則所存乎我者未善何暇乎勝敵之事哉故書曰善敹乃甲胄敿乃干無敢不弔甲也胄也干也所以自保者尤所當急故既言善矣又言弔也即是三者言之甲又在所先焉函人所記之詳得無謂乎鮑人之事望而視之欲其荼白也進而握之欲其柔而滑也卷而摶之欲其無迆也應龍曰鍛革而至於極則握之必柔順而滑利也鄭鍔曰戈之邪於車上謂之迆則此亦當為邪出之義卷皮革者多邪而突出視其著欲其淺也察其線欲其藏也革欲其荼白而疾浣之則堅欲其柔滑而腛脂之則需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也鄭鍔曰著所附著之處也鋪著之處雖厚如薄故謂之淺卷而摶之而不迆則厚薄序也視其著而淺則革信也察其線而藏則雖敝不甐鄭鍔曰能不迆者必其厚薄有序均一無差故爾䩵人為臯陶鄭鍔曰鼓椌以板合成其中空成如陶然臯如鶴鳴九臯之臯水旁之深長處曰臯鼓木其中如陶深而直長尋四尺臯鼓一丈二尺以長謂之臯與此臯之意同應龍曰陶字當從革按韻􅕦通作陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正歐陽氏曰穹者三之一若以鼓四尺一面計之三之一計一尺三寸三分寸之一併鼓四尺穹者計五尺三寸三分寸之一鄭氏以鼓木二十版每版中央則合二十尺圍三徑一合計徑六尺六寸三分寸之二是以合鼓兩面而計之得二尺六寸三分寸之二之數并鼓面四尺總計六尺六寸三分寸之二故穹者三之一必倍其數也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓為臯鼓長尋有四尺鼓四尺倨句磬折凡冒鼓必以啓蟄之日良鼓瑕如積環鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞鄭鍔曰臯鼓之制其長一丈二尺其面四尺而其中圍則不穹一倨一句如磬之折焉異於他鼓故特以為臯鼓言之倨言其直勾言其曲如磬之折則其中曲不三正也其名曰臯臯者長也緩也惟長故緩用民之力不欲亟故長其鼓之形欲其聲之緩此則用之於役事也韋氏闕裘氏闕畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黃青與白相次也赤與黑相次也𤣥與黃相次也鄭鍔曰自隂陽判為五行五方之位正而五色遂章左氏所謂天有六氣發於五色是也然各奠其方各色其形固未足以為文采之美惟畫繢之工取五者而雜錯之然後其文為可觀東震位也震為木木始生其色青南離位也離為火火炎熾其色赤西兊位也兊為金金色白北坎位也坎為水水色黑天位乎上觀之蒼然不可得而名也謂之𤣥者以其逺而最微所可見者𤣥而已𤣥者黑色之尚微乎地位乎下土壤不齊不可得而名也謂之黃者以其近而最微所可見者黃而已黃者赤色之尚微乎凡此六者取上下四方色之著者而名之也故皆以謂之為言蓋所以指名其方位之色者不能逃乎此也天地四方有自然之位有自然之色所以正其名也畫繢之事取其自然之色而合之先後次第各有所宜青與白宜相次東西定位之色也赤與黑宜相次坎離相交之色也𤣥與黃宜相次乾坤配合之色也一行不偶無以相生五行不剋無以相成前言四方自然之色言其相生也此言合而相次言其相尅也東方之青次之以白金尅木也南方之赤次之以黑水尅火也至於天地則欲其如夫婦之相偶所以奠其尊卑之位也其相尅乃所以相成歟畫繢雖一技爾然而雜四時於五色無非隂陽之妙理寓焉然則先王一代之色各有所尚以表盛德之所在豈無意哉青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡陳氏曰剛柔雜於東南而為文故青與赤謂之文至西南而事成故赤與白謂之章乾位西北其道主斷故白與黑謂之黼艮位東北隂陽各止於其所而辨故黑與青謂之黻五采備謂之繡則繢陽而繡隂隂嫌於不備也故特以名之不然繢豈不備五采乎歐陽謙之曰繢主用色故但言色繡主用采以刺於裳非但以色施之故言五采備謂之繡土以黃其象方天時變鄭鍔曰土者地也地不可得而畫黃者地之中色故畫以黃易於坤之六五曰黃裳元吉祭地用黃琮皆取其色之中也又曰天不可得而畫也惟天以一氣運而為四時四時之在春為青在夏為赤在秋為白在冬為黑故畫天時則隨時變其色而已火以圜山以章水以龍鳥獸蛇鄭鍔曰畫龍所以表水也然十二物中有龍而已不畫水也殆亦記時所見乎雜四時五色之位以章之謂之巧鄭鍔曰畫繢之事能取四時五色相雜以章明之使文采粲然可觀是之謂巧作之自於聖人創之自於智者能彰施五采亦惟巧而已故曰謂之巧歐陽氏曰此經結上經而言之也上經言天地四方之位青赤白黑之次山水禽獸之象是各有其義而已至其鋪叙布次之而使有文采之可觀非巧者不能也凡畫繢之事後素功鄭鍔曰設色文也文必因質而後著素功有質然後可以施畫繢之文畫繢之文其在素功之後乎故記曰甘受和白受采孔子曰繪事後素皆是意也鍾氏染羽以朱湛丹秫三月而熾之淳而漬之三入為纁五入為緅七入為緇鄭氏曰鍾聚也或謂堯舜之世羽畎有夏翟徐州貢之周時豈非耶設官以染羽何哉有虞尚質而未文雖用羽而猶寡後世日趨於文以周制考之后之衣服則用羽車與容蓋則用羽國之旌旗則用羽舞者所執則用羽其他用為衣服之飾多矣况以愛物為心者不忍多殺也於是有染羽之法取其可染者染而用之後世以翠為飾者出於天地之極南必欲制之以為用至於一羽之微其價千金微物亦不得以遂其性命之理豈知先王之制哉鍾氏掌染羽名曰鍾何也為羽不受色其染尤難至於久然後其色聚焉故名官曰鍾鍾者聚也欲其色鍾聚於此也又曰既浸丹秫三月之久又沃而漬乎羽則知羽之受色為難可見也筐人闕設色之工五畫繢鍾筐㡛今以天官染人考之春暴練者其㡛氏歟其職所謂涷絲湅帛是也夏纁𤣥者其鍾氏歟其職所謂三入為纁五入為緅七入為緇雖不言𤣥而鄭氏謂𤣥在緇緅之間是也若夫秋染夏雖不見於考工而經有五采備之文不然其筐人之職乎㡛氏湅絲以涗水漚其絲七日去地尺㬥之陳氏曰凡涷無他湅其生者熟之而已晝㬥諸日夜宿諸井七日七夜是謂水湅鄭鍔曰以七日七夜為度欲其得隂陽之氣一於平也湅帛以欄為灰渥淳其帛實諸澤器淫之以蜃清其灰而盝之而揮之而沃之而盝之而塗之而宿之明日沃而盝之晝㬥諸日夜宿諸井七日七夜是謂水湅鄭鍔曰上文湅絲記水湅之法此文湅帛記灰湅之法陳氏曰渥淳其帛以灰沃帛而熟之也既曰渥淳必有水焉非特灰而已鄭鍔曰實於澤器欲其不遽以乾熇也淫之以蜃淫與善防水者淫之之淫同謂粉蜃以淫其上歐陽氏曰蜃若今石灰周禮共白盛之蜃古者蓋取蚌殼以為灰以為白盛之用也以欄木灰煮其帛使熟又以蜃灰淫之使熟盛而白也玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之天子執冒四寸以朝諸侯天子用全上公用龍侯用瓉伯用將鄭鍔曰天子執鎮圭者執以朝日也執冒圭者執以驗諸侯之瑞也當朝覲㑹同之時執圭而來者天子則以冒圭而冒之蓋諸侯之邪刻其圭之上而天子邪刻其冒之下以驗其合否名之曰冒者以明天子之德足以覆冒之也與書所謂丕冒海隅出日之冒同繼子男執皮帛歐陽謙之曰案史記曹相國世家初封參為執帛注孤卿也後遷為執圭注諸侯伯執圭以朝位比之三代之制諸侯雖去其籍未盡亡也而猶倣佛可見者豈有不可泯沒者若此夫天子圭中必四圭尺有二寸以祀天鄭鍔曰四圭尺有二寸以璧為邸蓋徑六寸總三尺與大尺又等大圭長三尺杼上終葵首天子服之土圭尺有五寸以致日以土地祼圭尺有二寸有瓉以祀廟鄭鍔曰杼上殺削其上應龍曰王所搢大圭搢插也插之紳帶之間以其搢於衣帶同於衣服故以服言林氏曰王執鎮圭又執此以副焉則非圭之正也故又謂之介圭介之為大有所副而已服之則所謂搢之也琬圭九寸而繅以象德琰圭九寸判規以除慝以易行鄭鍔曰用繅所以見文德之外也璧羡度尺好三寸以為度歐陽謙之曰璧本九寸肉六寸好三寸今好三寸不改其度而左右之肉減六寸而為五寸上下之肉增六寸而為七寸度量其寸數使足於一尺則以是而為度矣圭璧五寸以祀日月星辰鄭鍔曰以璧為邸旁有一圭圭以五寸為度者五蓋天地之中數所以象三光運行乎天地之中也璧琮九寸諸侯以享天子鄭鍔曰璧天也九陽之極數也天子如天而為陽之極也故享之以璧琮九寸下文有瑑琮八寸諸侯以享夫人則此不當言琮諸侯之享天子用璧則用琮所以享后兼言琮者舉尊以見卑之意也榖圭七寸天子以聘女鄭鍔曰七寸者少陽之數天子而用七寸蓋男下女之義也不言和難則以榖圭以聘女為主歟大璋中璋九寸邉璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬鄭鍔曰宗廟祼用圭瓉以象陽之用也山川祼用璋瓉以象隂之成也此大璋中璋邉璋皆祼山川之器言大言中則知邉璋為小邉如邊際之邊則小可知用三璋者於大山川則用大璋於中山川則用中璋於小山川則用邉璋山川則隂氣之聚故用璋以象隂也剡出者四寸所以貫勺也大璋亦如之諸侯以聘女瑑圭璋八寸璧琮八寸以俯聘鄭鍔曰亦如之者亦如邉璋之制以七寸為度天子用榖圭七寸諸侯下天子故用大璋七寸天子宜用十二諸侯宜用九今也皆以七寸為度則降尊以從卑也且表其下女之義也牙璋中璋七寸射二寸厚寸以起軍旅以治兵守林氏曰中璋牙璋之小者蓋軍有小大所用之璋亦異然璋所以象隂之成事而牙有噬嗑之用焉故以起軍旅以治兵守駔琮五寸宗后以為權鄭鍔曰天子之后謂之宗后宗尊之之辭權者銖兩斤鈞所由生宗后以組繫五寸之琮以為權蓋用之於內也獻繭稱絲其以此歟大琮十有二寸射四寸厚寸是謂內鎮宗后守之鄭鍔曰王法天之大數后與王同體故皆以十二寸為度歐陽謙之曰天子之后謂之宗后蓋一宫之所尊宗宗之也天子之後宫一后三夫人九嬪二十七世婦八十一御妻皆所以偶於天子也其可以無嫡庶之分而失正妾之别哉為正為嫡則可以正位於內而為一宫之所宗也所謂宗后蓋后嫡室元妃之云者歟駔琮七寸鼻寸有半寸天子以為權歐陽謙之曰其數器一其度量同權之輕重當出於一也而宗后駔宗五寸以為權天子駔琮七寸以為權得無輕重之不等乎意者銖兩斤鈞其輕重固有定數也而五寸七寸其數之所起有不同者若宗后之權或起於斤天子之權或起於一斤有半歟兩圭五寸有邸以祀地以旅四望瑑琮八寸諸侯以享夫人聶氏圖曰兩圭五寸亦宜於六寸璧兩邉各琢出一圭俱長二寸半博厚與四圭同鄭氏圖曰兩圭邸琮兩圭五寸天地之中數也案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯鄭鍔曰案飾以玉所以明憑恃以為安后之於賓客有勞之之禮者如王致酒則后致飲然夫婦相成之意歐陽謙之曰皆九皆五亦所以言案之數也諸侯皆九不别於公侯伯子男之君也大夫皆五不别於公侯伯子男之臣也經本言飾案之玉而遂及於勞諸侯之具孰謂考工止工匠之事哉璋邸射素功以祀山川以致稍餼鄭鍔曰觀圭璧兩圭皆五寸以為制則璋邸亦五寸可知楖人闕雕人闕
