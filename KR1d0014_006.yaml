body:
  text: 周官集傳卷六元毛應龍撰肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲以歲時序其祭祀及其祈珥大祭祀展犧牲繫於牢頒於職人凡祭祀之卜日宿為期詔相其禮視滌濯亦如之祭之日表齍盛告潔展器陳告備及果築煮相治小禮誅其怠慢者展器陳告備者展省視之也陳列也省視其器陳列而實之既訖乃告具備又曰小宗伯詔相祭祀之小禮肆師是宗伯之考禮之小者在所相而治之掌兆中廟中之禁令鄭鍔曰凡兆中廟中禁令無所不掌則四郊四望四類之祀宗廟昭穆之禁皆使人不敢犯也凡祭祀禮成則告事畢林氏曰禮成謂自始及終其禮成矣而無虧也大賔客涖筵几築煮贊祼將大朝覲佐儐共設匪罋之禮饗食授祭與祝侯禳於疆及郊大喪大渳以鬯則築煮令外內命婦序哭禁外內命男女之衰不中法者且授之杖凡師甸用牲於社宗則為位類造上帝封於大神祭兵於山川亦如之凡師不功則助牽主車凡四時之大甸獵祭表貉則為位嘗之日涖卜來嵗之芟獮之日涖卜來嵗之戒社之日涖卜來嵗之稼若國有大故則令國人祭歲時之祭祀亦如之凡卿大夫之喪相其禮歐陽謙之曰使禮官往相其所以治喪之禮凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮禮有本有文治其禮儀者禮之文也左傳昭五年公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮二十五年子太叔見趙簡子簡子問揖遜周旋之禮焉大叔曰是儀也非禮也按正義曰禮是儀之心儀是禮之貌本其心謂之禮察其貌謂之儀行禮必為儀為儀未是禮故云儀非禮也此禮儀之辨肆師禮官之屬所治者禮之儀凡禮事之文物度數升降揖遜之文關於國之大事則從其長佐贊之若事之小則專掌之如宗伯之禮鬱人掌祼器凡祭祀賔客之祼事和鬱鬯以實彛而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節凡祼事沃盥大喪之渳共其肆器及葬共其祼器遂貍之大祭祀與量人受舉斚之卒爵而飲之祼說文灌祭也灌者方祭之始用鬱鬯之酒灌地降神鬯人掌共秬鬯而飾之凡祭祀社壝用大罍禜門用瓢齎廟用修凡山川四方用蜃凡祼事用概凡疈事用散大喪之大渳設斗共其釁鬯凡王之齊事共其秬鬯凡王弔臨共介鬯或問玉鬯秬鬯鬱鬯同異如何曰按說文鬯以秬鬯以秬釀鬱金芬芳攸服以降神增韻云秬黑黍鬯香草以黑黍米搗鬱金草取汁而煮之和釀其氣芬香調鬯故謂之秬鬯以韻文推之香草似即是鬱金草按鄭氏云秬鬯不和鬱者記曰鬱和鬯蕭和黍稷鬯自是一物陸佃云秬者百榖之華鬯者百草之英先王煮以合鬯意者所謂玉鬯者鬯以玉釀秬鬯者鬯以秬釀鬱鬯者鬯以鬱釀是所以不同歟徐氏音辨曰瓢匏也雞人掌共雞牲辨其物大祭祀夜呼旦以􅑧百官凡國之大賔客㑹同軍旅喪紀亦如之凡國事為期則告之時呼旦警起以祭祀尤當致嚴故首言之歐陽謙之曰凡國事為期則百官請時期於上也則告之時以雞人掌警旦之事因使以時期告百官焉凡祭祀面禳釁共其雞牲鄭鍔曰釁禮之事謂物新成則必釁以除去不祥也司尊彞掌六尊六彞之位詔其酌辨其用與其實尊彞名見小宗伯下春祠夏禴祼用雞彛鳥彞皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬蒸祼用斚彛黃彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也聶氏圖說曰雞彛盛明水鳥彛盛欎鬯祼並奠於神坐應龍曰詩所謂籩豆有踐注踐陳列也鄭司農曰獻讀為犧鄭鍔曰本戲字訛轉為獻犧與戲同音鄭明仲圖譜曰犧尊刻金牛之形於上兩犧尊一盛𤣥酒一盛醴齊象尊刻象形於上兩象尊一盛𤣥酒一盛盎齊聶氏圖曰六尊之下皆言有罍此六罍在六尊之間以盛三酒比於六尊設之稍逺郭璞云彛卣罍皆盛酒尊罍形似壺大者受一斛鄭明仲曰禮書言罍畫雲雷之狀然莫知雷作何狀今祭器中有作鬼伐鼓之狀此甚不經豫嘗得一古罍環其腹皆有畫正如人間屋梁所畫曲水細觀之乃是雲雷相間之飾如古雲字也象雲氣之形如者古雷字也古文為雷象回旋之聲其銅罍之畫皆一一相間乃所謂雲雷之象聶氏圖曰斚彛盛明水黃彛盛鬱鬯凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也聶氏圖曰虎彛畫虎於尊盛明水蜼彛盛鬱鬯爾雅注云蜼似獮猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨即自懸於樹以尾塞鼻或以兩指今江東人亦取養之為物捷健聶氏圖曰山罍一盛𤣥酒一盛盎齊歐陽謙之曰宗廟之祭蓋用九獻之禮王祼一后祼二王朝獻三后亞王朝獻四王再獻為五后亞王再獻為六尸既食後王酳尸為七后亞王酳為八諸臣又亞后酳尸為九凡六彞六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌大喪存奠彞大旅亦如之鄭鍔曰修即修治之義何必改字凡酒用以酳尸則尸飲之用以獻人則人飲之必當修治使之明潔然後可酌也司几筵掌五几五席之名物辨其用與其位凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几聶氏圖曰從廣八尺畫斧無柄設而不用之義徐氏音辨曰莞蒲之細者也在地曰筵筵上曰席紛者織成以緣筵林氏曰畫帛以為純也又曰黼純畫黼以為純也左右玉几以玉飾几設於左右也鄭氏曰禮記禮有以多為貴者天子之席五重諸侯三重大夫再重此莞筵繅席次席乃三重何也以書考之其設席皆以敷重席為言莞筵在地不重者也繅席加於筵上蓋皆重焉與莞筵為五重則與禮記之言合矣天子之席重而為五則下文諸侯之席亦重可知也祀先王昨席亦如之歐陽謙之曰祀先王昨席疑只一事蓋祀先王之時受昨爵之席也諸侯祭祀席蒲筵繢純加莞席紛純右雕几昨席莞筵紛純加繅席畫純筵國賔於牖前亦如之左彤几林氏曰承賔事之大猶承神也故筵國賔於牖前則亦如之而已儀禮鄉飲酒之禮主人在阼階賔在戶牖則此謂筵國賔於牖前者豈非設几筵於戶牖之前歟徐氏音辨曰彤丹漆也甸役則設熊席右漆几歐陽謙之曰甸役二事也有大甸有大役鄉師之官四時之甸則以大旗致之遂人之官若起野役則以大旗致之大旗者所謂熊虎為旗也則甸役之席用熊焉亦其宜矣凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几凡吉事變几凶事仍几聶氏圖曰經所云左右玉几者王皆立不坐設左右玉几者優至尊也祀先王惟言昨席不言几左者王憑之右者神所依詳經義則以生人几在左鬼神几在右天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治上春釁寶鎮及寶器凡吉凶之事祖廟之中沃盥執燭季冬陳玉以貞來歲之􅍇惡若遷寶則奉之鄭鍔曰始祖受命於天以有天下所傳之物守藏於府若祭天之司民司祿而獻民數榖數則受而藏之鄭鍔曰考小司冦之職孟冬祀司民獻民數於王王拜受之以圖國用則祭司民獻民數小司冦之職春官司祿之職缺其祭司祿之神或同司民之祭歟司民軒轅之角星司祿文昌宫之星又云下台司祿祿之言榖也故榖數則司祿之官掌之小司冦獻之王受之而登於天府受而藏之守寶鎮之所賴者在此故也然民數天所付榖數天所生以養人王者奉天牧民民榖之數藏於天府冝矣必祭司民司祿然後獻蓋司民者致司命死生之神司祿者致年榖登凶之神每嵗孟冬民數與榖數多寡皆已可知於是祭其所司之神然後獻其數天府之官藏之謂夫自是而後有民以守邦有榖以養民祖廟以守藏可謂守而不失矣林氏曰歲獻民數榖數最為致太平之要務管子曰制國以為二十一工商之鄉六士鄉十五三分其制而言之即所謂七民而五農夫二工商也先王所以為此者非他為欲等其民數榖數使之本末相當用為平嵗之經制故爾至於水旱不虞之至則必有儲蓄以待之三年耕必有一年之蓄三十年耕必有十年之儲則謂之太平故曰嵗獻民數榖數最為太平之要務此也嘗考古之民數實見於九官之所治九功之所歌大禹謨之於用周公書之於冊仲尼式其版孟子陳其道觀其所以諷齊梁滕魯之君與夫答宫錡之問畢戰之問者率此志之然則自古在昔先民有作其所以經綸圖度以富邦國而生萬民者其要實在乎此孰謂其可忽而不思以坐視天民之窮哉孫氏曰知所當守而不知守之道則猶不足以守曰賢書能書曰民數榖數曰治中曰盟約皆所以守是器也不知任賢使能孰與先治其國不知憂民足食孰與翼戴厥位官府鄉州都鄙之治中所以潔持是器之法邦之大盟約所以維持是器之具皆與天府登之使與玉鎮大寶並藏庶乎繼體守文之君知所守在此不徒擁虛器以為安矣鄭鍔曰說者謂卿大夫賢能之書獻之天王王登於天府不言於此何耶徐氏以為民榖者所資以為守寶鎮之具而賢能之書特見其尊之以與寶鼎等非所以為守之之具也典瑞掌玉瑞玉器之藏辨其名物與其用事設其服飾歐陽謙之曰天府所藏玉鎮玉器蓋古器所以為鎮者非所以為用者也典瑞所藏玉瑞玉器蓋所以為用者非所以為鎮者也二官所掌自不同不必合而言之王晉大圭執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王諸侯相見亦如之瑑圭璋璧琮繅皆二采一就以俯聘聶氏圖曰孔義云凡圭廣三寸厚半寸剡上左右各寸半又注云尹拙議以圭鎮用五采組約中央以備失墜徐氏音辨曰瑑刻成圻鄂也四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望鄭鍔曰必四圭者象天運行周遍四方神無不在之意也冬至圜丘以此祀之上帝者天之五帝為天地之佐豈其用與天同邪蓋唯旅時用之祀則不用有禮神之玉又有祀神之玉蒼璧者禮神之玉也四圭有邸者祀神之玉也故蒼璧特曰禮天而四圭有邸則謂之祀天於天如此則地可知矣夏至祭地以此祀之亦以旅四望豈四鎮五嶽四瀆之神皆用哉亦旅則用祀則不用祼圭有瓚以肆先王以祼賔客圭璧以祀日月星辰璋邸射以祀山川以造贈賔客聶氏圖曰此一圭宜於六寸璧上琢出一圭長五寸色白鄭氏圖曰日月天類也必一圭邸璧聶氏圖曰向上謂之出半璧曰璋其璋首邪郤之今從下自邸向上總邪郤之名為剡而出也色白應龍曰造賓客謂賓客至館時造館致稍餼納禀食也贈則使還時出郊而郊賜贈賄等以璋邸射而將之亦執以致命爾山川地類也其位在於四方而四方之諸侯所以扞內蔽外亦山川之象也土圭以致四時日月封國則以土地珍圭以徴守以恤凶荒鄭鍔曰欲知天時則植之以觀春秋冬夏之景冬至日在牽牛景長丈三尺夏至日在東井景長尺五寸則日之行可知春分日在婁秋分日在角而月弦於牽牛東井則月之行可知謂之致者植土圭於此而使景自至此則以致四時日月也欲知地理則植之以觀東西南北之象以一寸之量知千里之逺以一分之景知百里之近封建諸侯則以此知其地之廣狹故封國即以之而度其地謂之土地者以其度地也劉氏曰聖人既立羲和之官厯象日月敬授人時又作璇璣以齊七政未以為信也乃以玉作土圭以致日月四時之景必與厯象璇璣行度符合然後寒暑分至不差牙璋以起軍旅以治兵守林氏曰牙璋琢以為牙之文有噬嗑之用焉出征也則以之起軍旅而討有罪守國也則以之治兵守而防患難璧羡以起度駔圭璋璧琮琥璜之渠眉疏璧琮以斂尸榖圭以和難以聘女琬圭以治德以結好琰圭以易行以除慝賈氏曰玉人造此璧時應圜圜徑九寸今減廣一寸以長上下之袤一寸則上下廣有八寸故云其袤一尺而廣狹焉此璧羡天子以為量物之度大祭祀大旅凡賔客之事共其玉器而奉之大喪共飯玉含玉贈玉凡玉器出則共奉之言凡者非特大祭祀大旅大賔客之事而已典命掌諸侯之五儀諸臣之五等之命上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宮室車旗衣服禮儀皆以七為節子男五命其國家宮室車旗衣服禮儀皆以五為節王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宮室車旗衣服禮儀亦如之凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男公之孤四命以皮帛視小國之君其卿三命其大夫再命其士一命其宮室車旗衣服禮儀各視其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宮室車旗衣服禮儀各視其命之數林氏曰先王之時典命之職修而命數之所以加者上不可以逼下下不可以僣上後世采菽之詩作以思古其言曰樂只君子天子命之而春秋之書來錫命以示譏則典命所掌詎可廢哉司服掌王之吉凶衣服辨其名物與其用事王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕凡兵事韋辨服視朝則皮辨服凡甸冠辨服凡凶事服辨服凡弔事辨絰服聶氏圖曰大裘者黑羔裘鄭鍔曰先公比先王為尊享先王以九章而享先公以七章者非以為先王有天下而禮隆先公為諸侯而禮殺良由其所服者七章之鷩冕故王亦服以祭不敢以冕服臨之也凡喪為天王斬衰為王后齊衰王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆辨絰大札大荒大烖素服公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服其凶服加以大功小功士之服自皮辨而下如大夫之服其凶服亦如之其齊服有𤣥端素端凡大祭祀大賔客共其衣服而奉之大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序聶氏圖曰斬者不緝也齊者緝也典祀掌外祀之兆守皆有域掌其禁令若以時祭祀則帥其屬而修除徴役于司隸而役之及祭帥其屬而守其厲禁而蹕之外祀國外之祀在四郊如四望四類與丘陵墳衍之屬皆是也守祧掌守先王先公之廟祧其遺衣服藏焉若將祭祀則各以其服授尸其廟則有司修除之其祧則守祧黝堊之既祭則藏其隋與其服鄭氏曰修除黝堊互言之有司恆主修除守祧恆主黝堊世婦掌女宮之宿戒及祭祀比其具詔王后之禮事帥六宮之人共齍盛相外內宗之禮事大賔客之饗食亦如之大喪比外內命婦之朝莫哭不敬者而苛罰之凡王后有􅉔事於婦人則詔相凡內事有逹於外宮者世婦掌之拜說文本作􅉔從手音忽進趨之疾也故拜從之內宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后有事則從大喪叙哭者哭諸侯亦如之凡卿大夫之喪掌其弔臨外宗掌宗廟之祭祀佐王后薦玉豆視豆籩及以樂徹亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賓客之事亦如之大喪則叙外內朝莫哭者哭諸侯亦如之內宗是同姓之女外宗是異姓之女賔客之饗食亦如之者鄭鍔曰賔客之禮亦如祭祀故其薦其佐皆然也冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡死於兵者不入兆域凡有功者居前以爵等為丘封之度與其樹數大喪既有日請度甫竁遂為之尸劉氏曰死於兵者不入兆域謂如管叔蔡叔之類自絶於先王故棄之而不入域也以其忠義而死於王者則謂之有功既入兆域又居前列所以勸也及竁以度為丘隧共喪之窆器及葬言鸞車象人及窆執斧以涖遂入藏凶器正墓位蹕墓域守墓禁凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁隧說文墓道也謂掘地通道以葬墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域凡爭墓地者聽其獄訟帥其屬而巡墓厲居其中之室以守之鄭氏曰厲塋限遮列處劉氏曰謂外域為遮列防盜賊及牛羊也職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔贊主人凡其喪祭詔其號治其禮凡公有司之所共職喪令之趣其事劉氏曰職喪掌諸侯卿大夫之喪禮也是以五服有制尊卑異儀殯斂虞祔葬祭禭含百禮皆有定法不可過也故曰以國之喪禮涖其禁令序其事大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道者有德者使教焉死則以為樂祖祭於瞽宗鄭鍔曰凡建國必立學學必立政政者教養之方勸沮之術也必掌成均之法以治之者蓋大司樂所掌樂也周人於成均之中教樂德樂語樂舞則成均乃習樂之所大司樂所掌者樂官之法以治學政則於他學之法無與可知或問學校之教莫備於周而其制不見於周禮據祭義云天子設四學豈周制與祭義本注四學謂周四郊之虞庠也山堂章氏云天子大學在內者三小學在外者一虞庠是也又按陸氏禮象據大戴禮賈誼之說則以東學為東序南學為成均西學為瞽宗北學為上庠大學為辟雍此五學在內者皆大學也愚曰按陳氏禮書據祭義之說周設四代之學以為辟雍居中要知周之學大率與明堂不相逺辟雍回環皆水故入東學入西學入南學入北學王國之學在公宮南之左乃是在門左此是通上下之制相附近庶人之學在二十五家之閭孰亦然若在郊者亦在郊門之南也所以便入學者之往來爾按大胥職云春入學舍采合舞秋頒學合聲頒分也周五學之制辟雍居中南成均北上庠東東序西瞽宗學禮處瞽宗學書處上庠學干戈處東序學樂處成均此周制也以樂德教國子中和祗庸孝友程子曰不偏之謂中以樂語教國子興道諷誦言語鄭鍔曰國子者異時為公卿大夫奉命周旋出入專對之人也一語一言不可以不和故以樂而教之以樂舞教國子舞雲門大卷大咸大磬大夏大濩大武鄭鍔曰國子者將使之奉祭祀待賔客揖讓升降以行禮者也容儀不可以不中節故教之以舞熊氏曰周人備六代之舞雲門大卷黃帝樂雲門象氣出入周人冬至舞之以祀天神大咸莊周吕氏春秋白虎通皆云黃帝樂陳氏樂書云堯修而用之堯作大章復修用咸池以備樂愚按周禮于堯不稱大章而稱大咸猶周人不獨教周之大舞而教六樂貴備也咸池象地水周遍周人夏至舞之以祭地示大㲈舜樂㲈紹也元命包云舜之民樂其紹堯之業舜齊七政肇十有二州故周人舞之以祀四望司中司命風師雨師大夏禹樂夏大也元命包云禹能大堯舜之德禹平水土故周人舞之以祭山川大濩一曰韶濩湯樂呂氏春秋曰湯命伊尹作大濩歌晨露韓詩外傳曰湯作大濩宮聲使人溫良而寬大商聲使人方亷而好義角聲使人惻隱而仁愛徴聲使人樂養而好施羽聲使人恭儉而好禮濩護也湯之寬仁能救護生民故周人舞之以享姜嫄大武記曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子元命包云文王時樂蓋武王成其武功傳云武王以黃鍾布牧野之陳歸以太簇無射以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說逺人以作動物賈氏曰案律厯志黃鍾為天統律長九寸林鍾為地統律長六寸大簇為人統律長八寸又云十二管相生八八上生下生盡為中呂隂陽生於黃鍾始於左旋八八為位者假令黃鍾生林鍾是歷八辰自此以下皆然是八八為位蓋象八風也朱氏曰黃鍾最濁而應鍾極清所以旋相為宮而接其聲之上下王昭禹曰宮商角徴羽所謂五聲也朱氏曰宮最濁而羽極清所以協歌之上下林氏曰大合樂所謂六律六同五聲八音無不備也歐陽氏曰此總言樂之功用也鄭氏謂偏用六代之樂無所考據下文降神之樂則六變八變九變是也享祀之樂則分樂而序之以下是也何所一處作樂而合之哉蓋用樂非一所而見功效亦非一時也乃分樂而序之以祭以享以祀乃奏黃鍾歌大呂舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地示乃奏姑洗歌南吕舞大㲈以祀四望乃奏㽔賔歌函鍾舞大夏以祭山川乃奏夷則歌小呂舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以八音凡六變者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神鄭鍔曰樂一成為變劉氏曰索鬼神而致百物則變六代之樂各隨其方用其律而宮者也故五變而五蟲可得而致五土之示可得而禮六變而後象物可來天神可降鄭鍔曰樂作於此物應於彼雖聖人亦安能限其一變二變之時也亦意其來格遲速之期不過如此而已苟執文以求其必然則迂僞而不經也八蠟之祭飛走浮沉髙下尊卑之神悉索而祭之以見仁之至義之盡也凡樂圜鍾為宫黃鍾為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣圜鍾即夾鍾也徐氏音辨曰夾鍾而謂之圜鍾以為天宫天體圜也以理推之天積陽以成體故其角徴羽用三陽之律何也六律配乾故黃鍾為初九大簇為九二姑洗為九三㽔賔為九四夷則為九五無射為上九六同配坤故林鍾為初六南呂為六二應鍾為六三大呂為六四夾鍾為六五中呂為上六求天宫之類而以黃鍾太簇姑洗為角徴羽則乾初九九二九三之三陽也王氏曰此樂無商者祭尚柔商堅剛也雷鼓雷鼗皆八面鼗如鼓而小持其柄搖之旁耳還自擊孤竹竹特生者雲和山名劉氏曰六變者雲門之樂一終凡樂函鍾為宮太簇為角姑洗為徴南呂為羽靈鼓靈鼗絲竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣徐氏音辨曰林鍾而謂之函鍾以其為地宮地容也地以資生為功故其角徴羽用相生之律何也凡律起於黃鍾九寸其三分益一為上生三分損一為下生黃鍾下生林鍾林鍾上生太簇太簇下生南呂南呂上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔下生大呂大呂上生夷則夷則下生夾鍾夾鍾上生無射無射下生中呂求地宫之類而以太簇姑洗南吕為角徴羽則以函鍾生太簇太簇生南呂南呂生姑洗故也劉氏曰咸池之樂蓋八變而一終凡樂黃鍾為宮大呂為角太簇為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣徐氏音辨曰黃鍾為人宫人道交功勳成故其角徴羽用相合之律何也相生如子母相合如夫婦以呂配律為合若黃鍾大呂之合姑洗南呂之合蕤賔函鍾之合夷則小呂之合無射夾鍾之合太簇應鍾之合故也王氏曰聲陽也以隂竹則隂和於陽所以致鬼劉氏曰九韶者韶九變而一終書曰簫韶九成鳯凰來儀是也凡樂事大祭祀宿縣遂以聲展之鄭鍔曰先王之於祭祀也將以格神示必假聲音之美也王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏帥國子而舞鄭鍔曰祭祀之節有王出入之時尸出入之時牲出入之時皆當奏夏所當奏之樂皆有以令之則樂之序不爽而所奏各得其冝矣有九夏此所奏者三夏王大也樂章之大者也王始祭而入廟門訖祭而出廟門皆奏王夏蓋歌王之德為其大也始迎尸而入終迎尸而出皆奏肆夏尸者先祖之象也肆遂也安也王昭禹曰直而自遂謂之肆尸以象神奏肆夏以樂之欲其神之安肆也二祼之後王出迎牲入而告碩乃出而殺之皆奏昭夏昭明也明祖宗有碩大之德故用是牲也劉氏曰九夏乃有聲無辭者或問大司樂九夏注疏以為頌詩篇臨江劉氏不取其說何邪曰歐陽謙之辨之當矣劉氏曰鍾師擊鍾鼓奏九夏鄭賈皆以九夏為頌詩之篇左傳金奏肆夏之三工歌文王之三肆夏云金奏文王云工歌則夏非頌篇明矣然則九夏者乃有聲無辭者歐陽謙之曰朱氏華黍詩傳云鄉飲酒禮鼓瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦鼓瑟而歌鹿鳴四牡皇華然後笙入立於縣中奏南陔白華華黍然則曰笙曰樂曰奏而不言歌則有聲而無詞明矣以此考之則肆夏之義臨江劉氏之說誠足以明注疏之謬而袪强引頌詩之惑矣大饗不入牲其他皆如祭祀鄭鍔曰饗賔無迎牲之理不迎牲則不奏昭夏惟此與祭祀不同爾祭有入牲之禮告博碩肥腯又以告幽全以盡祀先之心也賔客之來隨命數以致禮禮主人不當告於賔客故無迎牲之事然先王之待賔客如待神明故其他皆得而同焉大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞歐陽氏曰王之出射禮畢而出於虞庠也王之入將行射禮而入於虞庠也王大食三宥皆令奏鍾鼓王師大獻則令奏愷樂凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂大札大凶大烖大臣死凡國之大憂令弛縣凡建國禁其淫聲過聲凶聲慢聲大喪涖廞樂器及葬藏樂器亦如之膳夫云以樂宥食是常食也鍾鼓樂器之大所以稱大食之禮也
