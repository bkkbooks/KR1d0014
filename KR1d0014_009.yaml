body:
  text: 周官集傳卷九元毛應龍撰秋官司宼第五惟王建國辨方正位體國經野設官分職以為民極乃立秋官司寇魯論所舉徳禮政刑治之序也六典之治司徒掌教宗伯掌禮司馬掌政司寇掌刑其序然爾然各官之事各有其義此官司刑而所司以寇為事蓋事莫急於寇賊之為害舜時臯陶作士士刑官也而舜命臯陶先戒蠻夷猾夏寇賊姦宄則刑以懲寇為急尚矣秋官謂之司寇其義如此使帥其屬而掌邦禁以佐王刑邦國鄭鍔曰司宼宜曰掌邦刑而言掌邦禁何耶愚以為禁者禁於未為之先刑者施於已犯之後先王之於刑不得已而後用設以大法正以禁於未為之先使民知避而不敢犯則刑将至於措而不用也禁之而不止至於犯焉不得已然後以刑應之故先言禁而後言刑掌邦禁言制法之本也以佐王刑邦國言用刑之事也刑官之屬大司寇卿一人小司寇中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人方士中士十有六人府八人史十有六人胥十有六人徒百有六十人訝士中士八人府四人史八人胥八人徒八十人朝士中士六人府三人史六人胥六人徒六十人司民中士六人府三人史六人胥三人徒三十人司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人司約下士二人府一人史二人徒四人司盟下士二人府一人史二人徒四人職金上士二人下士四人府二人史四人胥八人徒八十人司厲下士二人史一人徒十有二人犬人下士二人府一人史二人賈四人徒十有六人司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人掌囚下士十有二人府六人史十有二人徒百有二十人掌戮下士二人史一人徒十有二人司𨽻中士二人下士十有二人府五人史十人胥二十人徒二百人罪𨽻百有二十人蠻𨽻百有二十人閩𨽻百有二十人夷𨽻百有二十人貉𨽻百有二十人布憲中士二人下士四人府二人史四人胥四人徒四十人禁殺戮下士二人史一人徒十有二人禁暴氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百有二十人蜡氏下士四人徒四十人雍氏下士二人徒八人萍氏下士二人徒八人司寤氏下士二人徒八人司烜氏下士六人徒十有六人鄭鍔曰名官不及於司水之意何也水雖生於坎中之陽而為陽中之陰火雖生於離中之陰而為陰中之陽王者嚮明而治光於四方照臨下土皆以陽為主故尊明火以為先也條狼氏下士六人胥六人徒六十人脩閭氏下士二人史一人徒十有二人㝠氏下士二人徒八人庶氏下士一人徒四人穴氏下士一人徒四人翨氏下士二人徒八人柞氏下士八人徒二十人薙氏下士二人徒二十人月令季夏之月燒薙行水謂燒所芟草乃水之則除草謂之薙也硩蔟氏下士一人徒二人王昭禹曰硩言摘也應龍曰此亦除惡之類故職在此翦氏下士一人徒二人赤友氏下士一人徒二人蟈氏下士一人徒二人壺涿氏下士一人徒二人庭氏下士一人徒二人銜枚氏下士二人徒八人伊耆氏下士一人徒二人伊耆古者王號始為蜡以息老物此官掌共齒杖故以伊耆名官杖則老者持之以為安亦息老物之類大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人環人中士四人史四人胥四人徒四十人鄭鍔曰禮有二環人夏官之環人掌致師此官掌環遶賔客而為之衛事雖不同皆有以取於循環之義故皆名曰環人象胥每翟上士一人中士二人下士八人徒二十人掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人史四人胥四人徒四十人鄭鍔曰訝士之職有賔則與行人送迎之又立掌訝何也訝士雖有送迎之事然正掌四方之獄訟故列於羣士之後此則掌邦國之等籍以待賔客而送賔於疆又不止於訝其獄訟之事掌交中士八人府二人史四人徒三十有二人鄭鍔曰天地交而萬物通上下交而其志同君臣之分嚴則隔而不通矣故上下不交則天下無邦然而朝廷之君臣相與以道則其合於堂陛之間外而邦國地逺勢隔何以交之哉是故設官以掌交通之事道達其間隔之情使無疑阻則天子諸侯情相得矣掌察四方中士八人史四人徒十有六人鄭鍔曰掌交之屬有掌察所以察諸侯之不率者掌貨賄所以交通諸侯之幣帛也闕於秦火掌貨賄下士十有六人史四人徒三十有二人朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人都則中士一人下士二人府一人史二人庶子四人徒八十人都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之大司寇之職掌建邦之三典以佐王刑邦國詰四方鄭鍔曰此之三典曰輕曰重曰輕重之中其制則出於剛克柔克正直之徳者也徐氏音辨曰詰問難也一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典鄭鍔曰輕典不特罪疑從輕也凡輕皆輕憫其為未化之民也以五刑糾萬民鄭鍔曰墨劓剕宫大辟刑之名也五刑之名故不可改而此有野刑軍刑鄉刑官刑國刑亦以五刑稱之葢有野民犯焉有軍中犯焉有在官者犯焉有在國者犯焉故也一曰野刑上功糾力野刑施於野民者也國外曰野若鄉大夫云野自六尺之類功農功也力如服田力穡之力謂力之勤於農者二曰軍刑上命糾守軍刑施於軍旅者也鄉師曰不用命者有誅守不失部伍守所以致命三曰鄉刑上徳糾孝鄉刑施於六鄉者也大司徒云以鄉三物教萬民一曰六徳鄉之八刑不孝不弟不睦不婣皆有刑獨孝以孝為首也四曰官刑上能糾職五曰國刑上愿糾㬥歐陽謙之曰國刑疑施於王宫中宿衛侍從之人故上愿糾㬥霍光宿衛三十年小心謹密上愿糾㬥可見於此以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑耻之其能改者反于中國不齒三年其不能改而出圜土者殺民之遊惰不能自強於為善謂之罷民記玉藻云垂緌五寸惰遊之士也𤣥冠縞武不齒之服也先王所以治罷民者欲其遷善而已司救職云其有過失者三讓而罰三罰而歸於圜土此經聚而教之所以勞苦之使知自強也寘而繫之所以汚辱之使知自好也其能改過者則使反於鄉里猶不得以齒於平民者三年其不能遷善又逃遁而出於圜土則不畏甚矣斯不足教者也葢御惡人之道不一而足虞書五流五宅先之以三就者就輕就重與就輕重之中繼之以三居者居逺居近居逺近之中周官司寇之刑與虞書法異而意同皆以使之遷善逺罪其不能改而不帥教者則虞書所謂怙終以賊害人者也以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃致於朝然後聽之訟者言於公也兩造謂彼已有辨而皆至於公者以兩造聽之而無所偏受書所謂兩造具備是也使皆入束矢以自明其直入矢而辭屈則又因而沒入於官以罰之獄者曲訟而不已則至於獄兩劑彼已各具其獄辭之書以兩劑聽之而無所偏信書所謂五辭簡孚是也必入金以自明其堅不可變入而不堅又從而沒於官以罰之司寇以掌刑為職而先王以期於無刑為心兩造兩劑入束矢入鈞金是乃所以禁之也以嘉石平罷民凡萬民之有罪過而未麗於灋而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之以胏石達窮民凡逺近惸獨老㓜之欲有復於上而其長弗達者立於胏石三日士聽其辭以告於上而罪其長歐陽謙之曰士聽其辭當是朝士軄曰右肺石達窮民焉正月之吉始和布刑于邦國都鄙乃縣刑象之灋于象魏使萬民觀刑象挾日而歛之鄭鍔曰刑者一成而不可變非治教政禮之比数改易則無所執守每正月必更新之何耶葢先王制刑視時而變通故有世輕重之文未常守一而不通此所以因嵗首而示改造之意然民不可使覿刑乃垂之象魏而使觀之何耶葢民雖不可使日見上之用刑而不可不使之知刑書刑書不知則不知所避而易犯矣上之人隱其所以防民之具使民不知而犯從而刑之是罔民也焉有仁人在位罔民而可為哉凡邦之大盟約涖其盟書而登之于天府大史内史司㑹及六官皆受其貳而藏之凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦灋斷之凡庶民之獄訟以邦成弊之約契要也前漢禮志治本約師古讀約曰要是要約之為義一爾按司盟職云凡邦國有疑㑹同則具盟約之載辭葢司盟雖掌其書然非刑官親臨之則人無所畏是以既親涖其盟書登於天府以保藏之而大史内史司㑹又藏其副各以攷事焉非特備失亡而已其不信者則有刑如司約所云六官辟藏以明其罪是也大祭祀奉犬牲若禋祀五帝則戒之日涖誓百官戒于百族及納亨前王祭之日亦如之奉其明水火孔氏曰精意以享謂之禋應龍曰百官凡官府之執事者皆是也百族王之親也按鄭氏所引郊特牲戒百姓者本注云百姓王之親也入廟戒親親也此經百族與郊特牲註百姓義同誓百官者即如大宰云祀五帝則掌百官之誓戒是也但此云涖誓百官當知司宼非得以臨大宰葢誓戒掌於大宰而不親誓使餘小官誓之司㓂臨之其百官所戒者當大宰為之惟百族王之親慮其從王奉祀或驕而不肅故刑官戒之以示警焉鄭鍔曰納亨者納牲将殺之時是時大宰賛王牲事司宼則前王以刑禁先焉則人知而自入禮也又曰刑官以清而察獄訟之辭以明而燭蔽欺之情故使之奉之以明其義焉凡朝覲㑹同前王大喪亦如之鄭鍔曰凡朝覲㑹同賔客所在刑官先焉然後人知尊王也大軍旅涖戮于社凡邦之大事使其屬蹕鄭鍔曰大軍旅涖戮於社邦有大事使其屬蹕皆以掌刑足以肅清臣下故也小司寇之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司寇擯以叙進而問焉以衆輔志而弊謀鄭鍔曰問民以圖安之計哀元年呉入楚陳懐公朝國人而問焉是也又曰人君以不世出之資非不足以斷邦之大事也然聖人以謂知者千慮必有一失愚者千慮必有一得先民有言詢於芻蕘者大雅之訓汝有大疑謀及庶人者洪範之言未有自恃其知而無失者故國有大事則致萬民於外朝而詢以是非葢欲順民而不違也然事之大者當决於朝廷非萬民可得而與惟國危國遷立君當詢於萬民萬民不欲則不可強使之從故所詢者惟此三事耳又曰羣臣者卿大夫士也在東而西面羣吏者府史胥役也在西而東面則左右以輔相之爾三公而下府胥皆在而王之所詢者民爾民非有位於朝者及詢之則得以北面於此見民為貴也以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用灋以囚所犯罪附於五典聽獄訟當知罪所麗也既得其罪附於刑矣又從而用情以訊之恐有枉濫非心服而從也故用情實問之至於旬乃蔽之者十日而後斷之與書要囚服念五六日至於旬時丕蔽要囚同義緩刑之意欲其欽慎也王制曰刑者侀也侀者成也一成而不可變故君子盡心焉王制本疏云形體是人成就容貎一成之後若以刀鋸鑿之斷者不可續死者不可生王氏曰蔽其罪則讀其伏罪之書乃用法也鄭鍔曰獄訟不一而吾所聽之者不可出乎五刑之外聽其辭而知其罪可附於五等之刑矣又慮乎箠楚之下何求不獲吏或鈎鉅以罔之而遂有強從者必我以情度情既已得實又至於旬乃斷之則先讀其鞫問之書使囚聞之知所犯之實然後用法也葢至於旬則我思之審讀其書則彼知其詳無失入之悔無濫死之寃也凡命夫命婦不躬坐獄訟凡王之同族有罪不即市不躬者貴貴也不即市親親也甸師云王之同姓有辠則死刑焉必於甸師就隱處刑之不即市者不與國人慮兄弟也鄭鍔曰不使之躬坐所以責亷耻也不使之即市所以重國體也襄十年王叔陳生與伯輿爭政王叔之宰與伯輿之大夫坐獄於王庭葢親而坐獄則有投䑕忌器之嫌被戮辱者有大迫之醜非所以為親親之道周勃下獄出曰吾乃今知獄吏之貴葢貴而坐獄見侮於刻木之徒非所以為貴貴之道也以五聲聽獄訟求民情一曰辭聽鄭鍔曰辭聽則察其言辭以聽之也二曰色聽鄭鍔曰色聽則聽言而察其顔色也三曰氣聽氣從内發心知其虛吐氣則喘鄭鍔曰氣聽則聽其言而察其氣也四曰耳聽五曰目聽鄭鍔曰心有不直則耳所聽者必疑而不審應龍曰五者皆以辭為主故皆曰聽然先王豈故為是術以察見淵魚哉葢不如是則情不可得而刑必濫矣或者謂察諸外者不足以知其心殊不知聲色耳目正心之所由發也古人於舉趾髙者知其不固目動言肆者知其辭之必遁視下言徐者知其有禍觀威儀省禍福無不以此而况求民情寜有不可見也以八辟麗邦灋附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賔之辟故謂王之故舊也故舊不遺則民不偷賔鄭氏曰三恪二代之後歟應龍曰恪敬也案古客皆讀如恪三恪即孔叢子禮之如賔客也左傳注三恪在二王後之上其禮轉降示敬而已鄭鍔曰王者專生殺之權豈其所優異之人而不能釋之哉以為法者天下之公共非一人之得而私與衆議之以示至公可也兹所以有八辟之議也以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑三刺者謂羣臣羣吏萬民三者皆曰可殺而後殺之也鄭鍔曰凢言刺有二義刺取也刺殺也如春秋書刺公子偃之刺則殺也此言三刺則義當訓取葢刺有探取之義也又曰庶民之罪已得其中雖罪名已著尚未忍殺之刺取臣民之意皆以為可殺然後斷其中殺之所謂國人殺之也説文曰訊問也鄭鍔曰人之深情厚貌不可臆度有顧望畏懼不敢吐其實者將以刺取其意必先設辭以訊之不訊其言無以探其意故三刺之法則三訊之意所以刺取其意耳又曰此之所刺者庶民獄訟之中也雖訊官吏實以民為主而訊官吏者能逹萬民之情而致於上故也及大比登民數自生齒以上登于天府内史司㑹冢宰貳之以制國用鄭鍔曰冢宰本制國用也内史掌國令之貳以逆㑹計司㑹掌財用之貳以逆吏治故皆受民之貳乃使司寇登之何耶愚謂用刑有煩省則斯民有登耗民数有登耗則財賦有多寡必使刑官登之者葢民數之多則知省刑以育民之所致也刑不可以妄用也財賦出於民民之多寡則財賦亦從之豐耗國用當從而隆殺焉此所以受其貳也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之鄭鍔曰大司寇奉犬牲於大祭祀之時故小司寇於小祭祀奉之職有尊卑也應龍曰鑊之實水卑者之事也而使司寇主之葢齋戒沭浴而後可以祀上帝尚潔也此鑊也此水也臨之以刑官則無不肅而無不潔矣大賔客前王而辟后世子之䘮亦如之小師涖戮凡國之大事使其屬蹕歐陽謙之曰大司寇小司寇同官也邦國有大事俱號令其屬官以為之蹕爾孟冬祀司民獻民数於王王拜受之以圖國用而進退之民生自天大民小民之星其神實生乎民孟冬物生之時祀之以報其生飬之功必主之以司宼者先王以民之登耗固有神主之而民之多寡皆本乎刑之繁省亦司寇之所當知也故司寇以祀則獻民數於王見其慎以用刑而刑不至於殘民則其生成之数如此王拜而受之則亦重民数也嵗終則令羣士計獄弊訟登中于天府嵗終上其所斷獄之數計其所斷幾何既知其繁省又知其民之為善為惡者之多寡也正嵗帥其屬而觀刑象令以木鐸曰不用灋者國有常刑令羣士乃宣布于四方憲刑禁乃命其屬入㑹乃致事鄭鍔曰逺之所取法者在乎近外之所取正者在乎内六十屬為衆矣所視以效法在吾之羣士使近而羣士能守法不越則彼逺而外者詎有不恤於刑乎故先言帥屬乃言令羣士也又曰既令羣士宣布四方極四方之逺皆表憲刑以示之盖内不率者不足以示外近已孚然後逺者信此其先後之序
