body:
  text: 周官集傳卷十三元毛應龍撰冬官考工記第六周書曰司空掌邦土居四民時地利孔氏曰主國空土以居民故曰司空應龍曰考工記固知非冬官舊文然其書稱人稱氏至於闕官之類甚似周禮舊文蓋自周之衰諸侯踰法度惡其害已滅去其籍孔子時禮樂之書已多不具是以問禮於老聃自衛反魯傷其雜亂復重而正之當是時周公制作其不存者固有之矣近代儒者謂冬官元不亡各散在五官中愚於或問已詳其不然要知司空掌治百工考工記之作以備其事之大數鄭氏謂前世識其事者記録之以世考之其書嘗經秦火既在秦以前又其事皆司空之事所宜有由是言之作此記者安知非為當時亡失冬官遂遵舊典以成之愚故曰謂冬官之屬猶有出於考工記之外則可謂五官中所有之屬欲强取以補冬官之遺則不可東萊吕氏曰考工記其文閎偉巨麗亦先秦古書也國有六職百工與居一焉鄭鍔曰夫百工雖曰賤藝然備物致用立成器以為天下利其法本出於聖人為工者因聖之法而制作焉苟無以考其良窳則器不足用而良法遂廢矣此所以命司空執成法以考之周亡至今數千年如鍾鼎尊爵後世之工號為至精者有不能及非考之有法曷至是哉應龍曰王公士大夫固可謂國之職工商農婦之屬貴賤殊等亦得以並列而為六蓋國之所需百工之事為甚重不可以賤藝之事忽之也或坐而論道或作而行之或審曲面藝以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之顔氏曰坐而論道無為者也作而行之有為者也鄭鍔曰具其器用使之無或不足也所謂珍異者可以為服食之資可以為器用之飾苟無人以通之有餘於此者或不足於彼而物之至美或滯於一方必有人貿遷其有無使之相濟以為用相資以不乏所以使貨財流羡而民足於衣食也出於地而利於人者地財也然地雖有財必待人有事於地而財始長人能勉致其力春耕夏耘不憚勤苦則地無遺利矣坐而論道謂之王公作而行之謂之士大夫審曲面藝以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功顔氏曰公亦人臣而與王同坐而論道者也鄭鍔曰坐而論道謂之王公作而行之謂之士大夫通謂一職爾不可分二也何以言之道者亘萬世而無弊何論之有若夫時有汚隆道有升降當其時所宜行者則不可不論也為王公者坐乎廟堂所論若此為士大夫者奔走乎下聽其所論從而行之王公既相與講明以發斯道之隱此則行乎王公之所論豈非通為一職哉陳用之曰飭力以長地財非特受田之夫而已山澤之農皆與焉蓋三農生九榖園圃育草木虞衡作山澤之材皆所謂長地財也鄭鍔曰記考工者欲重此百工可也今方以農商嬪婦並列而為職豈亦將以考之歟意以謂長地財不可以無農通貨賄不可以無商化絲枲不可以無嬪婦而備器用安可以無百工哉一人之身而百工之所為備如必自為而備用之則非人人之所能為由是論之國不可無百工猶耕不可無農貨不可無商而絲枲不可無婦功百工之資於民用如此其急惡可以無考之之法乎此司空之篇所以有考工之記歟粵無鎛燕無函秦無廬胡無弓車顔氏曰以薄地除草故謂之鎛鄭鍔曰燕幽燕應龍曰按韻䤴通作函甲介鎧也粵之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也鄭鍔曰古之治天下也必立國工使為民所不能為之器以資民用若舉國皆能為之則不待立是工粵乃揚州之域厥土塗泥人人治田故能為鎛秦有鄠杜竹林南山檀柘天水隴西山多林木故其民長於攻木為戈柲胸奴唐虞三代時所謂山戎玁狁獯鬻也知者創物巧者述之守之世謂之工百工之事皆聖人之作也創如創業垂統之創謂闓端於始也述如繼志述事之述謂述而行之也守之世謂之工謂父子傳而不失也鄭鍔曰天地所生未有一物不可用者而萬物後酌見可用之理闓端造始發而制之於衆人未為之先故曰知者創物有以開其端則有以述其事者而巧在所用焉故曰巧者述之述如繼志述事之述謂述而行之也知者肇造於其始矣規矩誠陳準繩誠設唯有至精之巧者善於其事乃能因其制作循而述於其後故曰巧者述之巧者能述之矣苟不傳其業使世守之則古人之創制或幾乎熄又曰百工雖能運巧思以成其事而其成則在於規矩既立之後自非聖人之知足以闓而創其始則百工之巧無所用於天下矣故曰百工之事皆聖人之作也爍金以為創凝土以為器作車以行陸作舟以行水此皆聖人之所作也陸氏釋文曰爍當作鑠說文銷鑠之也鄭鍔曰夫金者物之至堅者也非聖人知以火而銷鑠之則至堅者不可鎔以為刃土者物之至緩者也非聖人知以水而堅凝之則至緩者不可範以為器陸之逺者足有所不能窮非聖人作車以通之則行乎逺者勞矣水之運者徒有所不能涉非聖人作舟以濟之則涉乎險者殆矣金可以為劒㦸之用土可以為陶旊之用舟車可以為水陸之用聖人未作則天下同於無知聖人已作則萬物獲其利用彼百工者雖曰巧足以述之於既成之後故曰鑠金以為刃凝土以為器作車以行陸作舟以行水此皆聖人所作也陳祥道曰前言皆聖人之作也以謂百工之事自聖人而興後言此皆聖人之所作也以明百工之事非聖人不能創天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也顔氏曰天時有因而違其時地氣不辨而遷其地則以燕荆之角幹妢胡吳粵之笴金而加之般輸之巧亦不以為良矣鄭鍔曰觀夫至美之材其質既良加之以良工之巧其藝且精不患乎器之不良也然而材則有至良之質工則有過人之巧而器之成卒不甚善者此何理哉蓋上不得天時下不得地氣而已是故斬木者必順其隂陽陽木必斬於仲冬隂木必斬於仲夏為弓者必順乎春夏筋必治於夏角必液於春他非無時也以為非此時則不順乎天而不足以為良也為刀必於鄭為斤必於宋為削必於魯為劒必於吳粵他非無地也以為非此地則不得其氣而不足以為良也如使其不順天時不得地氣雖材美工巧而欲為良詎可得哉故曰材美工巧然而不良則不時不得地氣也橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也鄭之刀宋之斤魯之削吳粵之劒遷乎其地而弗能為良地氣然也枳即藥家枳殼之枳晏子曰江南為橘江北為枳歐陽氏曰橘皮薄枳皮厚南方地薄北方地厚故橘移於淮北則變而為枳地氣使之然也邵康節治平間與客散步天津橋上聞杜鵑聲慘然不樂客問其故則曰洛陽舊無杜鵑今始至有所主客曰何也康節曰天下將治地氣自北而南天下將亂地氣自南而北今南方地氣至矣禽鳥飛類得氣之先者也春秋書六鷁退飛鸜鵒來巢氣使之也自此南方草木皆可移於北方南方疾病瘴瘧之類北人皆苦之矣至熙寧初其言乃驗陸氏釋文曰濟四瀆水也濟水屬齊王莽時其流絶貉獸名詩七月一之日于貉朱氏曰貉狐狸也鄭鍔曰萬物賦形於天地抱氣於隂陽宜其無所往而不能遂其生育之理然植者非其地則變其本質故橘踰淮而北遂化為枳飛者非其地則有所不居故鸜鵒處濟之西不肯踰之而東走者非其地則不得以自生故貉踰汶水則必死彼其生植飛走之類疑若無知不必擇地而安也然而若此者蓋由地氣非所宜故爾旅獒曰犬馬非其土性正謂此也燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也鄭鍔曰荆楚也幹柘也可以為弓弩之幹妢胡胡子之國在楚旁杜氏曰笴讀為槀謂箭槀又曰孟子言充實之謂美美者材質之良充實於其中而發見於其外者也此四材之美者蓋由土地之所宜故特異乎他邦之所産也故曰燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也鄭鍔曰天之運也一為春夏而萬物生一為秋冬而萬物死此生殺之時也草木之生也孳萌於子紐牙於丑畢成於戍該閡於亥此生死之時也石解散曰泐至堅者石疑若不能泐矣然而盛暑之氣爍石流金則堅或至於解散至柔者水疑若不能凝矣然而隆冬寒沍則堅凝而為冰既堅矣疑若不能釋也及夫暖氣融和則復消釋而為水凡此皆天時使之然也惟天之時寒暑之不常物之寓形乎天地之間亦不常如此則夫工之制器可不因乎寒暑隂陽哉故工雖巧矣時也地也材也苟一不能備則巧無所施故記者所以貴乎合四者以為良也凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二鄭鍔曰天時地氣材美工巧四者不可失一也上文既辨地氣材美天時之事於是繼之以百工之事焉顔氏曰色則設之而已設之則彰施焉攻木之工輪輿弓廬匠車梓攻金之工築冶鳬㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊鄭鍔曰攻木之工七輪人為輪輿人為車弓人為六弓廬人為戈柲之等匠人為城郭宫室溝洫之等車人為車梓人為飲器射侯之等陳祥道曰七者外有輈人焉其實則八先儒云攻木之工遺輈人有虞氏上陶夏后氏上匠殷人上梓周人上輿鄭鍔曰陶陶土以為器也有虞氏所以尚陶者去古未逺世質民淳故貴夫瓦器之質也記曰泰有虞氏之尊也則其尚陶可知矣匠匠人營宫室為溝洫者夏后氏所以尚匠者荒度土功卒有天下故貴乎平土之居語曰禹卑宫室而盡力乎溝洫則其尚匠者可知矣梓梓人也攻木以為筍簴為飲器者商人所以尚梓者變虞夏之土器而用木漸革其質而趣於禮樂之文也輿車也周人所以尚輿者禮樂至是大備用乘車所以嚴貴賤之分也陳祥道曰上之為言尚也所尚在此故上之也匠也梓也輿也自虞至周皆兼有之特矜百工之中各有所尚焉爾各有所尚非異好也時焉而已自虞至周其猶天地之運歟虞之時譬則冬也庶事以質故尚陶夏之時譬則春也視有虞則微有興作故尚匠殷之時譬則夏也視夏后氏則禮法為加文故尚梓周之時譬則夏秋之交也赤與白謂之章而文備成之時也故尚輿先儒謂禹治水民降丘宅土卑宫室盡力乎溝洫而尊匠其理固然要之聖人所以昭世之尊上特其應世之迹不得不然非以已所常從事者而為之好尚也故一器而工聚焉者車為多鄭鍔曰欲言作車之工故言周人以車為上欲言周人尚輿之由故言虞夏殷周四代之王所尚各異唯周之所上者輿也故言作車之工為多焉車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等朱氏曰軫謂車前後兩端橫木所以收斂所載者錢氏曰輿下曰軫或曰收詩小戎俴收應龍曰禮記注戈鉤矛㦸如㦸而橫安刃但頭向上為鈎又云戈兩刃陳祥道曰崇者聚而髙也戈柲六尺有六寸直而建之則崇於軫不止四尺而已惟既建而迆焉則有折除之法存而特取崇於四尺之數陳祥道曰酋矛蓋以别於夷矛之名酋矛常有四尺夷矛三尋則酋矛視夷矛為短鄭圖解曰殳主擊戈㦸主刺㦸三刃又曰車有六等之數並軫數也夷矛不與焉六建並夷矛數也軫不與焉軫戈人殳車㦸酋矛此車六等之數并軫數㦸酋矛夷矛人此謂六建車謂之六等之數鄭鍔曰上言車有六等之數蓋舉其凡也下云車謂之六等之數厯叙六等於上而終言之謂六等之數如此也凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其朴屬而微至不朴屬無以為完久也不微至無以為戚速也鄭鍔曰車之所以運轉不窮致逺不泥者以有輪也輪運乎車下載於地上苟不能運雖有蓋軫特虗器爾則輪者車之本也既有所本則察車者可不知其所本耶故曰察車之道必自載於地者始也是故知察車之道必先察乎輪誠以輪者車所資以運行故也漢志曰古之聖人觀轉蓬始知為輪輪行可載因物智生復為之輿輿輪相乘周流罔極則車之作以輪為先可知矣察車而不先於輪是不知察之之道也故又曰是故察車自輪始輪已崇則人不能登也輪已庳則於馬終古登阤也故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸鄭鍔曰巾車掌王之五路校人掌王馬國之六馬馬所以駕路也馬有髙下故車輪亦有髙下馬之髙者其輪髙馬之下者其輪卑兵車駕戎馬田車駕田馬乘車則或駕種馬或駕道馬其與戎馬皆國馬之髙八尺者也故輪六尺六寸田馬馬之髙七尺者也故輪六尺三寸又曰兵車所以即戎田車所以講武而乘車者王於無事之時所乘者也王者之於天下先天下之憂而憂後天下之樂而樂使戎事之不戒武備之不修雖有乘車烏得而自樂耶故記考工者必先兵車田車而乘車處其後者使有天下之君知所先後也六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節鄭圖解曰大穿曰賢小穿曰軹字書云車輪之穿為道鄭鍔曰今世之所謂軸頭也應龍曰車軸之端貫轂者名為轊轂末之小穿容轊者名為軹歐陽氏曰軹云者蓋軸之所貫而轂孔之向外者也錢氏曰在軹之上曰輹曰伏兔曰車履鄭鍔曰輪崇六尺六寸則軹崇三尺有三寸矣田車輪六尺三寸則軹崇三尺一寸半矣軹去地三尺有三寸上有伏兔尾後上載車軫始有車輿軸三尺三寸伏兔及軫共七寸則四尺矣車輿去地四尺而人長八尺則登下為便為車必欲軫去地四尺者正以人之長短登降而節爾輪人為輪斬三材必以其時三材既具巧者和之林氏曰和者有異而無乖則三材雖異合而用之使各相得而無乖戾鄭鍔曰材既美矣又有待乎工之巧然後因材以致用故繼之曰三材既具巧者和之三材以為輪必為之孔入轂入牙皆使得所是之為和非巧者則不能焉百工之制器惟輪人為輪弓人為弓皆曰巧者和之蓋輪合三材而為之弓合六材以為之惟材之合者多故貴乎工巧始能調和使不乖戾也且合五聲以為樂必精於樂如師曠者然後能和其聲合五味以為食必精於食如易牙者然後能和其味而况合三材以為輪合六材以為弓而不有待於巧者以和之歟轂也者以為利轉也輻也者以為直指也牙也者以為固抱也林氏曰輻外入乎牙內入乎轂以正直為體故為直指鄭鍔曰周圜轂輻者謂之牙牙輪輮也林氏曰輮木為牙夫唯利故能轉惟直故能指惟固故能抱輪敝三材不失職謂之完謂之職者轂輻牙各有職任利轉者轂之任直指者輻之任固抱者牙之任三者各當其任至於輪久而敝自相支持雖盡不動是不失職也望而視其輪欲其幎爾而下迆也進而視之欲其微至也無所取之取諸圜也顔氏曰望而視之者逺而視之也林氏曰幎如巾之幂物謂其牙足以包輻轂而均致也下迆謂輪勢下親於上而無所礙也顔氏曰進而視之近而眂之也林氏曰進而視謂車行而視之鄭鍔曰當其車之止時逺而視其輪欲其幎爾均致而傍倚當其車之行時近而視其輪欲其致地者微蓋輪已圜故能運轉而不滯也林氏曰凡此皆謂器之已成而視其所作之善否然則所謂取者取其器之善非主方外之時而為言也望其輻欲其揱爾而纎也進而視之欲其肉稱也無所取之取諸易直也望其轂欲其眼也進而視之欲其幬之亷也無所取之取諸急也林氏曰輻之肉不可失之大亦不可失之小其肉與轂牙相稱者也歐陽氏曰肉稱陸氏曰無音肉當作柔又反按爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環肉實處也好空處也輔氏曰肉好猶俗言美滿也視其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡鄭司農曰綆謂輪箄必計反也愚曰箄甑蔽也所以蔽甑底鄭鍔曰六尺有六寸之輪綆三分寸之二謂之輪之固蓋凡造輪皆向外箄向外箄則車不掉歐陽氏曰輪之入牙者稍出向外邉三分寸之二也輪雖其形如箄然爪之入牙者其鑿孔必正直而不隨之以邪曲也凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃轂小而長則柞大而短則摯鄭鍔曰木向陽則受至陽之氣其文必稹密而其材必堅蓋陽氣之所聚也木向隂則受至隂之氣其文必踈濶而其材必柔蓋隂氣之所聚也林氏曰夫陽為實故其木之理所以稹隂為虛故其木之理所以疏陽為剛故其木之體所以堅隂為柔故其木之體所以柔夫惟木之剛柔如是其異欲其皆剛豈無法哉是故刻識其隂之方炙之以火養之使堅俾其堅也與陽木俱等以之為轂則無剛柔不齊之處轂雖至於敝矣亦不藃暴而起也凡物暴起謂之藃轂必鞔之以革革欲著木欲堅者柔木而以革鞔之久而木瘦減革不著木必暴起矣是故六分其輪崇以其一為之牙圍參分其牙圍而漆其二椁其漆內而中詘之以為之轂長鄭鍔曰兵車乘車之輪皆崇六尺有六寸用其崇之尺寸而六分之取其一分以為牙之圍則牙圍一尺一寸矣歐陽氏曰牙圍一尺一寸其形蓋不規圜也其制若橢然鄭氏以為厚一寸三分寸之二可見一尺一寸除一寸三分寸之二餘九寸三分寸之一內外面各得四寸六分有竒除踐地者厚一寸三分寸之二不漆外內面不漆者猶各一寸通計三寸三分寸之二內外面各有漆者猶各得三寸三分寸之二矣以其長為之圍以其圍之阞捎其藪五分其轂之長去一以為賢去三以為軹鄭氏圖曰轂之材中以虛受軹故大穿為賢小穿為軹歐陽氏曰轂長三尺二寸取其長而五分之每分則六寸四分依鄭注云去二以為賢則得尺九寸二分圍三徑一賢徑六寸四分去三以為軹得尺二寸八分徑四寸二分四釐轂之中賢為大加以金厚一寸兩畔計二寸由徑四寸五分之二藪次之徑三寸九分寸之五軹為小加以金厚一寸兩畔計二寸由徑二寸二分四釐制轂之法大穿向內小穿向外容轂必直陳篆必正施膠必厚施筋必數幬必負幹既摩革色青白謂之轂之善鄭氏曰容者治轂為之形容也鄭鍔曰轂以運輪不直則輪不可行故治轂而為之形容必欲其直篆轂約也以革約轂詩約軧錯衡孔氏疏約謂以皮纒束之鄭鍔曰轂必有約不篆則約無飾也故陳之以篆然篆不正則車無辨故飾五采為篆以飾其約必欲其正巾車言服車五等而曰卿乘夏篆則篆以為辨可知矣顔氏曰施膠所以為附麗之故也故欲其厚施筋以為纒束之故也故欲其數膠厚則不離筋厚則不敝歐陽氏曰所謂篆竊意即陳之於幬也參分其轂長二在外一在內以置其輻鄭鍔曰輻之廣三寸半轂長三尺二寸令輻居三寸半其餘有一尺八寸半然其置之地不可不審是故又以其餘二尺八寸半而三分之輻之外二分則一尺九寸輻之內一分則九寸半於其中而置輻焉鄭氏圖曰轂外以實受輻故二分在外一分在內凡輻量其鑿深以為輻廣陳氏曰量轂之鑿入以為輻廣則深廣均矣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也林氏曰輻廣而鑿淺其菑不深是以易搖扤而不固鄭鍔曰鑿以容輻輻之廣必欲與鑿深相稱使無有餘不足則善是故鑿孔深三寸半則輻廣亦欲三寸半兩者相當即無危摯顔氏曰鑿雖不可淺亦不可深也輻雖不可廣亦不可小也鑿深則固有餘而輻小則强不足林氏曰鑿深而輻小則其幹弱是以其菑雖固而不强也故竑其輻廣以為之弱則雖有重任轂不折鄭鍔曰竑度其輻之廣以為之弱短長小大力足相稱則以是而載夫至重之物物雖至多任雖至重轂亦不折焉以其無有餘不足故也參分其輻之長而殺其一則雖有深泥亦弗之溓也參分其股圍去一以為骹圍鄭鍔曰參分其輻之長而殺其一者除其入轂之處取其餘之長者三分之削小其一分以向牙也惟向牙之處削而小則以之行塗泥中泥弗能附著之也何則向塗處小則其勢下也故雖泥深亦弗之溓也揉輻必齊平沈必均直以指牙牙得則無𣙗而固不得則有𣙗必足見也林氏曰直以指牙則無曲故鑿內相應歐陽氏曰𣙗若今匠人用木漸爾六尺有六寸之輪綆參分寸之二謂之輪之固鄭鍔曰六尺有六寸之輪謂兵車乘車也凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐於鑿凡揉牙外不亷而內不挫旁不腫謂之用火之善鄭氏曰杼謂削薄其踐地者也侔上下等林氏曰輪有山行澤行之異當順其所宜行澤則其地濕故薄其踐地而杼之行山則其地剛而多石故等其上下而侔之是故規之以眂其圜也萭之以視其匡也歐陽氏曰匡似聱隉不平正之意前一面察其菑蚤不齵則輪雖敝不匡之意可見縣之以視其輻之直也水之以視其平沈之均也量其藪以黍以眂其同也權之以視其輕重之侔也鄭鍔曰繩所以見其輻之直矣未知其厚薄之等否也又浮之水上以觀之苟兩輪入水平沈皆均則知斫材等矣上云平沈必均蓋言揉輻時試之於水欲其均也此則輪已成又置之於水亦欲其平沈之均歐陽氏曰車轂之空中向內為大穿當受軸處為藪向外為小穿今言量其藪以黍統言一轂空中容受之實也容受之多少同則壺中之大小同矣故可規可萭可水可縣可量可權也謂之國工歐陽氏曰言規之以至權之而無不合也蓋有自然中於律度之意矣工之制器若是不謂之國工何哉輪人為蓋達常圍三寸桯圍倍之六寸信其桯圍以為部廣部廣六寸部長二尺桯長倍之四尺者二鄭鍔曰蓋斗四面鑿孔以納蓋弓最處蓋之上者也名之曰部言其穹窿而髙處乎上部以總衆弓如部伍然也伸六寸之桯圍以為此部之廣桯圍六寸則部之徑亦六寸取其在下之圍以為在上之徑故以伸言之十分寸之一謂之枚部尊一枚弓鑿廣四枚鑿上二枚鑿下四枚鄭鍔曰此欲言蓋之分寸故先言枚以起數也鑿深二寸有半下直二枚鑿端一枚鄭鍔曰弓之內端削之使狹繩廣一分也鄭氏圖曰自部外以觀弓鑿之廣故鑿廣四枚鑿上二枚鑿下四枚自部內以觀弓鑿之深故鑿深二寸有半下直二枚鑿端一枚弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫參分弓長而揉其一參分其股圍去一以為蚤圍參分弓長以其一為之尊上欲尊而宇欲卑上尊而宇卑則吐水疾而霤逺蓋已崇則難為門也蓋已卑是蔽目也是故蓋崇十尺良蓋弗冒弗紘殷畝而馳不隊謂之國工鄭鍔曰揉與揉牙輻之揉同揉而曲之謂之揉輻之近轂者謂之股弓之近部者亦謂之股以其大也與輻之牙者謂之蚤弓之宇曲者亦謂之蚤以其小也於寸六分之數而去其一分以為蚤圍則弓之蚤圍一寸十五分寸之一又曰前云部尊一枚言部之髙爾若夫弓之入部三分其長以其一分為髙歐陽氏曰上云參分弓長而揉其一則弓長六尺所揉者近部二尺也不揉者下宇曲四尺也自宇曲之蚤曲折而計之則近部之處其髙於宇曲之蚤二尺固有餘矣輿人為車輪崇車廣衡長參如一謂之參稱輿居中以載者也詩詁曰輈軸以上加板以載物謂之輿輪處下以運者也漢輿服志曰上古聖人觀轉蓬始為輪輪行可載因物生智後為之輿衡在前以扼馬者也韻釋文章扼曰衡輪之崇車之廣衡之長皆六尺有六寸故曰參如一謂之參稱鄭鍔曰此殆指兵車乘車而言也輪則計其崇輿則訃其廣衡則計其長各因其所主言之也參者要如一乃謂之稱車廣即謂輿之廣也參分車廣去一以為隧參分其隧一在前二在後以揉其式朱氏曰式車前橫木有所敬則俯而憑之鄭鍔曰式必曲為之所謂揉其式也以其廣之半為之式崇以其隧之半為之較崇鄭鍔曰二木相附上出於式應龍曰輢按說文車旁也錢氏曰髙出於輿之兩旁曰輢鄭氏前注謂殳戈㦸矛皆插車輢賈氏以為斜置於輢之上下歐陽氏又謂輢之為制恐有四柱上有橫木其下又有木縱橫貫之以為車欄也呂和叔曰古者車箱長四尺四寸三分寸前一後二橫一未下去車床三尺三寸謂之式上二尺二寸橫一木謂之較去車床五尺五寸古人立乘平常則憑較若應為敬則落手憑式而頭得俯六分其廣以一為之軫圍參分軫圍去一以為式圍參分式圍去一以為較圍參分較圍去一以為軹圍鄭鍔曰軫圍一尺一寸三分而去其一以為式圍則式圍七寸三分寸之一也以式圍七寸三分寸之一而三分之取二以為較圍則四寸九分之八也軹有二轂末謂之軹輪人所謂去二以為賢去三以為軹是也車較之下其植之直者與植之橫者縱橫相貫亦謂之軹即此所謂軹也歐陽氏曰竊意此木與較相附其制與較同皆四寸九分之八也豈較在前輢在側二木之名可以相通其實所謂軹必在兩旁輢木之下縱橫相貫若今鬲眼然歟參分軹圍去一以為轛圍鄭鍔曰軹圍三寸二十七分寸之七參分而取其二以為轛圍則轛圍二寸八十一分寸之十四圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉鄭鍔曰規矩方圓之至也輿人治木有當圜者有當方者圜者必欲其中規方者必欲其中矩則為方圜之極矣夫木之立者無以知其直之果否惟縣繩以驗之則知其直木之衡者無以知其橫之果否惟置水以驗之則知其橫立者必欲其中縣衡者必欲其中水則直與橫審矣凡居材大與小無并大倚小則摧引之則絶棧車欲弇飾車欲侈鄭鍔曰居處也木有小大以類相從則强弱敵剛柔均無有餘不足之患故大小不可并若以大并小則小者力不勝大者之倚必摧而折如其未摧使馬引之則小者先絶矣何則木之强弱適稱則力任相等如一强一弱則馬所引弱者先絶而强者無恙固其理也惟其然故處之之法當得其所焉輈人為輈輈有三度軸有三理本疏云衡軛也輈轅也轅從軫以前稍曲而上至衡則居衡之上而向下句之衡則橫居輈下如屋之梁故謂之梁輈鄭鍔曰制作必欲中法所以有三度也三度者國馬田馬駑馬之輈淺深不同其度數有三也歐陽謙之曰輈人而與軸並言何也軸之在車其形象其用主乎利轉與輈蓋同也故附于輈人國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸鄭鍔曰髙六尺者名駑馬駕役車者也軸有三理一者以為􅍇也二者以為久也三者以為利也軓前十尺而䇿半之鄭鍔曰車雖有大小至於為軸之理則一而已又曰自軓前凡十尺䇿以䇿馬則半其數長五尺轅十尺而䇿五尺取足以及馬不長不短也凡任木任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小於度謂之無任此言凡者與下經為目云持任之材鄭鍔曰任各因其所宜而任之使力足以勝其任而已凡任木有任其正者有任其衡者所處不同用力亦異故其材之所宜貴各得其當也五分其軫間以其一為之軸圍十分其輈之長以其一為之當兔之圍參分其兔圍去一以為頸圍五分其頸圍去一以為踵圍凡揉輈欲其孫而無弧深歐陽氏曰案鄭圖解軸居下轐在軸上轐即伏兔也兩伏兔居兩頭輈在中央所謂當兔之圍即輈也然輈與二伏兔並居軸上而為三則其大小當無異矣今夫大車之轅摯其登又難既克其登其覆車也必易此無故唯轅直且無橈也是故大車平地既節軒摯之任及其登阤不伏其轅必縊其牛此無故唯轅直且無橈也朱氏曰輊車之覆而前也軒車之却而後也應龍案詩六月云戎車既安如輊如軒注輊摯也鄭鍔曰節其軒則其勢不至於髙而上干節其摯則其勢不至於輊而下至故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故唯轅直且無橈也林氏曰援引也言引而傷車之邸歐陽氏曰按四圭有邸鄭注邸本也車邸意者指輪而言也援其邸其指輪之踐地者而言乎是故輈欲頎典輈深則折淺則負輈注則利準利準則久和則安鄭氏曰揉之大深則傷其力馬倚之則折也揉之淺則馬善負之鄭鍔曰揉之深則大曲而傷其力力傷則易折揉之淺則微曲而其勢直於馬背故馬常若負之然非所以為善故曰深則折淺則負注謂輈之揉者形如注星準謂輈之在輿下者平如準鄭鍔曰形如注星謂自上而下其勢急也惟其勢如注則車必利而無凝滯其平如準則車必平而無傾側利而速平而準則其弊也亦難此車所以能久不失之深不失之淺可否相濟通於調和則乘之者無動搖之患如之何而不安哉輈欲弧而無折經而無絶鄭鍔曰上文云凡揉輈欲其孫而無弧深此欲弧而無折者蓋輈之勢揉之太曲如弧則必折不曲則能覆車故欲其弧但欲其弧而無必折之理耳上文欲其孫此又欲其經而無絶者孫即經耳順其文理謂之孫理而直之謂之經揉輈者惟恐不能順其理爾不順理則斷絶而不相屬矣故欲經而無斷絶之病蓋輈為一車安危所繫故既言之又再言之欲其頎典欲其弧而無折經而無絶一篇之中屢致意焉見為輈之難也進則與馬謀退則與人謀陳氏曰輈所以駕馬輈既善矣則馬受服而不能自已非人欲止之則有前而無却故曰進則與馬謀退則與人謀鄭鍔曰上云和則安故言其安之利馬之行也以進為主人之御也有進有退馬惟欲進其行有進而取道之勢故若與馬謀焉人或欲退輈有順而可摰之勢故若與人謀焉謀謂與人馬之意不期而合猶有相謀然也終日馳騁左不楗行數千里馬不契需終歲御衣衽不敝此唯輈之和也陳氏曰陪乘者為右則尊者在左可知矣鄭鍔曰車有兩驂兩服詩云兩服齊首言其不前後也兩驂如舞言其不拘閡也轅若不和則馬必拘閡而相契契倚而相合之義也轅若不和則馬必前後而相需需遲而相待之義也唯輈之和則雖千里馬無契需之患故曰馬不契需又曰衣之下裳謂之衽故禮記云扱衽不入公門又云深衣續衽皆謂裳之下也御車者常苦於裳之易敝以其近下而摩於車也唯輈之和則無動搖之勞故終嵗御而衽亦不敝勸登馬力馬力既竭輈猶能一取焉鄭鍔曰登進也輈之善也馬不契需愈逺而不知其逺矣能勸馬使進而用力也馬力已竭輈猶有進而取道之勢良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈鄭鍔曰灂漆文理也歐陽氏曰灂漆之文理也韗人為臯陶曰良鼓瑕如積環弓人為弓曰角環灂皆謂漆之文理自然如環車之隧四尺四寸軸居其中而伏兔正居軸上則軸之前後輈之長皆二尺二寸鄭鍔曰輈不善而動搖則漆消摩而不見矣軫之方也以象地也蓋之圍也以象天也輪輻三十以象日月也蓋弓二十有八以象星也陳氏曰日之運行也一嵗一周天合輪輻三十冝以象月而曰以象日月者蓋取其合宿之數也有經星有緯星所謂二十有八宿蓋經星無變者經星分布乎天而周天之度有常分而不可變易故蓋弓以象之龍旗九斿以象大火也鄭鍔曰蓋弓之所象者象星之數也旗之所象者象星之體也又曰晉志云心三星爾雅曰大火謂之大辰注云大火心也東齊書傳曰角亢氐房心尾箕東方之宿也房星為大火歐陽氏曰東方為龍故東方宿以蒼龍名之曲禮左青龍之義亦如此然以星圖考之大火蒼龍宿之心而九星乃蒼龍宿之尾於十二次為析木今龍旗九斿取象於九星乃今不言象析木象尾而言象大火何也蓋其有身有斿斿者今之所謂旗腳也今曰以象大火蓋主旗之身而言以旗之身而下有斿以象龍之心而下有尾也鳥旟七斿以象鶉火也鶉火南方朱鳥之宿也南方七宿以鶉名之星張星有七星旗之七斿取七星為象也熊旗六斿以象伐也鄭鍔曰奎婁胃昴畢觜參西方之宿也西方之熊旗以象白虎宿之形晉天文志曰參十星一曰參伐一曰大辰一曰天布一曰鐵鉞參白獸之體其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍中央三小星曰伐天之都尉也歐陽氏曰按星圖西方參共十星四角四星中橫列三星所謂參也又中星直下有三星所謂伐也然則六斿之所象合伐與參六星而言之也鄭氏所謂伐屬白虎宿與參連體而六星是也龜蛇四斿以象營室也晉天文志營室二星天子之官也一曰𤣥宫二曰清廟離宫六星天子之别宫東壁二星主文章天下圖書之府詩定之方中注曰定昏中而正謂小雪時其體與東壁連正四方應龍曰案星圖營室東壁皆二星而營室之東又二星西四星與營室二星合八星則其旁六小星晉志所謂離宫六星是也然則四斿之所取象但取室二大星與壁二星為四星而言爾鄭鍔曰斗牛女虛危室壁北方之宿也建龜蛇以象之弧旌枉矢以象弧也旗之正幅為縿斿則屬焉故曰弧旌也
