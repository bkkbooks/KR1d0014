body:
  text: 周官集𫝊卷五元毛應龍撰春官宗伯第三惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國四時之和為春禮之用在乎和故掌禮之官謂之春官宗主也伯夷典禮曰秩宗言禮有秩序而是官實為之主故名曰宗伯長也於四時之官為長故名曰伯禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人鬱人下士二人府二人史一人徒八人鬯人下士二人府一人史一人徒八人雞人下士一人史一人徒四人司尊彞下士二人府四人史二人胥二人徒二十人司几筵下士二人府二人史一人徒八人天府上士一人中士二人府四人史二人胥二人徒二十人典瑞中士二人府二人史二人胥一人徒十人典命中士二人府二人史二人胥一人徒十人司服中士二人府二人史一人胥一人徒十人典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧每廟二人奚四人世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人鄭鍔曰先王於六宫之人既有小宰又有內宰以掌其治又立世婦掌之世婦是其嚴者蓋小宰內宰治其政所以整齊之於內世婦掌其禮所以詔相之於外而肅其治此家齊而國始治也內宗凡內女之有爵者外宗凡外女之有爵者冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人大胥中士四人小胥下士八人府二人史四人徒四十人大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人視瞭三百人府四人史八人胥十有二人徒百有二十人典同中士二人府一人史一人胥二人徒二十人磬師中士四人下士八人府四人史二人胥四人徒四十人鍾師中士四人下士八人府二人史二人胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鎛師中士二人下士四人府二人史二人胥二人徒二十人徐氏音辨曰鎛小而鍾大鄭氏以為似鍾而大誤矣韎師下士二人府一人史一人舞者十有六人徒四十人鄭鍔曰詩云韎韐有奭左𫝊云韎韋之跗注皆以韎為赤色之韋東夷之樂名曰韎意其舞者亦衣赤色之韋也旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人籥師中士四人府二人史二人胥二人徒二十人籥章中士二人下士四人府一人史一人胥二人徒二十人鞮鞻氏下士四人府一人史一人胥二人徒二十人典庸器下士四人府四人史二人胥八人徒八十人司干下士二人府二人史二人徒二十人大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人鄭鍔曰自三皇以來已有卜筮上世聖人其智非不足以立事也猶取信於卜筮何邪以為人之於事不能無心惟其有心故是非吉凶有時而差若聖人則何心之有雖性負生知亦不自以為明而取決於此誠以託於無心爾故設大卜之官以掌龜筮之占焉若夫卜占之官以大卜為之長使筮人屬焉說者謂龜者象也筮者數也數生於有象之後故有筮人有占夢而其書則皆掌於此也龜人中士二人府二人史二人工四人胥四人徒四十人菙氏下士二人史一人徒八人占人下士八人府一人史二人徒八人鄭鍔曰洪範所謂擇立卜筮人三人占則從二人之言謂此占人也易曰占事知來則占者所以預言其未來之應驗也簭人中士二人府一人史二人徒四人占夢中士二人史二人徒四人視祲中士二人史二人徒四人鄭鍔曰或謂天人之學有暈璚背穴抱珥蟲霓以占休咎聖人作經乃設官以掌十輝之法以觀妖祥無乃災異之學歟以春秋考之夫子作經二百四十年間豈無祥瑞可書邪然書災異而不書祥瑞以為政失於此則變見於彼猶影之象形響之應聲明君思其咎則禍除而福生於天人之變現安得恝然而不為意日者人君之表以大明照臨下土若為隂陽之氣所侵則明夷矣明君忌之故設官以視祲大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人詛祝下士二人府一人史一人徒四人司巫中士二人府一人史一人徒十人男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人馮相氏中士二人下士四人府二人史四人徒八人保章氏中士二人下士四人府二人史四人徒八人內史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人外史上士四人中士八人下士十有六人胥二人徒二十人御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人典路中士二人下士四人府二人史二人胥二人徒二十人歐陽謙之曰巾車所掌是政令凡車之政令皆掌之不掌其物也典路乃是掌王及后之車用說之事車僕中士二人下士四人府二人史二人胥二人徒二十人司常中士二人下士四人府二人史二人胥四人徒四十人都宗人上士二人中士四人府二人史四人胥四人徒四十人家宗人如都宗人之數凡以神士者無數以其藝為之貴賤之等大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國以吉禮事邦國之鬼神示鄭鍔曰治莫急於禮禮莫重於祭人君所以為天下歸往者以為天地人神之主而已故欲建保邦國莫大於能主其祭以禋祀祀昊天上帝林氏曰國語云精意以享謂之禋則禋以意精為主程氏曰以形體謂之天以主宰謂之帝以功用謂之鬼以妙用謂之神以實柴祀日月星辰以槱燎祀司中司命飌師雨師鄭鍔曰臣考經文於柴言實則見其用牲體以實之也明矣至於槱燎則不見其實牲體之文然則槱燎者止於燎柴也與孔氏曰東方木曰嵗星南方火曰熒惑中央土曰鎮星西方金曰太白北方水曰辰星新安王氏曰北斗與列宿附著天體與天左旋無所遷移惟日月五星違天右行日遲月速五星散行不一故列宿為經五星為緯朱氏曰辰日月所㑹天度之分也孔氏曰周天三百六十五度四分度之一日行遲一日行一度一嵗一周天月行速一日行天十二度十九分度之七計二十九日過半已行天一周每月之朔月行及日而與之㑹故謂之辰正月㑹亥其辰為陬訾二月㑹戌其辰為降婁三月㑹酉其辰為大梁四月㑹申其辰為實沈五月㑹未為鶉首六月㑹午為鶉火七月㑹已為鶉尾八月㑹辰為夀星九月㑹卯為大火十月㑹寅為析木十一月㑹丑為星紀十二月㑹子為𤣥枵一嵗十二㑹故為十二辰應龍曰日月隂陽之精氣也五星五行之精氣也在天為七政成造化示吉凶祀之所以次於昊天上帝鄭鍔曰日也月也五星也十二辰也民所瞻仰而在祀典者也以其體之同乎天不可得而親也必以臭而達之故用實柴實牲燔柴則氣臭上達矣故以實柴祀日月星辰麗乎上而照臨乎下所以次於昊天上帝司中司命飌師雨師雖麗乎上而用事於人間不得以比日月星辰之尊以氣達之不必實牲故用槱燎故曰芃芃棫朴薪之槱之謂積薪以燔不實牲體也故曰以槱燎祀司中司命飌師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物徐氏音辨曰披牲胸曰疈磔之曰辜林氏曰疈者以疈而别之辜者辜而磔之四方百物若郊特牲所謂八蠟以記四方祭百種以報嗇也以肆獻祼享先王以饋食享先王歐陽公唐禮樂志曰禘祫大祭也祫以昭穆合食於太祖而禘以審諦其尊卑此禘祫之義而志議禮者徒惑於紛紜之異同古者聖人制禮取法天道以事其祖三年一閏天氣大備故三年一祫是故周制五年再殷祭一祫一禘祫者毁廟未毁廟皆是升合於太祖所謂合食於太祖也禘者惟及於毁廟而不及於親廟所以審諦其尊卑也自是制不明載於周禮而祫禘之說鄭氏始見於此經之注至王制所載犆礿祫禘祫嘗祫蒸而說者又以為夏商之制此所以起異同紛紜之論也應龍曰按禘以夏祫以秋古之制也劉氏曰禘禮以祼為重祫禮以饋食為重禴祠蒸嘗雖皆有祼饋之事恐其節文略殊非禘祫之禮比也古禮既亡不可知之孔子曰禘自既灌而往者吾不欲觀之矣明禘禮以祼為重以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王林氏曰春享則品物少而文詞多冬享則以物之備而可進者衆也故謂之蒸程氏易𫝊曰升九二孚乃利用禴曰禴祭之簡質者也又既濟九五東鄰殺牛不如西鄰之禴祭曰禴薄祭也應龍曰帝王為天地神示之主事莫重於祭祀舜典肆類于上帝禋于六宗望于山川遍于羣神六宗三昭三穆也羣神凡天神地示人鬼之在祀典者皆是也大宗伯以吉禮事邦國之鬼神示自昊天上帝以至先王之六享皆類上帝也禋六宗也自日月星辰風雨以至社稷五祀五嶽山林川澤則望山川也遍羣神也大宗伯之所掌即舜秩宗之所典與以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍烖以禬禮哀圍敗以恤禮哀冦亂林氏曰凶以天烖言札以民病言徐氏音辨曰𫝊閔元年狄伐邢管仲言于齊侯曰簡書同惡相恤之謂也齊人救邢二年狄入衛齊侯使公子無虧戌漕歸公乘馬祭服牛羊豕雞狗與門材此恤禮也以賓禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同時聘曰問殷俯曰視三山劉氏曰賓禮者天子為主而用是禮以待諸侯之來見者也以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也歐陽謙之曰古者所以臨其民者自五人為伍起之凡受田起役調兵分土無不本於是焉是所以總謂之軍禮同之也林氏曰大役以築作為主以嘉禮親萬民禮者天理之節文兄弟也男女也朋友故舊賓客也同姓異姓親疏也所以有是品節之文皆出於人心自然之善非以人之不欲者强之也以此而親萬民蓋因其所欲之善而文之則故親睦之道也以飲食之禮親宗族兄弟鄭鍔曰文王能親親以睦詩人作伐木之詩以美之不及其他惟曰釃酒有藇既有肥羜以速諸父釃酒有衍籩豆有踐兄弟無逺而已幽王不能親睦九族詩人作頍辨之詩以刺之不及其他惟曰爾酒既㫖爾殽既嘉豈伊異人兄弟匪他爾酒既㫖爾殽既將豈伊異人兄弟具來而已則宗族兄弟之親以飲食之禮為主可知以昏冠之禮親成男女鄭鍔曰昏者禮之本冠者禮之始昏則以親男女之情冠則以成男子之德故冠而字之所以成之也男冠而女笄言冠不言笄男帥女而行從可知也昏禮男親迎御婦車而壻授綏御輪三周親之也親之也者親之也非昏禮則男女不親非冠禮則無以成男女成人之道以賓射之禮親故舊朋友以饗燕之禮親四方之賓客鄭鍔曰說者見定王謂士㑹之語以為王享有體薦燕有折爼公當饗卿當燕謂燕之與饗禮各有施以脤膰之禮親兄弟之國盛以蜃器則謂之脤祭餘胙肉則謂之膰以賀慶之禮親異姓之國徐氏音辨曰徒贊其喜曰慶加物曰賀宣十一年楚子責申叔時曰汝獨不慶寡人髙帝紀曰賀錢萬以九儀之命正邦國之位一命受職鄭鍔曰王之下士一命子男之士不命謂之無職則已為子男之士謂之有職則特其君之所自辟除以治其私事非受王朝之職者也加以一命則於子男之國為大夫於公侯伯之國為士始為正吏受王官之職是之謂受職也歐陽謙之曰諸侯之卿大夫士必命於天子而受職事焉不然皆府史胥徒之類也左𫝊成公二年晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰叔父克遂有功于齊而不使命卿鎮撫王室所使來撫豫一人而鞏伯實來未有職司於王室此可以見諸侯之强大夫且不命不受職於天子而王國猶能援典章之舊以責之則周公所以馭天下之諸侯雖一命之微一職之細必受於天子而不得以自便焉則其所以明分守嚴等威以維持封建之法使之長久而不壞者於此亦可略見其微再命受服三命受位鄭鍔曰王之上士三命已有列位於朝矣公侯伯之士再命子男之卿亦再命雖已受𤣥冕之服未得敘位於王朝惟加以三命則於公侯伯為卿始得有位於朝是之謂受位也四命受器鄭鍔曰曲禮云凡家造祭器為先康成曰大夫稱家正謂此耳然禮運又曰大夫具官祭器不假非禮也是謂亂國儒者遂疑其說愚以為有王朝之大夫有諸侯之大夫其名同其命異故有當造當假之殊公侯伯之孤與王之大夫皆四命得以自造若公侯之大夫再命未得受器則假用也固宜不假是為僭禮豈不謂之亂國乎曲禮曰無田祿者不設祭器指此再命之大夫耳五命賜則則八則也五命為子男之君賜以治都鄙之法則或問五命賜則古注鄭氏與鄭鍔說同否鄭氏曰則地未成國之名王莽時以二十五成為則鄭鍔曰大宰以八則治都鄙竊意公侯伯之孤四命矣加以五命為子男之君賜以此八則使比王畿都鄙之長歟蓋外為子男之君校其爵等正謂都鄙之長同也曰都鄙之采地有三等家邑附內縣都附外太宰六典經邦國邦國謂諸侯之國都鄙有先君之廟曰都而未成國二鄭之說同也六命賜官七命賜國八命作牧九命作伯四命以上言受則以授官之有常法授其人之當受者而已五命以下言賜則非待於上意之所與不可得而賜也至於八命九命特以作言作如作之君作之師任大責重足以當之而後可故獨言作牧作伯所以重其事也以玉作六瑞以等邦國等謂差别尊卑貴賤而各從其類等之則不至於混淆貴賤不同所執自異六瑞者所以表其隆殺而等之也王執鎮圭聶氏圖孔義曰凡圭廣三寸厚半寸剡上左右各寸半又注云尹拙議以圭鎮用五采組約中央以備失墜公執桓圭徐氏音辨曰柱謂之桓或問大宗伯公執桓圭而射人之官又言三公執璧何也曰三山鄭鍔之說明矣其說謂三上公在外則其勢與諸侯並並則欲辨等故所執者圭在朝賓射之時其勢當異於常時故特執璧所以異於子男者特不琢蒲榖為飾爾侯執信圭伯執躬圭徐氏音辨曰皆琢人形其直曰信其鞠躬者曰躬歐陽謙之曰侯伯雖同於七命其宫室車旗衣服禮儀又同而孟子之說則曰侯一位伯一位其命數禮儀皆同而位則有異將何以别之哉無以别之則分守不明而等威無間矣故侯伯之爵同於七命而所執之圭不可以同於七寸是以於琢飾之間少異於信屈之制而尊卑之分不期辨而自辨聖人明分之嚴幾微之際不敢失者如此子執榖璧男執蒲璧歐陽謙之曰子男同一位榖璧蒲璧同其制異其飾聊以致子男之辨以禽作六摯以等諸臣鄭鍔曰摯必稱德諸臣用禽微且賤也觀所摯之禽有大小則德之小大其義自見而其等降自明矣孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞少師少傅少保謂之三孤則三公之二也典命曰公之孤四命以皮帛視小國之君鄭鍔曰雞知時警旦風雨不渝以玉作六器以禮天地四方鄭鍔曰神不可以䙝瀆能通三靈以交之者莫如陽精之純故禮神有玉而祀神又有玉焉禮者薦於告神之始也以蒼璧禮天聶氏圖曰璧圜徑九寸爾雅云肉倍好謂之璧郭璞云肉邊也好孔也好三寸肉兩邊各三寸共九寸以黃琮禮地琮瑞玉大八寸其狀外八角而中虛圓琮之言宗八方所宗德象地鄭鍔曰畫繢之事曰土以黃其象方以青圭禮東方剡上曰圭以赤璋禮南方鄭鍔曰畫繢之事曰南方謂之赤以白琥禮西方鄭鍔曰以玉長九寸廣五寸刻伏虎形髙三寸畫繢之事曰西方謂之白應龍曰說文發兵瑞玉為琥以𤣥璜禮北方鄭鍔曰𤣥色在緅緇之間畫繢之事曰北方謂之黑應龍曰詩𫝊云璜為佩下之飾有穿孔骨繫之處故太公得而釣之皆有牲幣各放其器之色以天産作隂德以中禮防之以地産作陽德以和樂防之以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物鄭鍔曰說者謂天地之玉用蒼與黃典瑞又有四圭兩圭之異何也應龍曰愚以為大宗伯之用蒼黃者禮神之玉而典瑞所云祀神之玉也周公植璧秉圭大宗伯所用者植璧也典瑞所用者秉圭也歐陽謙之曰天地之祭即夏至冬至大祭也四方之祭即月令四時迎氣之祭也凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮若王不與祭祀則攝位林氏曰祀大神圓丘之祀享大鬼禘祫之享也祭大示方澤之祭也凡大祭祀王后不與則攝而薦豆籩徹大賓客則攝而載果鄭鍔曰王之祼賓客上公再侯伯子男一后亞王禮賓故亦有祼獻之禮當后之亞祼也內宰贊之故內宰之職曰凡賓客之祼獻瑤爵皆贊若后有故而不與祼賓客之事則大宗伯攝而載祼載之為言承之以往也言酌鬱鬯載於璋瓚往而禮賓也后與賓客固無親相授受之禮其禮也雖親酌之實盛載以往大宗伯之攝取王后待賓客之義亦以載為言也此承上文王后不與之下當為攝王后祼賓客朝覲㑹同則為上相大喪亦如之王哭諸侯亦如之王命諸侯則儐國有大故則旅上帝及四望朱氏曰旅祭名王大封則先告后土乃頒祀于邦國都家鄉邑劉氏曰王之大社主四方土地歐陽謙之曰邦國都家鄉邑皆有祭祀之事邦國外之諸侯也都家王子弟公卿大夫食邑也鄉六鄉也邑六遂及公邑也或問鄭氏說都家之鄉邑與歐陽謙之說不同鄭氏曰都家之鄉邑謂王子弟及公卿大夫所食采地歐陽謙之曰鄉六鄉邑六遂及公邑曰宗伯典禮之官祭祀之事不特邦國都家有之若六鄉六遂豈無祭祀之禮儀亦必出於上之頒行歐陽謙之以為六鄉之間黨正有嵗時祭禜之禮族師有嵗時祭酺之禮六遂之間有鄼長治其鄼之祭祀之事有鄙師治其鄙之祭祀之事是其禮儀要必自宗伯而頒之不得以自為也此說為當小宗伯之職掌建國之神位右社稷左宗廟兆五帝于四郊四望四類亦如之五帝乃五氣之神月令於四立日及季夏土德王日各迎其氣之神於其郊其配祭以五人帝伏羲神農黃帝少昊顓帝是也或問兆五帝於四郊或以為五人帝如何曰有天地則有五方有五方則有五方之神五方之神與昊天同稱帝而不與昊天同稱天猶諸侯與天子同稱君而不與天子同稱王古者祀五帝必配以五人帝從以五人臣月令之五人帝伏羲神農黃帝少昊顓帝而已果以是為五帝則前此其無司四時者乎故知迎氣在四郊是迎五天帝而配以五人帝從以五人臣也兆山川丘陵墳衍各因其方歐陽謙之曰考之大司樂凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示然四望之地已是山林之大者蓋有方所可言而山川丘陵墳衍則是山川之小者疑若所在不一非有方所可指者也然考之職方氏正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其他九州莫不有山澤川浸焉意者所謂山川丘陵墳衍皆如職方所載有方所可指者也天子祭天下名山大川則自四望之外無所不祭則所謂山川丘陵墳衍則除四望之外有方所可指而祭者也若泛祭山川丘陵墳衍則恐所在不一非可以各因其方而兆之也掌五禮之禁令與其用等辨廟祧之昭穆辨吉凶之五服車旗宫室之禁鄭鍔曰天子七廟三昭三穆外有二祧朱氏曰昭穆但分世數不為分尊卑昭之言明也以其南面而向明也曰其為向明何也曰此不可以空言曉也今假設諸侯之廟以明之蓋所謂二昭二穆與太祖之廟而五者共居一垣之內而九分其地正北為太祖廟始封之君居之正東為昭廟之一二世之君居之正西為穆廟之一而三世居之東南為昭廟之二而四世居之西南為穆廟之二而五世居之太祖之廟百世不遷其餘四廟則六世之後一世而一遷焉及其祫祭於太廟之室則毁廟之主與羣廟之主合食叙尊卑故太祖東向為最尊而羣昭皆南向羣穆皆北向南向者取其向明故謂之昭北向者取其深逺故謂之穆義各有取也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰否昭常為昭穆常為穆七世之君立則二世祧四世為昭之一矣六世為昭之二矣八世之君立則三世祧而五世為穆之一七世為穆之二矣蓋昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫子孫之列亦以為序若武王謂文為穆考成王稱武為昭考則自其始祔而已然而春秋𫝊以管蔡郕霍為文之昭邗晉應韓為武之穆則雖既毁而猶不易也掌三族之別以辨親疏其正室皆謂之門子掌其政令劉彝曰王之庶子皆封諸侯而為一國始封之祖也諸侯之別子不得禰其先君而得為其適子適孫之祖也故曰别子為祖繼别為宗者謂兄弟之所宗世世相承莫不以為宗雖在五服之外而與絶族者皆為之齊衰三月故曰百世不遷之宗也繼禰者為小宗者為大宗之庶子有適子矣是謂繼禰者也世繼其禰各為其兄弟之所宗旁殺親盡而止故曰祖遷於上宗易於下所謂五世則遷之宗也是謂掌三族之别以辨親疏鄭鍔曰是三族者服所由以輕重有大宗小宗則親疏自分矣又曰嫡子當代父當門謂之門子明當為大宗而百世不遷也小宗伯掌其政令則辨親疏明嫡庶使不得以孽代宗也徐氏音辨曰左傳襄九年盟于戲鄭六卿及大夫門子從鄭伯毛六牲辨其名物而頒之于五官使共奉之辨六齍之名物與其用使六宫之人共奉之辨六彝之名物以待果將辨六尊之名物以待祭祀賓客掌衣服車旗宫室之賞賜掌四時祭祀之序事與其禮鄭鍔曰賞賜出於人君一時之喜而宗伯掌其禮若賜上公則當以九為節若賜侯伯則以七為節之類若國大貞則奉玉帛以詔號大祭祀省牲視滌濯祭之日逆齍省鑊告時于王告備于王大貞卜國之事卜大事必用玉帛以禮神鄭鍔曰詔大祝使為玉幣之美名玉之號曰嘉玉帛之號曰量幣備其物嘉其名致誠盡禮於神庶乎僂句之不余欺而已凡祭祀賓客以時將瓚祼詔相祭祀之小禮凡大禮佐大宗伯賜卿大夫士爵則儐小祭祀掌事如大宗伯之禮大賓客受其將幣之齎鄭鍔曰祭祀則王以圭瓚酌鬱鬯以獻尸后以璋瓚酌而亞祼禮賓客亦送小宗伯於當祼之時送二祼以授王與后后之祼內宰贊之小宗伯特奉瓚而進使及時爾若大師則帥有司而立軍社奉主車若軍將有事則與祭有司將事于四望若大甸則帥有司而饁獸于郊遂頒禽既祭然後頒禽則大獸公之小獸私之是也大烖及執事禱祠于上下神示王崩大肆以秬鬯渳及執事涖大斂小斂帥異族而佐縣衰冠之式于路門之外說文浴尸曰渳謂以秬鬯浴尸使之香也及執事視葬獻器遂哭之卜葬兆甫竁亦如之既葬詔相喪祭之禮成葬而祭墓為位後死者合食於先祖為祔凡王之㑹同軍旅甸役之禱祠肄儀為位國有禍烖則亦如之凡天地之大烖類社稷宗廟則為位凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀徐氏音辨曰右社稷左宗廟定位也類而為位非常位也若金縢禱先王為三壇同墠
